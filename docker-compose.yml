# IXION Docker Compose Configuration
# Intelligence eXchange & Integration Operations Network
# For air-gapped/secure environment deployment

version: '3.8'

services:
  ixion:
    image: ixion:latest
    container_name: ixion
    restart: unless-stopped

    ports:
      - "${IXION_PORT:-8000}:8000"

    volumes:
      # Persist database and configuration
      - ixion-data:/data

      # Optional: Mount custom config file
      # - ./config.json:/data/.ixion/config.json:ro

    # Load environment variables from .env file
    env_file:
      - .env

    environment:
      # Ollama connection (when enabled)
      - OLLAMA_URL=http://ollama:11434

    # Security hardening
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

    # Health check — used by seeder to know when IXION is ready
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

    # Resource limits (increased for NLP processing)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    networks:
      - default
      - ixion-dev

    depends_on:
      - ollama

  # =============================================================================
  # Ollama - Local LLM Service
  # =============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ixion-ollama
    restart: unless-stopped

    # No ports exposed - Ollama is only accessible via IXION's chat interface
    # Uncomment below if direct API access is needed for debugging
    # ports:
    #   - "${OLLAMA_PORT:-11434}:11434"

    volumes:
      # Persist downloaded models
      - ollama-models:/root/.ollama

    environment:
      # Concurrency settings - adjust based on available RAM
      # Each parallel slot needs ~2-4GB additional RAM
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
      - OLLAMA_MAX_LOADED_MODELS=1
      # Keep model in memory longer to reduce reload times
      - OLLAMA_KEEP_ALIVE=30m

    # Resource limits - adjust based on available RAM
    # For 32GB system, can increase to 16-20GB
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: ${OLLAMA_MEMORY:-8G}
        reservations:
          cpus: '1'
          memory: 2G

    # GPU support (uncomment if NVIDIA GPU available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # =============================================================================
  # Seeder - One-shot data population
  # =============================================================================
  # Seeds KB articles and playbooks on first run, then exits.
  # Shares ixion-data volume for .seeded marker persistence.
  # Skips automatically on subsequent starts.
  seeder:
    image: ixion:latest
    container_name: ixion-seeder
    entrypoint: ["python", "/app/seed_all.py"]
    volumes:
      - ixion-data:/data
    env_file:
      - .env
    environment:
      - IXION_SEED_URL=http://ixion:8000
    depends_on:
      ixion:
        condition: service_healthy
    restart: "no"
    networks:
      - default

networks:
  ixion-dev:
    external: true
    name: ixion_ixion-net

volumes:
  ixion-data:
    driver: local
  ollama-models:
    driver: local
