# IXION Docker Compose Configuration
# Intelligence eXchange & Integration Operations Network
# For air-gapped/secure environment deployment

version: '3.8'

services:
  ixion:
    image: ixion:latest
    container_name: ixion
    restart: unless-stopped

    ports:
      - "${IXION_PORT:-8000}:8000"

    volumes:
      # Persist database and configuration
      - ixion-data:/data

      # Optional: Mount custom config file
      # - ./config.json:/data/.ixion/config.json:ro

    # Load environment variables from .env file
    env_file:
      - .env

    environment:
      # Ollama connection (when enabled)
      - OLLAMA_URL=http://ollama:11434

    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    # Resource limits (increased for NLP processing)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    depends_on:
      - ollama

  # =============================================================================
  # Ollama - Local LLM Service
  # =============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ixion-ollama
    restart: unless-stopped

    # No ports exposed - Ollama is only accessible via IXION's chat interface
    # Uncomment below if direct API access is needed for debugging
    # ports:
    #   - "${OLLAMA_PORT:-11434}:11434"

    volumes:
      # Persist downloaded models
      - ollama-models:/root/.ollama

    environment:
      # Reduce memory usage for smaller deployments
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1

    # Resource limits - adjust based on available RAM
    # For 32GB system, can increase to 16-20GB
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: ${OLLAMA_MEMORY:-8G}
        reservations:
          cpus: '1'
          memory: 2G

    # GPU support (uncomment if NVIDIA GPU available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ixion-data:
    driver: local
  ollama-models:
    driver: local
