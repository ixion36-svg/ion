# ION Docker Compose Configuration
# Intelligent Operating Network
# For air-gapped/secure environment deployment

services:
  # =============================================================================
  # PostgreSQL - Primary Database
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ion-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ion
      POSTGRES_USER: ion
      POSTGRES_PASSWORD: ${ION_DB_PASSWORD:-ion2025}

    volumes:
      - postgres-data:/var/lib/postgresql/data

    # Not exposed externally — only ION connects via Docker network
    # Uncomment to access from host for debugging:
    # ports:
    #   - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ion -d ion"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

    networks:
      - ion-net

    # Security hardening
    security_opt:
      - no-new-privileges:true

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # =============================================================================
  # ION - Main Application
  # =============================================================================
  ion:
    # build: .  # Uncomment to build from source instead of pulling
    image: ixion36/ion:${ION_VERSION:-0.9.46}
    container_name: ion
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "${ION_PORT:-8000}:8000"

    volumes:
      # Persist config and uploaded files (DB is now in PostgreSQL)
      - ion-data:/data

      # Optional: Mount custom config file
      # - ./config.json:/data/.ion/config.json:ro

      # Optional: Mount a self-signed CA certificate bundle
      # - ./ca.pem:/etc/ssl/certs/custom-ca.pem:ro

    # Load environment variables from .env file
    env_file:
      - .env

    environment:
      # PostgreSQL connection
      - ION_DATABASE_URL=postgresql://ion:${ION_DB_PASSWORD:-ion2025}@postgres:5432/ion
      # Ollama connection (when enabled via --profile ai)
      - ION_OLLAMA_URL=http://ollama:11434
      # Optional: Trust a self-signed CA for OpenCTI, ES, Keycloak, etc.
      # - ION_CA_BUNDLE=/etc/ssl/certs/custom-ca.pem

    networks:
      - ion-net

    # Security hardening
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

    # Health check — used by seeder to know when ION is ready
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

    # Resource limits (increased for NLP processing)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    # Logging — override with a Docker logging driver if desired
    # Default: json-file (docker logs). Alternatives: syslog, fluentd, gelf
    # logging:
    #   driver: syslog
    #   options:
    #     syslog-address: "udp://syslog-host:514"
    #     syslog-facility: "local0"
    #     tag: "ion"

  # =============================================================================
  # Ollama - Local LLM Service (opt-in via: docker compose --profile ai up)
  # =============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ion-ollama
    restart: unless-stopped
    profiles:
      - ai

    # No ports exposed - Ollama is only accessible via ION's chat interface
    # Uncomment below if direct API access is needed for debugging
    # ports:
    #   - "${OLLAMA_PORT:-11434}:11434"

    volumes:
      # Persist downloaded models
      - ollama-models:/root/.ollama

    environment:
      # Concurrency settings - adjust based on available RAM
      # Each parallel slot needs ~2-4GB additional RAM
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
      - OLLAMA_MAX_LOADED_MODELS=1
      # Keep model in memory longer to reduce reload times
      - OLLAMA_KEEP_ALIVE=30m

    # Resource limits - adjust based on available RAM
    # For 32GB system, can increase to 16-20GB
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: ${OLLAMA_MEMORY:-8G}
        reservations:
          cpus: '1'
          memory: 2G

    # GPU support (uncomment if NVIDIA GPU available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # =============================================================================
  # Seeder - One-shot data population
  # =============================================================================
  # Seeds KB articles and playbooks on first run, then exits.
  # Shares ion-data volume for .seeded marker persistence.
  # Skips automatically on subsequent starts.
  seeder:
    image: ixion36/ion:${ION_VERSION:-0.9.46}
    container_name: ion-seeder
    entrypoint: ["python", "/app/seed_all.py"]
    volumes:
      - ion-data:/data
    env_file:
      - .env
    environment:
      - ION_SEED_URL=http://ion:8000
    networks:
      - ion-net
    depends_on:
      ion:
        condition: service_healthy
    restart: "no"

networks:
  ion-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  ion-data:
    driver: local
  ollama-models:
    driver: local
