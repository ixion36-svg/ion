# ION Docker Compose Configuration
# Intelligent Operating Network
# For air-gapped/secure environment deployment

services:
  # =============================================================================
  # PostgreSQL - Primary Database
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ion-postgres
    restart: unless-stopped

    # Tuned for a 4 GB container on a 64 GB host (v0.9.86).
    #
    # shared_buffers     1 GB   — 25% of container RAM, the standard rule
    # effective_cache_size 3 GB — tells the planner the OS cache is large;
    #                             encourages index scans over seq scans
    # work_mem          32 MB   — per-sort/hash memory; 50 concurrent users
    #                             × ~2 active sorts each = ~3.2 GB peak
    # maintenance_work_mem 256 MB — VACUUM, CREATE INDEX
    # wal_buffers       16 MB   — larger WAL buffer for burst writes
    # random_page_cost   1.1    — SSD assumption (default 4.0 is spinning disk)
    # max_connections   320     — covers ION pool ceiling (4 workers × 75)
    # log_min_duration_statement 100 — slow-query log for >100ms
    command:
      - postgres
      - -c
      - shared_buffers=1GB
      - -c
      - effective_cache_size=3GB
      - -c
      - work_mem=32MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - wal_buffers=16MB
      - -c
      - random_page_cost=1.1
      - -c
      - max_connections=320
      - -c
      - log_min_duration_statement=100
      - -c
      - log_statement=none
      - -c
      - log_line_prefix=%t [%p] %u@%d

    environment:
      POSTGRES_DB: ion
      POSTGRES_USER: ion
      POSTGRES_PASSWORD: ${ION_DB_PASSWORD:-ion2025}

    volumes:
      - postgres-data:/var/lib/postgresql/data

    # Not exposed externally — only ION connects via Docker network
    # Uncomment to access from host for debugging:
    # ports:
    #   - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ion -d ion"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

    networks:
      - ion-net

    # Security hardening
    security_opt:
      - no-new-privileges:true

    # Sized for ~50 concurrent SOC users on the v0.9.65 load-test profile.
    # Override per-deployment via .env: ION_DB_CPUS, ION_DB_MEMORY.
    deploy:
      resources:
        limits:
          cpus: '${ION_DB_CPUS:-4}'
          memory: ${ION_DB_MEMORY:-4G}
        reservations:
          cpus: '0.5'
          memory: 512M

  # =============================================================================
  # ION - Main Application
  # =============================================================================
  ion:
    # build: .  # Uncomment to build from source instead of pulling
    image: ixion36/ion:${ION_VERSION:-0.9.88}
    container_name: ion
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "${ION_PORT:-8000}:8000"

    volumes:
      # Persist config and uploaded files (DB is now in PostgreSQL)
      - ion-data:/data

      # Optional: Mount custom config file
      # - ./config.json:/data/.ion/config.json:ro

      # Self-signed CA certificate bundle — mount your internal CA so ION
      # trusts ES, Kibana, Keycloak, TIDE, Arkime, OpenCTI connections.
      # Then set ION_CA_BUNDLE=/etc/ssl/certs/custom-ca.pem in .env.
      - ${ION_CA_CERT:-/dev/null}:/etc/ssl/certs/custom-ca.pem:ro

    # Load environment variables from .env file
    env_file:
      - .env

    environment:
      # PostgreSQL connection
      - ION_DATABASE_URL=postgresql://ion:${ION_DB_PASSWORD:-ion2025}@postgres:5432/ion
      # Ollama LLM — defaults to the compose Ollama container when the
      # `ai` profile is enabled. Override in .env to point at a remote
      # Ollama host (e.g. ION_OLLAMA_URL=http://gpu-box:11434).
      - ION_OLLAMA_URL=${ION_OLLAMA_URL:-http://ollama:11434}
      # uvicorn workers — 4 sized for ION's 50-user max ceiling.
      # Background tasks (Kibana sync, Analytics Engine, TIDE sync,
      # Network Mapper, CyAB reminders) run on ONE worker via pg
      # advisory lock leader election (v0.9.71+).
      - ION_WORKERS=${ION_WORKERS:-4}
      # CA bundle — set ION_CA_BUNDLE in .env when using the cert mount above
      - ION_CA_BUNDLE=${ION_CA_BUNDLE:-}

    networks:
      - ion-net

    # Security hardening
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

    # Health check — used by seeder to know when ION is ready
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

    # Resource limits — sized for ~50 concurrent SOC users (v0.9.65 load-test
    # design ceiling). 4 uvicorn workers × ~1GB steady with headroom for PCAP
    # parsing spikes, SQLAlchemy pools, and the 3 background sync loops
    # (TIDE / Kibana / Analytics Engine). 6 CPUs = 4 workers + 2 for background
    # tasks running in parallel with request handling.
    #
    # Override per-deployment via .env: ION_CPUS, ION_MEMORY. On a 64 GB host
    # leave these at the defaults; on a 16 GB dev box drop ION_MEMORY=2G and
    # ION_WORKERS=2 (via docker-compose.override.yml).
    deploy:
      resources:
        limits:
          cpus: '${ION_CPUS:-6}'
          memory: ${ION_MEMORY:-6G}
        reservations:
          cpus: '1'
          memory: 1G

    # Logging — override with a Docker logging driver if desired
    # Default: json-file (docker logs). Alternatives: syslog, fluentd, gelf
    # logging:
    #   driver: syslog
    #   options:
    #     syslog-address: "udp://syslog-host:514"
    #     syslog-facility: "local0"
    #     tag: "ion"

  # =============================================================================
  # Ollama - Local LLM Service (opt-in via: docker compose --profile ai up)
  # =============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ion-ollama
    restart: unless-stopped
    profiles:
      - ai

    # No ports exposed - Ollama is only accessible via ION's chat interface
    # Uncomment below if direct API access is needed for debugging
    # ports:
    #   - "${OLLAMA_PORT:-11434}:11434"

    volumes:
      # Persist downloaded models
      - ollama-models:/root/.ollama

    environment:
      # Concurrency settings - adjust based on available RAM
      # Each parallel slot needs ~2-4GB additional RAM
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
      - OLLAMA_MAX_LOADED_MODELS=1
      # Keep model in memory longer to reduce reload times
      - OLLAMA_KEEP_ALIVE=30m

    # Resource limits - adjust based on available RAM
    # For 32GB system, can increase to 16-20GB
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: ${OLLAMA_MEMORY:-8G}
        reservations:
          cpus: '1'
          memory: 2G

    # GPU support (uncomment if NVIDIA GPU available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    networks:
      - ion-net

  # =============================================================================
  # Seeder - One-shot data population
  # =============================================================================
  # Seeds KB articles and playbooks on first run, then exits.
  # Shares ion-data volume for .seeded marker persistence.
  # Skips automatically on subsequent starts.
  seeder:
    image: ixion36/ion:${ION_VERSION:-0.9.88}
    container_name: ion-seeder
    entrypoint: ["python", "/app/seed_all.py"]
    volumes:
      - ion-data:/data
    env_file:
      - .env
    environment:
      - ION_SEED_URL=http://ion:8000
    networks:
      - ion-net
    depends_on:
      ion:
        condition: service_healthy
    restart: "no"

networks:
  ion-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  ion-data:
    driver: local
  ollama-models:
    driver: local
