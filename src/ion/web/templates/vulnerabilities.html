{% extends "base.html" %}

{% block title %}Vulnerabilities - ION{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="icon-shield-alert"></i> Vulnerabilities &amp; Detection Coverage</h1>
    <div class="header-actions">
        <button class="btn btn-secondary" onclick="vlnRefresh()">Refresh</button>
        <button class="btn btn-primary" onclick="vlnOpenForm()">+ New Vulnerability</button>
    </div>
</div>

<div id="vln-content"><div class="vln-loading"><span class="vln-spinner"></span> Loading...</div></div>

<div class="vln-modal-bg" id="vln-modal-bg">
    <div class="vln-modal">
        <div class="vln-modal-head">
            <div class="vln-modal-title" id="vln-modal-title">New Vulnerability</div>
            <button class="vln-modal-close" onclick="vlnCloseForm()">&times;</button>
        </div>
        <form class="vln-modal-body" onsubmit="return vlnSubmit(event)">
            <input type="hidden" id="vln-id" value="">
            <div class="vln-row">
                <div class="vln-field"><label>Title *</label><input id="vln-title" type="text" required maxlength="300"></div>
                <div class="vln-field"><label>CVE ID</label><input id="vln-cve" type="text" maxlength="40" placeholder="CVE-2025-12345"></div>
            </div>
            <div class="vln-field"><label>Description</label><textarea id="vln-desc" rows="3"></textarea></div>
            <div class="vln-row">
                <div class="vln-field"><label>Severity</label>
                    <select id="vln-sev">
                        <option value="critical">Critical</option>
                        <option value="high">High</option>
                        <option value="medium" selected>Medium</option>
                        <option value="low">Low</option>
                        <option value="info">Info</option>
                    </select>
                </div>
                <div class="vln-field"><label>CVSS</label><input id="vln-cvss" type="number" step="0.1" min="0" max="10"></div>
                <div class="vln-field"><label>EPSS</label><input id="vln-epss" type="number" step="0.001" min="0" max="1"></div>
            </div>
            <div class="vln-row">
                <div class="vln-field"><label>Vendor</label><input id="vln-vendor" type="text" maxlength="120"></div>
                <div class="vln-field"><label>Product</label><input id="vln-product" type="text" maxlength="200"></div>
            </div>
            <div class="vln-row">
                <div class="vln-field"><label>Affected versions</label><input id="vln-versions" type="text" maxlength="255"></div>
                <div class="vln-field"><label>Published</label><input id="vln-published" type="date"></div>
            </div>
            <div class="vln-field"><label>ATT&CK Techniques (comma-separated)</label><input id="vln-tids" type="text" placeholder="T1190, T1059.001, T1505.003"></div>
            <div class="vln-row">
                <div class="vln-field vln-cb"><label><input type="checkbox" id="vln-exploit"> Exploit available</label></div>
                <div class="vln-field vln-cb"><label><input type="checkbox" id="vln-itw"> Exploited in the wild</label></div>
            </div>
            <div class="vln-field"><label>Notes</label><textarea id="vln-notes" rows="2"></textarea></div>
            <div class="vln-form-actions">
                <button type="button" class="btn btn-secondary" onclick="vlnCloseForm()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
.vln-loading{text-align:center;padding:60px;color:var(--text-secondary)}
.vln-spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:vln-spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes vln-spin{to{transform:rotate(360deg)}}
.vln-empty{text-align:center;padding:60px 24px;color:var(--text-secondary);font-style:italic}

.vln-banner{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:14px;font-size:.78rem;color:var(--text-secondary)}
.vln-banner.warn{border-color:rgba(210,153,34,.4);background:rgba(210,153,34,.1)}

.vln-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
.vln-stat{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;text-align:center}
.vln-stat-val{font-size:1.6rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--primary)}
.vln-stat-val.good{color:var(--mitre-covered,#3fb950)}
.vln-stat-val.warn{color:var(--sev-medium,#d29922)}
.vln-stat-val.crit{color:var(--sev-critical,#f85149)}
.vln-stat-label{font-size:.7rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

.vln-section{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
table.vln-table{width:100%;border-collapse:collapse}
.vln-table th{text-align:left;padding:10px 14px;font-size:.7rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;background:var(--bg-tertiary);border-bottom:1px solid var(--border)}
.vln-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:.85rem;color:var(--text-primary);vertical-align:middle}
.vln-table tr:last-child td{border-bottom:none}
.vln-table tr:hover td{background:rgba(88,166,255,.04)}

.vln-sev{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.62rem;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.vln-sev.critical{background:rgba(248,81,73,.18);color:var(--sev-critical,#f85149)}
.vln-sev.high{background:rgba(240,136,62,.18);color:var(--sev-high,#f0883e)}
.vln-sev.medium{background:rgba(210,153,34,.18);color:var(--sev-medium,#d29922)}
.vln-sev.low{background:rgba(99,110,123,.18);color:var(--text-secondary)}
.vln-sev.info{background:rgba(99,110,123,.1);color:var(--text-secondary);opacity:.8}

.vln-verdict{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.62rem;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.vln-verdict.covered{background:rgba(63,185,80,.18);color:var(--mitre-covered,#3fb950)}
.vln-verdict.partial{background:rgba(210,153,34,.18);color:var(--sev-medium,#d29922)}
.vln-verdict.blind{background:rgba(248,81,73,.18);color:var(--sev-critical,#f85149)}
.vln-verdict.unknown{background:rgba(99,110,123,.18);color:var(--text-secondary)}

.vln-cve{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--primary)}
.vln-tids{display:flex;gap:3px;flex-wrap:wrap}
.vln-tid{font-family:'JetBrains Mono',monospace;font-size:.62rem;background:var(--bg-tertiary);border:1px solid var(--border);padding:1px 5px;border-radius:var(--radius);color:var(--text-secondary)}
.vln-tid.covered{color:var(--mitre-covered,#3fb950);border-color:rgba(63,185,80,.4)}

.vln-actions{display:flex;gap:5px;justify-content:flex-end}
.vln-iconbtn{background:none;border:1px solid var(--border);color:var(--text-secondary);padding:3px 9px;border-radius:var(--radius);cursor:pointer;font-size:.7rem}
.vln-iconbtn:hover{border-color:var(--primary);color:var(--primary)}
.vln-iconbtn.danger:hover{border-color:var(--sev-critical,#f85149);color:var(--sev-critical,#f85149)}

/* Modal */
.vln-modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:none;z-index:1000;align-items:center;justify-content:center;padding:24px}
.vln-modal-bg.show{display:flex}
.vln-modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);max-width:700px;width:100%;max-height:90vh;overflow:auto}
.vln-modal-head{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg-secondary)}
.vln-modal-title{font-size:1.05rem;font-weight:700;color:var(--text-primary)}
.vln-modal-close{background:none;border:none;color:var(--text-secondary);font-size:1.4rem;cursor:pointer}
.vln-modal-body{padding:20px 22px}
.vln-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.vln-row.three{grid-template-columns:2fr 1fr 1fr}
.vln-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.vln-field label{font-size:.72rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px}
.vln-field input,.vln-field select,.vln-field textarea{background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-primary);padding:8px 10px;border-radius:var(--radius);font:inherit;font-size:.85rem}
.vln-field.vln-cb label{display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-weight:500;color:var(--text-primary);font-size:.85rem}
.vln-form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
</style>
<script>
const VLN_API = '/api/vulnerabilities';

function vlnEsc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

async function vlnRefresh() {
    const c = document.getElementById('vln-content');
    c.innerHTML = '<div class="vln-loading"><span class="vln-spinner"></span> Computing coverage...</div>';
    try {
        const r = await fetch(VLN_API + '/coverage');
        if (!r.ok) throw new Error('Failed to load coverage');
        vlnRender(await r.json());
    } catch (e) {
        c.innerHTML = `<div class="vln-loading" style="color:var(--sev-critical,#f85149)">${vlnEsc(e.message)}</div>`;
    }
}

function vlnRender(data) {
    const c = document.getElementById('vln-content');
    const summary = data.summary || {};
    const items = data.vulnerabilities || [];

    let banner = '';
    if (!summary.tide_enabled) {
        banner = '<div class="vln-banner warn"><strong>TIDE not configured.</strong> Coverage column shows "unknown" for every vulnerability. Configure TIDE in <a href="/settings#tide" style="color:inherit;text-decoration:underline">Settings</a> to compute live coverage.</div>';
    }

    let html = banner + `<div class="vln-summary">
        <div class="vln-stat"><div class="vln-stat-val">${summary.total||0}</div><div class="vln-stat-label">Tracked</div></div>
        <div class="vln-stat"><div class="vln-stat-val good">${summary.covered||0}</div><div class="vln-stat-label">Detectable</div></div>
        <div class="vln-stat"><div class="vln-stat-val warn">${summary.partial||0}</div><div class="vln-stat-label">Partial</div></div>
        <div class="vln-stat"><div class="vln-stat-val crit">${summary.blind||0}</div><div class="vln-stat-label">Blind</div></div>
    </div>`;

    if (!items.length) {
        html += `<div class="vln-section"><div class="vln-empty">
            <h3>No vulnerabilities tracked yet</h3>
            <p>Add a CVE, tag it with the ATT&CK techniques an attacker would use, and ION will tell you whether your TIDE rules can detect exploitation.</p>
            <button class="btn btn-primary" onclick="vlnOpenForm()" style="margin-top:14px">+ Add First Vulnerability</button>
        </div></div>`;
        c.innerHTML = html;
        return;
    }

    html += '<div class="vln-section"><table class="vln-table"><thead><tr>' +
        '<th>CVE / Title</th><th>Severity</th><th>CVSS</th><th>Status</th><th>Techniques</th><th>Detection</th><th></th>' +
        '</tr></thead><tbody>';

    for (const v of items) {
        const cov = v.coverage || {};
        const verdict = cov.verdict || 'unknown';
        const tids = (cov.by_tid || []).map(t =>
            `<span class="vln-tid ${t.covered ? 'covered' : ''}" title="${vlnEsc(t.rule_count + ' rules')}">${vlnEsc(t.tid)}</span>`
        ).join('');
        const cveBlock = v.cve_id
            ? `<div class="vln-cve">${vlnEsc(v.cve_id)}</div><div>${vlnEsc(v.title)}</div>`
            : `<div>${vlnEsc(v.title)}</div>`;
        const verdictLabel = verdict === 'covered' ? 'COVERED'
            : verdict === 'partial' ? 'PARTIAL'
            : verdict === 'blind' ? 'BLIND'
            : 'UNKNOWN';
        const verdictMeta = (cov.total > 0)
            ? `${cov.covered}/${cov.total} TTPs &middot; ${cov.rules} rules`
            : 'No TTPs set';
        html += `<tr>
            <td>${cveBlock}</td>
            <td><span class="vln-sev ${vlnEsc(v.severity)}">${vlnEsc(v.severity)}</span></td>
            <td>${v.cvss_score ?? '-'}</td>
            <td>${vlnEsc(v.status)}</td>
            <td><div class="vln-tids">${tids || '<span style="color:var(--text-secondary);font-size:.7rem">none</span>'}</div></td>
            <td><div><span class="vln-verdict ${vlnEsc(verdict)}">${verdictLabel}</span></div><div style="font-size:.66rem;color:var(--text-secondary);margin-top:3px">${vlnEsc(verdictMeta)}</div></td>
            <td><div class="vln-actions">
                <button class="vln-iconbtn" onclick="vlnEdit(${v.id})">Edit</button>
                <button class="vln-iconbtn danger" onclick="vlnDelete(${v.id})">Delete</button>
            </div></td>
        </tr>`;
    }
    html += '</tbody></table></div>';
    c.innerHTML = html;
}

function vlnOpenForm(v) {
    const m = document.getElementById('vln-modal-bg');
    document.getElementById('vln-modal-title').textContent = v ? 'Edit Vulnerability' : 'New Vulnerability';
    document.getElementById('vln-id').value = v ? v.id : '';
    document.getElementById('vln-title').value = v ? v.title : '';
    document.getElementById('vln-cve').value = v ? (v.cve_id || '') : '';
    document.getElementById('vln-desc').value = v ? (v.description || '') : '';
    document.getElementById('vln-sev').value = v ? v.severity : 'medium';
    document.getElementById('vln-cvss').value = v ? (v.cvss_score ?? '') : '';
    document.getElementById('vln-epss').value = v ? (v.epss_score ?? '') : '';
    document.getElementById('vln-vendor').value = v ? (v.vendor || '') : '';
    document.getElementById('vln-product').value = v ? (v.product || '') : '';
    document.getElementById('vln-versions').value = v ? (v.affected_versions || '') : '';
    document.getElementById('vln-published').value = v ? (v.published || '') : '';
    document.getElementById('vln-tids').value = v ? (v.mitre_techniques || []).join(', ') : '';
    document.getElementById('vln-exploit').checked = v ? !!v.exploit_available : false;
    document.getElementById('vln-itw').checked = v ? !!v.exploit_in_the_wild : false;
    document.getElementById('vln-notes').value = v ? (v.notes || '') : '';
    m.classList.add('show');
}

function vlnCloseForm() {
    document.getElementById('vln-modal-bg').classList.remove('show');
}

async function vlnEdit(id) {
    const r = await fetch(`${VLN_API}/${id}`);
    if (r.ok) vlnOpenForm(await r.json());
}

async function vlnDelete(id) {
    if (!confirm('Delete vulnerability?')) return;
    const r = await fetch(`${VLN_API}/${id}`, { method: 'DELETE' });
    if (r.ok) vlnRefresh();
}

async function vlnSubmit(ev) {
    ev.preventDefault();
    const id = document.getElementById('vln-id').value;
    const tidsRaw = document.getElementById('vln-tids').value;
    const cvssRaw = document.getElementById('vln-cvss').value;
    const epssRaw = document.getElementById('vln-epss').value;
    const publishedRaw = document.getElementById('vln-published').value;
    const body = {
        title: document.getElementById('vln-title').value.trim(),
        cve_id: document.getElementById('vln-cve').value.trim() || null,
        description: document.getElementById('vln-desc').value.trim() || null,
        severity: document.getElementById('vln-sev').value,
        cvss_score: cvssRaw ? parseFloat(cvssRaw) : null,
        epss_score: epssRaw ? parseFloat(epssRaw) : null,
        vendor: document.getElementById('vln-vendor').value.trim() || null,
        product: document.getElementById('vln-product').value.trim() || null,
        affected_versions: document.getElementById('vln-versions').value.trim() || null,
        published: publishedRaw || null,
        mitre_techniques: tidsRaw ? tidsRaw.split(',').map(s => s.trim().toUpperCase()).filter(Boolean) : [],
        exploit_available: document.getElementById('vln-exploit').checked,
        exploit_in_the_wild: document.getElementById('vln-itw').checked,
        notes: document.getElementById('vln-notes').value.trim() || null,
    };
    const url = id ? `${VLN_API}/${id}` : VLN_API;
    const method = id ? 'PATCH' : 'POST';
    const r = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (r.ok) {
        vlnCloseForm();
        vlnRefresh();
    } else {
        const j = await r.json().catch(() => ({}));
        alert('Save failed: ' + (j.detail || 'unknown'));
    }
    return false;
}

document.addEventListener('DOMContentLoaded', vlnRefresh);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') vlnCloseForm(); });
</script>
{% endblock %}
