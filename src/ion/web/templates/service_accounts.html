{% extends "base.html" %}

{% block title %}Service Accounts - ION{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="icon-key"></i> Service Account Tracker</h1>
    <div class="header-actions">
        <button class="btn btn-primary" onclick="saLoad()">Refresh</button>
    </div>
</div>

<div id="sa-risk-summary"></div>
<div id="sa-content"><div style="text-align:center;padding:40px;color:var(--text-secondary)"><span class="sa-spinner"></span> Loading service accounts...</div></div>
{% endblock %}

{% block scripts %}
<style>
.sa-spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:sa-spin .8s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes sa-spin{to{transform:rotate(360deg)}}

.sa-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.sa-stat{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;text-align:center;position:relative;overflow:hidden}
.sa-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary)}
.sa-stat-val{font-size:1.4rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--primary)}
.sa-stat-label{font-size:.7rem;color:var(--text-secondary);text-transform:uppercase;margin-top:4px}
.sa-stat.crit .sa-stat-val{color:var(--sev-critical)}.sa-stat.crit::before{background:var(--sev-critical)}
.sa-stat.warn .sa-stat-val{color:var(--sev-medium)}.sa-stat.warn::before{background:var(--sev-medium)}

.sa-section{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px}
.sa-table{width:100%;border-collapse:collapse;font-size:.82rem}
.sa-table th{text-align:left;padding:8px 10px;color:var(--text-secondary);font-weight:600;font-size:.72rem;text-transform:uppercase;border-bottom:1px solid var(--border)}
.sa-table td{padding:8px 10px;border-bottom:1px solid rgba(99,110,123,.15)}
.sa-table tr:hover td{background:rgba(0,212,255,.03)}
.mono{font-family:'JetBrains Mono',monospace;font-size:.78rem}

.sa-risk-badge{padding:2px 8px;border-radius:4px;font-size:.68rem;font-weight:700;text-transform:uppercase}
.sa-risk-badge.critical{background:var(--sev-critical-dim);color:var(--sev-critical)}
.sa-risk-badge.high{background:var(--sev-high-dim);color:var(--sev-high)}
.sa-risk-badge.medium{background:var(--sev-medium-dim);color:var(--sev-medium)}
.sa-risk-badge.low{background:var(--sev-low-dim);color:var(--sev-low)}

.sa-pw-age{font-family:'JetBrains Mono',monospace;font-size:.78rem}
.sa-pw-age.stale{color:var(--sev-critical);font-weight:700}
.sa-pw-age.warning{color:var(--sev-medium)}
.sa-pw-age.ok{color:var(--mitre-covered)}
</style>
<script>
const API = '/api/service-accounts';
function $(id){return document.getElementById(id)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

async function saLoad(){
    try {
        const [accounts, summary] = await Promise.all([
            fetch(API).then(r=>r.json()),
            fetch(API+'/risk-summary').then(r=>r.json()),
        ]);
        renderSummary(summary);
        renderAccounts(accounts.accounts || []);
    } catch(e) {
        $('sa-content').innerHTML = '<div style="text-align:center;padding:40px;color:var(--sev-critical)">Failed to load service accounts</div>';
    }
}

function renderSummary(s) {
    let html = '<div class="sa-stats">';
    html += `<div class="sa-stat"><div class="sa-stat-val">${s.total||0}</div><div class="sa-stat-label">Total Accounts</div></div>`;
    html += `<div class="sa-stat${(s.by_risk||{}).critical?' crit':''}"><div class="sa-stat-val">${(s.by_risk||{}).critical||0}</div><div class="sa-stat-label">Critical Risk</div></div>`;
    html += `<div class="sa-stat${(s.by_risk||{}).high?' crit':''}"><div class="sa-stat-val">${(s.by_risk||{}).high||0}</div><div class="sa-stat-label">High Risk</div></div>`;
    html += `<div class="sa-stat${s.stale_count?' warn':''}"><div class="sa-stat-val">${s.stale_count||0}</div><div class="sa-stat-label">Stale Passwords</div></div>`;
    html += `<div class="sa-stat${s.never_expires_count?' warn':''}"><div class="sa-stat-val">${s.never_expires_count||0}</div><div class="sa-stat-label">Never Expires</div></div>`;
    html += '</div>';
    $('sa-risk-summary').innerHTML = html;
}

function renderAccounts(accounts) {
    if (!accounts.length) {
        $('sa-content').innerHTML = '<div class="sa-section"><div style="text-align:center;padding:20px;color:var(--text-secondary)">No service accounts tracked yet. Add accounts via the API or settings.</div></div>';
        return;
    }

    let html = '<div class="sa-section"><table class="sa-table"><thead><tr><th>Account</th><th>Type</th><th>Owner</th><th>Department</th><th>Risk</th><th>Password Age</th><th>Status</th><th>Systems</th></tr></thead><tbody>';
    for (const a of accounts) {
        const pwAge = a.password_age_days != null ? a.password_age_days : null;
        const pwCls = pwAge === null ? '' : pwAge > 180 ? 'stale' : pwAge > 90 ? 'warning' : 'ok';
        const pwText = pwAge !== null ? pwAge + 'd' : 'Unknown';

        let systemsList = '';
        try { systemsList = JSON.parse(a.systems||'[]').slice(0,3).join(', '); } catch(e) { systemsList = a.systems||''; }

        html += `<tr>
            <td><strong>${esc(a.account_name)}</strong>${a.display_name ? '<br><span style="font-size:.72rem;color:var(--text-muted)">'+esc(a.display_name)+'</span>' : ''}</td>
            <td style="font-size:.78rem">${esc(a.account_type)}</td>
            <td style="font-size:.78rem">${esc(a.owner_name||'-')}</td>
            <td style="font-size:.78rem">${esc(a.department||'-')}</td>
            <td><span class="sa-risk-badge ${a.risk_level}">${esc(a.risk_level)}</span></td>
            <td><span class="sa-pw-age ${pwCls}">${pwText}</span>${a.password_never_expires ? '<br><span style="font-size:.65rem;color:var(--sev-medium)">NEVER EXPIRES</span>' : ''}</td>
            <td><span class="sev-badge ${a.status==='active'?'sev-low':'sev-critical'}">${esc(a.status)}</span></td>
            <td style="font-size:.72rem;max-width:150px;overflow:hidden;text-overflow:ellipsis">${esc(systemsList||'-')}</td>
        </tr>`;
    }
    html += '</tbody></table></div>';
    $('sa-content').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', saLoad);
</script>
{% endblock %}
