{% extends "base.html" %}

{% block title %}Knowledge Graph - ION{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="icon-share-2"></i> Knowledge Graph</h1>
    <div class="header-actions">
        <input id="kg-seed" type="text" placeholder="Pivot from observable value..." class="kg-seed-input">
        <label class="kg-cb"><input type="checkbox" id="kg-closed"> Include closed cases</label>
        <select id="kg-limit" class="kg-select">
            <option value="20">Last 20 cases</option>
            <option value="50" selected>Last 50</option>
            <option value="100">Last 100</option>
            <option value="200">Last 200</option>
        </select>
        <button class="btn btn-secondary" onclick="kgLoad()">Refresh</button>
    </div>
</div>

<div class="kg-meta" id="kg-meta">Loading...</div>
<div id="kg-canvas" class="kg-canvas">
    <div class="kg-loading"><span class="kg-spinner"></span> Loading vis-network...</div>
</div>
<div id="kg-detail" class="kg-detail"></div>
{% endblock %}

{% block scripts %}
<style>
.kg-loading{text-align:center;padding:60px;color:var(--text-secondary)}
.kg-spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:kg-spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes kg-spin{to{transform:rotate(360deg)}}

.kg-seed-input{background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-primary);padding:7px 12px;border-radius:var(--radius);font:inherit;font-size:.82rem;width:240px}
.kg-seed-input:focus{outline:none;border-color:var(--primary)}
.kg-select{background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-primary);padding:7px 10px;border-radius:var(--radius);font:inherit;font-size:.82rem}
.kg-cb{display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);font-size:.78rem}

.kg-meta{font-size:.78rem;color:var(--text-secondary);margin-bottom:10px;padding:10px 14px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-wrap:wrap;gap:18px;align-items:center}
.kg-meta strong{color:var(--text-primary);font-family:'JetBrains Mono',monospace}
.kg-legend{display:inline-flex;align-items:center;gap:14px;margin-left:auto;flex-wrap:wrap}
.kg-legend-item{display:inline-flex;align-items:center;gap:5px;font-size:.7rem}
.kg-legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;border:1px solid var(--border)}

.kg-canvas{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);height:620px;position:relative;overflow:hidden}

.kg-detail{margin-top:14px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;min-height:60px;color:var(--text-secondary);font-size:.85rem}
.kg-detail h3{font-size:1rem;color:var(--text-primary);margin:0 0 6px 0}
.kg-detail .kg-detail-meta{font-size:.72rem;color:var(--text-secondary);margin-bottom:6px}
.kg-detail .kg-detail-link{display:inline-block;margin-top:8px;color:var(--primary);font-size:.78rem;text-decoration:none}
.kg-detail .kg-detail-link:hover{text-decoration:underline}
.kg-detail.empty{display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-style:italic;font-size:.82rem}

@media (max-width: 768px) {
    .kg-seed-input { width: 100%; max-width: 280px; }
    .kg-canvas { height: 460px; }
    .kg-meta { font-size: .7rem; gap: 10px; }
    .kg-legend { margin-left: 0; width: 100%; }
}
@media (max-width: 480px) {
    .kg-canvas { height: 380px; }
}
</style>
<script src="/static/js/vis-network.min.js"></script>
<script>
const KG_API = '/api/knowledge-graph';
let kgNetwork = null;
let kgData = null;

function kgEsc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

async function kgLoad() {
    const limit = document.getElementById('kg-limit').value;
    const closed = document.getElementById('kg-closed').checked ? '&include_closed=true' : '';
    const seed = document.getElementById('kg-seed').value.trim();
    const seedQs = seed ? '&seed=' + encodeURIComponent(seed) : '';
    document.getElementById('kg-meta').textContent = 'Loading graph...';
    document.getElementById('kg-canvas').innerHTML = '<div class="kg-loading"><span class="kg-spinner"></span> Building graph...</div>';
    try {
        const r = await fetch(`${KG_API}?case_limit=${limit}${closed}${seedQs}`);
        if (!r.ok) throw new Error('Graph request failed');
        kgData = await r.json();
        kgRender(kgData);
    } catch (e) {
        document.getElementById('kg-canvas').innerHTML = `<div class="kg-loading" style="color:var(--sev-critical,#f85149)">${kgEsc(e.message)}</div>`;
    }
}

function kgRenderMeta(stats) {
    const counts = stats.by_type || {};
    const types = ['case', 'alert', 'observable', 'host', 'user', 'technique'];
    const colors = {
        case: '#58a6ff', alert: '#d29922', observable: '#3fb950',
        host: '#79c0ff', user: '#ffa657', technique: '#bc8cff', actor: '#f85149',
    };
    let legend = '';
    for (const t of types) {
        if (!counts[t]) continue;
        legend += `<span class="kg-legend-item"><span class="kg-legend-dot" style="background:${colors[t]}"></span>${kgEsc(t)} (${counts[t]})</span>`;
    }
    document.getElementById('kg-meta').innerHTML = `
        <span><strong>${stats.total_nodes||0}</strong> nodes</span>
        <span><strong>${stats.total_edges||0}</strong> edges</span>
        <span class="kg-legend">${legend}</span>
    `;
}

function kgRender(data) {
    kgRenderMeta(data.stats || {});
    if (!data.nodes || !data.nodes.length) {
        document.getElementById('kg-canvas').innerHTML = `<div class="kg-loading">No data to graph. Open some cases and link observables, then come back.</div>`;
        return;
    }

    const container = document.getElementById('kg-canvas');
    container.innerHTML = '';

    const nodes = new vis.DataSet(data.nodes.map(n => ({
        id: n.id,
        label: n.label,
        title: n.label,
        color: n.color,
        shape: n.shape,
        font: { color: '#c9d1d9', size: 12, face: 'Inter, sans-serif' },
        borderWidth: 2,
    })));
    const edges = new vis.DataSet(data.edges.map((e, i) => ({
        id: 'e' + i,
        from: e.from,
        to: e.to,
        label: e.label || '',
        color: { color: '#484f58', highlight: '#58a6ff' },
        font: { color: '#8b949e', size: 10, align: 'middle' },
        arrows: { to: { enabled: false } },
        smooth: { type: 'continuous' },
    })));

    const options = {
        physics: {
            forceAtlas2Based: { gravitationalConstant: -55, springLength: 90 },
            solver: 'forceAtlas2Based',
            stabilization: { iterations: 200 },
        },
        interaction: { hover: true, tooltipDelay: 150 },
        nodes: { borderWidthSelected: 3 },
    };

    kgNetwork = new vis.Network(container, { nodes, edges }, options);

    kgNetwork.on('selectNode', (params) => {
        const id = params.nodes[0];
        const node = (kgData.nodes || []).find(n => n.id === id);
        if (node) kgRenderDetail(node);
    });
    kgNetwork.on('deselectNode', () => kgClearDetail());

    kgClearDetail();
}

function kgRenderDetail(node) {
    const det = document.getElementById('kg-detail');
    det.classList.remove('empty');
    let meta = `Type: ${kgEsc(node.type)}`;
    if (node.severity) meta += ` &middot; Severity: ${kgEsc(node.severity)}`;
    if (node.status) meta += ` &middot; Status: ${kgEsc(node.status)}`;
    if (node.threat_level) meta += ` &middot; Threat: ${kgEsc(node.threat_level)}`;
    if (node.obs_type) meta += ` &middot; ${kgEsc(node.obs_type)}`;
    let link = '';
    if (node.url) {
        link = `<a class="kg-detail-link" href="${kgEsc(node.url)}">Open in detail view &rarr;</a>`;
    }
    det.innerHTML = `<h3>${kgEsc(node.label)}</h3><div class="kg-detail-meta">${meta}</div>${link}`;
}

function kgClearDetail() {
    const det = document.getElementById('kg-detail');
    det.classList.add('empty');
    det.innerHTML = 'Select a node to see details. Drag to pan, scroll to zoom.';
}

document.addEventListener('DOMContentLoaded', kgLoad);
document.getElementById('kg-seed').addEventListener('keydown', (e) => { if (e.key === 'Enter') kgLoad(); });
</script>
{% endblock %}
