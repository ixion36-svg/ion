{% extends "base.html" %}

{% block title %}Adversary Emulation - ION{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="icon-target"></i> Adversary Emulation Plans</h1>
    <div class="header-actions">
        <button class="btn btn-primary" onclick="emOpenForm()">+ New Plan</button>
    </div>
</div>

<div class="em-layout">
    <aside class="em-list" id="em-list">
        <div class="em-loading"><span class="em-spinner"></span> Loading...</div>
    </aside>
    <main class="em-detail" id="em-detail">
        <div class="em-empty">Select a plan to view its steps and run verification.</div>
    </main>
</div>

<div class="em-modal-bg" id="em-modal-bg">
    <div class="em-modal">
        <div class="em-modal-head">
            <div class="em-modal-title">New Emulation Plan</div>
            <button class="em-modal-close" onclick="emCloseForm()">&times;</button>
        </div>
        <form class="em-modal-body" onsubmit="return emCreate(event)">
            <div class="em-field"><label>Plan name *</label><input id="em-name" type="text" required maxlength="200" placeholder="APT38 Quarterly Drill"></div>
            <div class="em-row">
                <div class="em-field"><label>Threat actor</label><input id="em-actor" type="text" maxlength="120" placeholder="APT38"></div>
                <div class="em-field"><label>Tags (comma-separated)</label><input id="em-tags" type="text" placeholder="purple-team, q2-2026"></div>
            </div>
            <div class="em-field"><label>Description</label><textarea id="em-desc" rows="3"></textarea></div>
            <div class="em-form-actions">
                <button type="button" class="btn btn-secondary" onclick="emCloseForm()">Cancel</button>
                <button type="submit" class="btn btn-primary">Create</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
.em-loading{text-align:center;padding:60px;color:var(--text-secondary)}
.em-spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:em-spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes em-spin{to{transform:rotate(360deg)}}
.em-empty{text-align:center;padding:60px 24px;color:var(--text-secondary);font-style:italic}

.em-layout{display:grid;grid-template-columns:300px 1fr;gap:14px;height:calc(100vh - 180px);min-height:500px}
@media (max-width: 900px){.em-layout{grid-template-columns:1fr;height:auto}}
.em-list{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:8px;overflow-y:auto}
.em-detail{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 22px;overflow-y:auto}

.em-card{padding:10px 12px;border-radius:var(--radius);margin-bottom:6px;cursor:pointer;border:1px solid transparent;background:var(--bg-tertiary)}
.em-card:hover{border-color:var(--border)}
.em-card.active{border-color:var(--primary);background:rgba(88,166,255,.08)}
.em-card-title{font-size:.85rem;font-weight:700;color:var(--text-primary);line-height:1.2}
.em-card-actor{font-size:.7rem;color:var(--text-secondary);margin-top:2px}
.em-card-bar{height:4px;background:rgba(99,110,123,.18);border-radius:2px;overflow:hidden;margin-top:6px}
.em-card-bar-fill{height:100%}
.em-card-meta{display:flex;justify-content:space-between;gap:8px;margin-top:5px;font-size:.66rem;color:var(--text-secondary)}

.em-detail h2{font-size:1.05rem;color:var(--text-primary);margin:0 0 4px 0}
.em-detail-sub{font-size:.78rem;color:var(--text-secondary);margin-bottom:14px}
.em-detail-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px}
.em-detail-meta-item{background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;text-align:center}
.em-detail-meta-val{font-size:1.2rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--primary)}
.em-detail-meta-val.passed{color:var(--mitre-covered,#3fb950)}
.em-detail-meta-val.failed{color:var(--sev-critical,#f85149)}
.em-detail-meta-val.partial{color:var(--sev-medium,#d29922)}
.em-detail-meta-label{font-size:.62rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

.em-step{background:var(--bg-tertiary);border:1px solid var(--border);border-left-width:3px;border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.em-step.passed{border-left-color:var(--mitre-covered,#3fb950)}
.em-step.failed{border-left-color:var(--sev-critical,#f85149)}
.em-step.partial{border-left-color:var(--sev-medium,#d29922)}
.em-step.pending{border-left-color:var(--text-secondary)}
.em-step.skipped{border-left-color:var(--text-secondary);opacity:.6}
.em-step-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.em-step-title{font-size:.92rem;font-weight:700;color:var(--text-primary)}
.em-step-result{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:99px;flex-shrink:0}
.em-step-result.passed{background:rgba(63,185,80,.2);color:var(--mitre-covered,#3fb950)}
.em-step-result.failed{background:rgba(248,81,73,.2);color:var(--sev-critical,#f85149)}
.em-step-result.partial{background:rgba(210,153,34,.2);color:var(--sev-medium,#d29922)}
.em-step-result.pending{background:rgba(99,110,123,.2);color:var(--text-secondary)}
.em-step-tids{display:flex;gap:4px;flex-wrap:wrap;margin:5px 0}
.em-step-tids span{font-family:'JetBrains Mono',monospace;font-size:.65rem;background:var(--bg-secondary);border:1px solid var(--border);padding:2px 6px;border-radius:var(--radius);color:var(--primary)}
.em-step-meta{font-size:.7rem;color:var(--text-secondary);margin-top:6px}
.em-step-actions{display:flex;gap:6px;margin-top:8px}
.em-step-actions button{background:none;border:1px solid var(--border);color:var(--text-secondary);padding:3px 9px;border-radius:var(--radius);cursor:pointer;font-size:.7rem}
.em-step-actions button:hover{border-color:var(--primary);color:var(--primary)}
.em-step-actions button.danger:hover{border-color:var(--sev-critical,#f85149);color:var(--sev-critical,#f85149)}

.em-add-step{background:var(--bg-tertiary);border:1px dashed var(--border);border-radius:var(--radius);padding:12px;margin-top:10px}
.em-add-step input{width:100%;background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-primary);padding:6px 10px;border-radius:var(--radius);font:inherit;font-size:.78rem;margin-bottom:6px}
.em-add-step .em-row{display:grid;grid-template-columns:1fr 1fr auto;gap:6px}

/* Modal */
.em-modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:none;z-index:1000;align-items:center;justify-content:center;padding:24px}
.em-modal-bg.show{display:flex}
.em-modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);max-width:560px;width:100%;max-height:90vh;overflow:auto}
.em-modal-head{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.em-modal-title{font-size:1.05rem;font-weight:700;color:var(--text-primary)}
.em-modal-close{background:none;border:none;color:var(--text-secondary);font-size:1.4rem;cursor:pointer}
.em-modal-body{padding:20px 22px}
.em-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.em-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.em-field label{font-size:.72rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px}
.em-field input,.em-field textarea{background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-primary);padding:8px 10px;border-radius:var(--radius);font:inherit;font-size:.85rem}
.em-form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
</style>
<script>
const EM_API = '/api/emulation';
let emCache = [];
let currentPlan = null;

function emEsc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

async function emRefresh() {
    const list = document.getElementById('em-list');
    list.innerHTML = '<div class="em-loading"><span class="em-spinner"></span> Loading...</div>';
    try {
        const r = await fetch(EM_API + '/plans');
        emCache = (await r.json()).plans || [];
        emRenderList();
    } catch (e) {
        list.innerHTML = `<div class="em-loading" style="color:var(--sev-critical,#f85149)">${emEsc(e.message)}</div>`;
    }
}

function emRenderList() {
    const list = document.getElementById('em-list');
    if (!emCache.length) {
        list.innerHTML = '<div class="em-empty" style="padding:30px 12px">No plans yet. Click + New Plan above.</div>';
        return;
    }
    let html = `<div style="padding:8px 6px;font-size:.7rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;font-weight:700">${emCache.length} Plans</div>`;
    for (const p of emCache) {
        const pct = p.coverage_pct || 0;
        const color = pct >= 80 ? '#3fb950' : pct >= 50 ? '#d29922' : '#f85149';
        const active = currentPlan && currentPlan.id === p.id ? 'active' : '';
        html += `<div class="em-card ${active}" onclick="emSelect(${p.id})">
            <div class="em-card-title">${emEsc(p.name)}</div>
            <div class="em-card-actor">${emEsc(p.actor_name || '-')} &middot; ${emEsc(p.status)}</div>
            <div class="em-card-bar"><div class="em-card-bar-fill" style="width:${pct}%;background:${color}"></div></div>
            <div class="em-card-meta">
                <span>${p.passed_count||0}/${p.step_count||0} passed</span>
                <span>${pct}%</span>
            </div>
        </div>`;
    }
    list.innerHTML = html;
}

async function emSelect(id) {
    const r = await fetch(`${EM_API}/plans/${id}`);
    if (!r.ok) return;
    currentPlan = await r.json();
    emRenderDetail();
    emRenderList();
}

function emRenderDetail() {
    const det = document.getElementById('em-detail');
    if (!currentPlan) {
        det.innerHTML = '<div class="em-empty">Select a plan to view its steps and run verification.</div>';
        return;
    }
    const p = currentPlan;
    let html = `<h2>${emEsc(p.name)}</h2>
    <div class="em-detail-sub">
        Actor: <strong>${emEsc(p.actor_name || '-')}</strong> &middot;
        Status: <strong>${emEsc(p.status)}</strong>
        <button class="btn btn-secondary btn-sm" onclick="emSetStatus('running')" style="margin-left:8px;padding:3px 10px;font-size:.7rem">Mark Running</button>
        <button class="btn btn-secondary btn-sm" onclick="emSetStatus('completed')" style="padding:3px 10px;font-size:.7rem">Mark Completed</button>
        <button class="btn btn-secondary btn-sm" onclick="emDeletePlan()" style="padding:3px 10px;font-size:.7rem;color:var(--sev-critical,#f85149)">Delete</button>
    </div>
    <div class="em-detail-meta">
        <div class="em-detail-meta-item"><div class="em-detail-meta-val">${p.coverage_pct||0}%</div><div class="em-detail-meta-label">Coverage</div></div>
        <div class="em-detail-meta-item"><div class="em-detail-meta-val passed">${p.passed_count||0}</div><div class="em-detail-meta-label">Passed</div></div>
        <div class="em-detail-meta-item"><div class="em-detail-meta-val failed">${p.failed_count||0}</div><div class="em-detail-meta-label">Failed</div></div>
        <div class="em-detail-meta-item"><div class="em-detail-meta-val partial">${p.partial_count||0}</div><div class="em-detail-meta-label">Partial</div></div>
        <div class="em-detail-meta-item"><div class="em-detail-meta-val">${p.step_count||0}</div><div class="em-detail-meta-label">Total Steps</div></div>
    </div>`;

    if (p.description) html += `<p style="color:var(--text-secondary);font-size:.85rem;margin-bottom:14px">${emEsc(p.description)}</p>`;

    for (const s of p.steps || []) {
        const tids = (s.mitre_techniques || []).map(t => `<span>${emEsc(t)}</span>`).join('');
        html += `<div class="em-step ${emEsc(s.result)}">
            <div class="em-step-head">
                <div class="em-step-title">${s.order_index + 1}. ${emEsc(s.title)}</div>
                <span class="em-step-result ${emEsc(s.result)}">${emEsc(s.result)}</span>
            </div>
            ${s.description ? `<div style="font-size:.78rem;color:var(--text-secondary);margin-bottom:5px">${emEsc(s.description)}</div>` : ''}
            ${tids ? `<div class="em-step-tids">${tids}</div>` : ''}
            ${s.procedure ? `<div style="font-family:'JetBrains Mono',monospace;font-size:.72rem;background:var(--bg-secondary);border-radius:var(--radius);padding:6px 10px;margin-top:5px;color:var(--text-secondary)">${emEsc(s.procedure)}</div>` : ''}
            ${s.matched_alert_count != null ? `<div class="em-step-meta">Last verification: <strong>${s.matched_alert_count}</strong> matching alerts${s.matched_rule_names && s.matched_rule_names.length ? ' &middot; rules: ' + s.matched_rule_names.slice(0,3).map(emEsc).join(', ') : ''}</div>` : ''}
            <div class="em-step-actions">
                <button onclick="emExecute(${s.id})">Mark Executed</button>
                <button onclick="emVerify(${s.id})">Verify in ES</button>
                <button class="danger" onclick="emDeleteStep(${s.id})">Delete</button>
            </div>
        </div>`;
    }

    html += `<div class="em-add-step">
        <input id="em-step-title" type="text" placeholder="New step title">
        <div class="em-row">
            <input id="em-step-tids" type="text" placeholder="Techniques: T1003, T1059.001">
            <input id="em-step-rules" type="text" placeholder="Expected rule names (optional)">
            <button class="btn btn-primary btn-sm" onclick="emAddStep()" style="padding:6px 16px">+ Add Step</button>
        </div>
    </div>`;

    det.innerHTML = html;
}

function emOpenForm() {
    document.getElementById('em-modal-bg').classList.add('show');
}

function emCloseForm() {
    document.getElementById('em-modal-bg').classList.remove('show');
}

async function emCreate(ev) {
    ev.preventDefault();
    const tagsRaw = document.getElementById('em-tags').value;
    const body = {
        name: document.getElementById('em-name').value.trim(),
        actor_name: document.getElementById('em-actor').value.trim() || null,
        description: document.getElementById('em-desc').value.trim() || null,
        tags: tagsRaw ? tagsRaw.split(',').map(s => s.trim()).filter(Boolean) : [],
    };
    const r = await fetch(EM_API + '/plans', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (r.ok) {
        const p = await r.json();
        emCloseForm();
        await emRefresh();
        emSelect(p.id);
    }
    return false;
}

async function emSetStatus(status) {
    if (!currentPlan) return;
    const r = await fetch(`${EM_API}/plans/${currentPlan.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
    if (r.ok) {
        currentPlan = await r.json();
        emRenderDetail();
        emRefresh();
    }
}

async function emDeletePlan() {
    if (!currentPlan || !confirm('Delete plan and all steps?')) return;
    const r = await fetch(`${EM_API}/plans/${currentPlan.id}`, { method: 'DELETE' });
    if (r.ok) {
        currentPlan = null;
        emRefresh();
        document.getElementById('em-detail').innerHTML = '<div class="em-empty">Plan deleted.</div>';
    }
}

async function emAddStep() {
    if (!currentPlan) return;
    const title = document.getElementById('em-step-title').value.trim();
    if (!title) return;
    const tids = document.getElementById('em-step-tids').value;
    const rules = document.getElementById('em-step-rules').value;
    const body = {
        title,
        mitre_techniques: tids ? tids.split(',').map(s => s.trim()).filter(Boolean) : [],
        expected_rules: rules ? rules.split(',').map(s => s.trim()).filter(Boolean) : [],
    };
    const r = await fetch(`${EM_API}/plans/${currentPlan.id}/steps`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (r.ok) emSelect(currentPlan.id);
}

async function emExecute(stepId) {
    await fetch(`${EM_API}/steps/${stepId}/execute`, { method: 'POST' });
    if (currentPlan) emSelect(currentPlan.id);
}

async function emVerify(stepId) {
    const r = await fetch(`${EM_API}/steps/${stepId}/verify?lookback_hours=4`, { method: 'POST' });
    const j = await r.json();
    if (j.error) alert('Verify warning: ' + j.error);
    if (currentPlan) emSelect(currentPlan.id);
}

async function emDeleteStep(stepId) {
    if (!confirm('Delete step?')) return;
    await fetch(`${EM_API}/steps/${stepId}`, { method: 'DELETE' });
    if (currentPlan) emSelect(currentPlan.id);
}

document.addEventListener('DOMContentLoaded', emRefresh);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') emCloseForm(); });
</script>
{% endblock %}
