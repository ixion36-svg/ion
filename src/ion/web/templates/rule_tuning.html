{% extends "base.html" %}

{% block title %}Rule Tuning - ION{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="icon-settings-2"></i> Rule Tuning Feedback Loop</h1>
    <div class="header-actions">
        <button class="btn btn-primary" onclick="rtLoad()">Refresh</button>
    </div>
</div>

<div class="rt-tabs" id="rt-tabs">
    <button class="rt-tab active" data-tab="overview" onclick="rtSwitch('overview')">Overview</button>
    <button class="rt-tab" data-tab="fp" onclick="rtSwitch('fp')">FP-Heavy Rules</button>
    <button class="rt-tab" data-tab="highval" onclick="rtSwitch('highval')">High-Value Rules</button>
    <button class="rt-tab" data-tab="noisy" onclick="rtSwitch('noisy')">Noisy Rules</button>
    <button class="rt-tab" data-tab="silent" onclick="rtSwitch('silent')">Silent Rules</button>
    <button class="rt-tab" data-tab="recs" onclick="rtSwitch('recs')">Recommendations</button>
</div>

<div class="rt-panel active" id="rt-panel-overview"></div>
<div class="rt-panel" id="rt-panel-fp"></div>
<div class="rt-panel" id="rt-panel-highval"></div>
<div class="rt-panel" id="rt-panel-noisy"></div>
<div class="rt-panel" id="rt-panel-silent"></div>
<div class="rt-panel" id="rt-panel-recs"></div>
{% endblock %}

{% block scripts %}
<style>
.rt-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.rt-tab{padding:10px 20px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-secondary);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s}
.rt-tab:hover{color:var(--text-primary)}
.rt-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.rt-panel{display:none}
.rt-panel.active{display:block}

.rt-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.rt-stat{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;text-align:center;position:relative;overflow:hidden}
.rt-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary)}
.rt-stat-val{font-size:1.5rem;font-weight:700;color:var(--primary);font-family:'JetBrains Mono',monospace}
.rt-stat-label{font-size:.72rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.rt-stat.crit .rt-stat-val{color:var(--sev-critical)}.rt-stat.crit::before{background:var(--sev-critical)}
.rt-stat.green .rt-stat-val{color:var(--mitre-covered)}.rt-stat.green::before{background:var(--mitre-covered)}
.rt-stat.warn .rt-stat-val{color:var(--sev-medium)}.rt-stat.warn::before{background:var(--sev-medium)}

.rt-section{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px}
.rt-section-title{font-size:.8rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.rt-section-title i{color:var(--primary)}

.rt-table{width:100%;border-collapse:collapse;font-size:.82rem}
.rt-table th{text-align:left;padding:8px 10px;color:var(--text-secondary);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.rt-table td{padding:8px 10px;border-bottom:1px solid rgba(99,110,123,.15);color:var(--text-primary)}
.rt-table tr:hover td{background:rgba(0,212,255,.03)}
.mono{font-family:'JetBrains Mono',monospace;font-size:.78rem}

.rt-bar{display:flex;height:16px;border-radius:3px;overflow:hidden;background:rgba(99,110,123,.2);min-width:100px}
.rt-bar-seg{height:100%;min-width:0;transition:width .3s}

.rt-rec{padding:10px 14px;border-radius:var(--radius);margin-bottom:6px;font-size:.85rem;display:flex;align-items:center;gap:10px}
.rt-rec.high{background:var(--sev-high-bg);border-left:3px solid var(--sev-high);color:var(--sev-high)}
.rt-rec.medium{background:var(--sev-medium-bg);border-left:3px solid var(--sev-medium);color:var(--sev-medium)}
.rt-rec.low{background:var(--sev-low-bg);border-left:3px solid var(--sev-low);color:var(--sev-low)}
.rt-rec-type{font-size:.68rem;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:rgba(0,0,0,.2)}

.rt-loading{text-align:center;padding:60px;color:var(--text-secondary)}
.rt-spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:rt-spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes rt-spin{to{transform:rotate(360deg)}}

.rt-mitre-chip{display:inline-block;padding:1px 6px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.25);border-radius:3px;font-size:.68rem;font-family:'JetBrains Mono',monospace;color:var(--primary);margin:1px}
</style>
<script>
const API = '/api/rule-tuning';
function $(id){return document.getElementById(id)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

let _data = null;

function rtSwitch(tab) {
    document.querySelectorAll('.rt-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.querySelectorAll('.rt-panel').forEach(p => p.classList.remove('active'));
    $('rt-panel-'+tab).classList.add('active');
    if (_data) renderTab(tab);
}

async function rtLoad() {
    for (const p of document.querySelectorAll('.rt-panel')) p.innerHTML = '<div class="rt-loading"><span class="rt-spinner"></span> Analyzing rules...</div>';
    try {
        const r = await fetch(API + '/analysis');
        if (!r.ok) throw new Error('Failed');
        _data = await r.json();
        if (!_data.enabled) {
            $('rt-panel-overview').innerHTML = `<div class="rt-loading" style="color:var(--sev-critical)">${esc(_data.error || 'Service not available')}</div>`;
            return;
        }
        renderTab('overview');
    } catch(e) {
        $('rt-panel-overview').innerHTML = `<div class="rt-loading" style="color:var(--sev-critical)">${esc(e.message)}</div>`;
    }
}

function renderTab(tab) {
    const d = _data;
    if (tab === 'overview') renderOverview(d);
    else if (tab === 'fp') renderRuleTable('fp', d.fp_heavy, 'FP-Heavy Rules', 'Rules with high false positive rates — candidates for tuning');
    else if (tab === 'highval') renderRuleTable('highval', d.high_value, 'High-Value Rules', 'Rules consistently producing true positives');
    else if (tab === 'noisy') renderRuleTable('noisy', d.noisy, 'Noisy Rules', 'High-volume rules with low true positive rates');
    else if (tab === 'silent') renderSilent(d.silent);
    else if (tab === 'recs') renderRecs(d.recommendations);
}

function renderOverview(d) {
    const s = d.summary;
    let html = '<div class="rt-stats">';
    html += rtStat(s.total_tide_rules, 'TIDE Rules', '');
    html += rtStat(s.rules_with_closures, 'Rules with Data', '');
    html += rtStat(s.silent_rules, 'Silent Rules', s.silent_rules > 100 ? 'warn' : '');
    html += rtStat(s.total_closures, 'Total Closures', '');
    html += rtStat(s.total_true_positive, 'True Positives', 'green');
    html += rtStat(s.total_false_positive, 'False Positives', s.total_false_positive > 10 ? 'crit' : '');
    html += rtStat(s.overall_fp_rate + '%', 'FP Rate', s.overall_fp_rate > 50 ? 'crit' : s.overall_fp_rate > 30 ? 'warn' : '');
    html += rtStat(d.recommendations.length, 'Recommendations', d.recommendations.length > 0 ? 'warn' : 'green');
    html += '</div>';

    // TP/FP ratio bar
    if (s.total_closures > 0) {
        html += '<div class="rt-section"><div class="rt-section-title"><i class="icon-bar-chart-2"></i> Overall Closure Breakdown</div>';
        const tpPct = Math.round(s.total_true_positive / s.total_closures * 100);
        const fpPct = Math.round(s.total_false_positive / s.total_closures * 100);
        const otherPct = 100 - tpPct - fpPct;
        html += `<div class="rt-bar" style="height:24px;font-size:.72rem;font-weight:700;color:#fff;margin-bottom:8px">
            <div class="rt-bar-seg" style="width:${tpPct}%;background:var(--mitre-covered);display:flex;align-items:center;justify-content:center">${tpPct > 5 ? tpPct+'% TP' : ''}</div>
            <div class="rt-bar-seg" style="width:${fpPct}%;background:var(--sev-critical);display:flex;align-items:center;justify-content:center">${fpPct > 5 ? fpPct+'% FP' : ''}</div>
            <div class="rt-bar-seg" style="width:${otherPct}%;background:var(--sev-low);display:flex;align-items:center;justify-content:center">${otherPct > 5 ? otherPct+'% Other' : ''}</div>
        </div>`;
        html += '<div style="display:flex;gap:16px;font-size:.78rem;color:var(--text-secondary)">';
        html += `<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--mitre-covered);margin-right:4px"></span>True Positive: ${s.total_true_positive}</span>`;
        html += `<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--sev-critical);margin-right:4px"></span>False Positive: ${s.total_false_positive}</span>`;
        html += `<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--sev-low);margin-right:4px"></span>Other: ${s.total_closures - s.total_true_positive - s.total_false_positive}</span>`;
        html += '</div></div>';
    }

    // Top recommendations preview
    if (d.recommendations.length) {
        html += '<div class="rt-section"><div class="rt-section-title"><i class="icon-zap"></i> Top Recommendations</div>';
        for (const rec of d.recommendations.slice(0, 5)) {
            html += `<div class="rt-rec ${rec.severity}">
                <span class="rt-rec-type">${esc(rec.type)}</span>
                <strong>${esc(rec.rule_name)}</strong>
                <span style="flex:1"></span>
                <span style="font-size:.78rem">${esc(rec.message)}</span>
            </div>`;
        }
        if (d.recommendations.length > 5) html += `<div style="font-size:.78rem;color:var(--text-secondary);margin-top:8px">+ ${d.recommendations.length - 5} more — see Recommendations tab</div>`;
        html += '</div>';
    }

    $('rt-panel-overview').innerHTML = html;
}

function renderRuleTable(tab, rules, title, subtitle) {
    const panel = $('rt-panel-'+tab);
    if (!rules || !rules.length) { panel.innerHTML = `<div class="rt-section"><div class="rt-section-title">${esc(title)}</div><div style="color:var(--text-secondary);padding:20px;text-align:center">No rules in this category.</div></div>`; return; }

    let html = `<div class="rt-section"><div class="rt-section-title"><i class="icon-list"></i> ${esc(title)}</div>`;
    if (subtitle) html += `<div style="font-size:.78rem;color:var(--text-secondary);margin-bottom:12px">${esc(subtitle)}</div>`;

    html += '<table class="rt-table"><thead><tr><th>Rule Name</th><th>Total</th><th>TP</th><th>FP</th><th>BTP</th><th>FP Rate</th><th>TP/FP Ratio</th><th>TIDE Quality</th><th>Severity</th><th>MITRE</th></tr></thead><tbody>';
    for (const r of rules) {
        const fpBar = r.total_closures > 0 ? renderMiniBar(r.true_positive, r.false_positive, r.benign_true_positive, r.other || 0) : '-';
        html += `<tr>
            <td style="font-weight:600;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.rule_name)}">${esc(r.rule_name)}</td>
            <td class="mono">${r.total_closures}</td>
            <td class="mono" style="color:var(--mitre-covered)">${r.true_positive}</td>
            <td class="mono" style="color:var(--sev-critical)">${r.false_positive}</td>
            <td class="mono">${r.benign_true_positive}</td>
            <td class="mono" style="color:${r.fp_rate >= 60 ? 'var(--sev-critical)' : r.fp_rate >= 30 ? 'var(--sev-medium)' : 'var(--text-primary)'}">${r.fp_rate}%</td>
            <td>${fpBar}</td>
            <td class="mono">${r.tide_quality != null ? r.tide_quality : '-'}</td>
            <td>${r.tide_severity ? `<span class="sev-badge sev-${r.tide_severity}">${esc(r.tide_severity)}</span>` : '-'}</td>
            <td>${(r.mitre_ids||[]).slice(0,3).map(t=>`<span class="rt-mitre-chip">${esc(t)}</span>`).join('')}${(r.mitre_ids||[]).length>3?' +'+((r.mitre_ids||[]).length-3):''}</td>
        </tr>`;
    }
    html += '</tbody></table></div>';
    panel.innerHTML = html;
}

function renderMiniBar(tp, fp, btp, other) {
    const total = tp + fp + btp + other;
    if (!total) return '-';
    return `<div class="rt-bar" style="height:12px;min-width:80px">
        <div class="rt-bar-seg" style="width:${tp/total*100}%;background:var(--mitre-covered)" title="TP: ${tp}"></div>
        <div class="rt-bar-seg" style="width:${fp/total*100}%;background:var(--sev-critical)" title="FP: ${fp}"></div>
        <div class="rt-bar-seg" style="width:${btp/total*100}%;background:var(--sev-medium)" title="BTP: ${btp}"></div>
        <div class="rt-bar-seg" style="width:${other/total*100}%;background:var(--sev-low)" title="Other: ${other}"></div>
    </div>`;
}

function renderSilent(rules) {
    const panel = $('rt-panel-silent');
    if (!rules || !rules.length) { panel.innerHTML = '<div class="rt-section"><div style="color:var(--text-secondary);padding:20px;text-align:center">No silent rules found.</div></div>'; return; }

    let html = `<div class="rt-section"><div class="rt-section-title"><i class="icon-volume-x"></i> Silent Rules (${rules.length})</div>`;
    html += '<div style="font-size:.78rem;color:var(--text-secondary);margin-bottom:12px">Enabled rules in TIDE with no closure data in ION. These may be misconfigured, have no matching data sources, or simply haven\'t triggered.</div>';
    html += '<table class="rt-table"><thead><tr><th>Rule Name</th><th>TIDE Quality</th><th>Severity</th><th>MITRE</th></tr></thead><tbody>';
    for (const r of rules) {
        html += `<tr>
            <td style="max-width:350px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.rule_name)}">${esc(r.rule_name)}</td>
            <td class="mono">${r.tide_quality != null ? r.tide_quality : '-'}</td>
            <td>${r.tide_severity ? `<span class="sev-badge sev-${r.tide_severity}">${esc(r.tide_severity)}</span>` : '-'}</td>
            <td>${(r.mitre_ids||[]).slice(0,3).map(t=>`<span class="rt-mitre-chip">${esc(t)}</span>`).join('')}</td>
        </tr>`;
    }
    html += '</tbody></table></div>';
    panel.innerHTML = html;
}

function renderRecs(recs) {
    const panel = $('rt-panel-recs');
    if (!recs || !recs.length) { panel.innerHTML = '<div class="rt-section"><div style="color:var(--mitre-covered);padding:20px;text-align:center"><i class="icon-check-circle"></i> No tuning recommendations — all rules look healthy.</div></div>'; return; }

    let html = `<div class="rt-section"><div class="rt-section-title"><i class="icon-zap"></i> Tuning Recommendations (${recs.length})</div>`;
    for (const rec of recs) {
        html += `<div class="rt-rec ${rec.severity}">
            <span class="rt-rec-type">${esc(rec.type)}</span>
            <div style="flex:1">
                <strong>${esc(rec.rule_name)}</strong>
                <div style="font-size:.78rem;margin-top:2px;opacity:.85">${esc(rec.message)}</div>
            </div>
        </div>`;
    }
    html += '</div>';
    panel.innerHTML = html;
}

function rtStat(val, label, cls) {
    return `<div class="rt-stat ${cls}"><div class="rt-stat-val">${val}</div><div class="rt-stat-label">${label}</div></div>`;
}

document.addEventListener('DOMContentLoaded', rtLoad);
</script>
{% endblock %}
