{% extends "base.html" %}

{% block title %}Notes - ION{% endblock %}

{% block content %}
<div class="ion-tw ion-tw-page text-slate-200 overflow-x-hidden">
<div class="relative z-10 mx-auto max-w-[1920px] w-full px-4 sm:px-6 lg:px-10 xl:px-14 py-10 md:py-14">
<style>
/* ── Override container max-width for full-page layout ── */
.container:has(.notes-page){max-width:100%;padding:0;margin:0}

/* ── Page layout ──────────────────────────────────────── */
.notes-page{display:flex;gap:0;height:calc(100vh - 80px);background:var(--bg-primary);border-top:1px solid var(--border);overflow:hidden}

/* ── Note list sidebar ────────────────────────────────── */
.notes-sidebar{width:300px;min-width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.notes-sidebar-header{padding:12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.notes-sidebar-title{display:flex;align-items:center;justify-content:space-between}
.notes-sidebar-title h3{margin:0;font-size:.95rem;color:var(--text-primary)}
.notes-search-row{display:flex;gap:6px}
.notes-search{flex:1;padding:6px 10px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:.82rem}
.notes-search::placeholder{color:var(--text-secondary)}
.notes-btn-new{padding:6px 14px;background:var(--primary);color:#000;border:none;border-radius:4px;cursor:pointer;font-size:.82rem;font-weight:600;white-space:nowrap}
.notes-btn-new:hover{opacity:.85}

/* ── Folder tree ─────────────────────────────────────── */
.notes-folder-tree{padding:6px 0;border-bottom:1px solid var(--border);overflow-y:auto;max-height:40%;flex-shrink:0}
.notes-folder-tree::-webkit-scrollbar{width:6px}
.notes-folder-tree::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.folder-tree-header{display:flex;align-items:center;justify-content:space-between;padding:4px 12px 6px}
.folder-tree-header span{font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);font-weight:600}
.folder-tree-add{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:.85rem;padding:2px 6px;border-radius:3px;line-height:1}
.folder-tree-add:hover{color:var(--text-primary);background:var(--bg-secondary)}
.folder-item{display:flex;align-items:center;padding:4px 12px;cursor:pointer;font-size:.82rem;color:var(--text-secondary);transition:background .12s;user-select:none;position:relative}
.folder-item:hover{background:var(--bg-secondary);color:var(--text-primary)}
.folder-item.active{background:var(--bg-secondary);color:var(--primary)}
.folder-item .folder-expand{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;transition:transform .15s;color:var(--text-secondary)}
.folder-item .folder-expand.expanded{transform:rotate(90deg)}
.folder-item .folder-expand.empty{visibility:hidden}
.folder-item .folder-icon{margin:0 4px;font-size:.82rem;flex-shrink:0}
.folder-item .folder-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.folder-item .folder-count{font-size:.7rem;color:var(--text-secondary);margin-left:4px;flex-shrink:0}
.folder-item .folder-actions{display:none;gap:2px;margin-left:4px;flex-shrink:0}
.folder-item:hover .folder-actions{display:flex}
.folder-item .folder-actions button{background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:1px 3px;font-size:.7rem;border-radius:2px;line-height:1}
.folder-item .folder-actions button:hover{color:var(--text-primary);background:rgba(255,255,255,.08)}
.folder-item .folder-actions button.danger:hover{color:var(--danger)}
.folder-children{display:none}
.folder-children.expanded{display:block}
.folder-rename-input{background:var(--bg-secondary);border:1px solid var(--primary);border-radius:3px;color:var(--text-primary);font-size:.82rem;padding:1px 4px;width:100%;outline:none}

/* Indent levels for nested folders */
.folder-item[data-depth="1"]{padding-left:28px}
.folder-item[data-depth="2"]{padding-left:44px}
.folder-item[data-depth="3"]{padding-left:60px}

/* ── Note cards ───────────────────────────────────────── */
.notes-list{flex:1;overflow-y:auto;padding:6px}
.notes-list::-webkit-scrollbar{width:6px}
.notes-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.note-card{padding:10px 12px;border-radius:var(--radius);cursor:pointer;margin-bottom:2px;transition:background .15s;border-left:3px solid transparent;position:relative}
.note-card:hover{background:var(--bg-secondary)}
.note-card.active{background:var(--bg-secondary);border-left-color:var(--primary)}
.note-card-header{display:flex;align-items:center;gap:6px}
.note-card-title{font-size:.85rem;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.note-card-pin{font-size:.7rem;flex-shrink:0}
.note-card-preview{font-size:.75rem;color:var(--text-secondary);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.note-card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.note-card-time{font-size:.72rem;color:var(--text-secondary)}
.note-card-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.note-card-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.note-card:hover .note-card-actions{opacity:1}
.note-card-btn{padding:2px 6px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--text-secondary);cursor:pointer;font-size:.7rem}
.note-card-btn:hover{color:var(--text-primary);border-color:var(--text-secondary)}
.note-card-btn.danger{color:var(--danger)}
.note-card-btn.danger:hover{border-color:var(--danger)}
.notes-empty{padding:40px 20px;text-align:center;color:var(--text-secondary);font-size:.85rem}

/* ── Drag-and-drop ───────────────────────────────────── */
.note-card[draggable]{cursor:grab}
.note-card.dragging{opacity:.4;cursor:grabbing}
.folder-item.drop-target{background:var(--primary-dim);outline:1px dashed var(--primary);outline-offset:-1px;border-radius:4px}

/* ── Move-to-folder dropdown ─────────────────────────── */
.move-folder-dropdown{display:none;position:absolute;right:8px;top:100%;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius);z-index:20;min-width:160px;padding:4px 0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.move-folder-dropdown.open{display:block}
.move-folder-option{padding:6px 12px;font-size:.8rem;color:var(--text-secondary);cursor:pointer;white-space:nowrap}
.move-folder-option:hover{background:var(--bg-secondary);color:var(--text-primary)}

/* ── Editor area ──────────────────────────────────────── */
.notes-editor-area{flex:1;display:flex;flex-direction:column;min-width:0}
.notes-editor-placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:.9rem}

/* Editor toolbar */
.notes-editor-topbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.notes-title-input{flex:1;padding:6px 10px;background:transparent;border:none;color:var(--text-primary);font-size:1.15rem;font-weight:700}
.notes-title-input:focus{outline:none}
.notes-title-input::placeholder{color:var(--text-secondary)}
.notes-save-status{font-size:.75rem;color:var(--text-secondary);white-space:nowrap}
.notes-editor-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.notes-action-btn{padding:4px 10px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-secondary);cursor:pointer;font-size:.8rem;display:flex;align-items:center;gap:4px}
.notes-action-btn:hover{color:var(--text-primary);border-color:var(--text-secondary)}
.notes-action-btn.danger{color:var(--danger)}
.notes-action-btn.danger:hover{border-color:var(--danger)}
.notes-action-btn.pinned{color:var(--primary);border-color:var(--primary)}

/* Color picker */
.notes-color-picker{position:relative;display:inline-block}
.notes-color-btn{padding:4px 10px;background:transparent;border:1px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:4px;color:var(--text-secondary);font-size:.8rem}
.notes-color-btn:hover{border-color:var(--text-secondary);color:var(--text-primary)}
.notes-color-dot{width:12px;height:12px;border-radius:50%;border:1px solid var(--border)}
.notes-color-dropdown{display:none;position:absolute;top:100%;right:0;margin-top:4px;padding:8px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius);z-index:10;flex-wrap:wrap;gap:6px;min-width:140px}
.notes-color-dropdown.open{display:flex}
.notes-color-option{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.notes-color-option:hover{border-color:var(--text-primary)}
.notes-color-option.active{border-color:var(--primary)}

/* Quill editor overrides */
.notes-quill-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.notes-quill-wrap .ql-toolbar.ql-snow{border:none;border-bottom:1px solid var(--border);background:var(--bg-secondary);flex-shrink:0;padding:6px 12px}
.notes-quill-wrap .ql-container.ql-snow{border:none;flex:1;overflow-y:auto}
.notes-quill-wrap .ql-editor{color:var(--text-primary);font-size:.9rem;line-height:1.7;padding:16px 24px;min-height:200px}
.notes-quill-wrap .ql-editor.ql-blank::before{color:var(--text-secondary);font-style:normal}
.notes-quill-wrap .ql-snow .ql-stroke{stroke:var(--text-secondary)}
.notes-quill-wrap .ql-snow .ql-fill{fill:var(--text-secondary)}
.notes-quill-wrap .ql-snow .ql-picker-label{color:var(--text-secondary)}
.notes-quill-wrap .ql-snow .ql-picker-options{background:var(--bg-primary);border-color:var(--border)}
.notes-quill-wrap .ql-snow .ql-picker-item{color:var(--text-primary)}
.notes-quill-wrap .ql-snow button:hover .ql-stroke,
.notes-quill-wrap .ql-snow .ql-picker-label:hover{color:var(--primary)}
.notes-quill-wrap .ql-snow button:hover .ql-stroke{stroke:var(--primary)}
.notes-quill-wrap .ql-snow .ql-active .ql-stroke{stroke:var(--primary)}
.notes-quill-wrap .ql-snow .ql-active .ql-fill{fill:var(--primary)}
.notes-quill-wrap .ql-snow .ql-active{color:var(--primary)}

/* AI Notes toggle */
.notes-ai-toggle{display:flex;align-items:center;gap:6px;padding:4px 0}
.notes-ai-toggle input[type="checkbox"]{accent-color:var(--primary);width:14px;height:14px;cursor:pointer}
.notes-ai-toggle label{font-size:.75rem;color:var(--text-secondary);cursor:pointer;margin:0;user-select:none}
.notes-ai-toggle label:hover{color:var(--text-primary)}
</style>

<div class="notes-page">
    <!-- Note List Sidebar -->
    <div class="notes-sidebar">
        <div class="notes-sidebar-header">
            <div class="notes-sidebar-title">
                <h3>Notes</h3>
            </div>
            <div class="notes-ai-toggle" id="notes-ai-toggle">
                <input type="checkbox" id="notes-ai-rag-toggle" title="Allow AI assistant to reference analyst notes">
                <label for="notes-ai-rag-toggle">AI can read notes</label>
            </div>
            <div class="notes-search-row">
                <input type="text" id="fp-notes-search" class="notes-search" placeholder="Search notes...">
                <button id="fp-notes-new" class="notes-btn-new">+ New Note</button>
            </div>
        </div>

        <!-- Folder tree -->
        <div id="fp-folder-tree" class="notes-folder-tree">
            <div class="folder-tree-header">
                <span>Folders</span>
                <button id="fp-folder-add" class="folder-tree-add" title="New folder">+</button>
            </div>
            <div id="fp-folder-list"></div>
        </div>

        <!-- Note list -->
        <div id="fp-notes-list" class="notes-list">
            <div class="notes-empty">No notes yet. Click "+ New Note" to start.</div>
        </div>
    </div>

    <!-- Editor Area -->
    <div class="notes-editor-area">
        <!-- Placeholder when no note selected -->
        <div id="fp-editor-placeholder" class="notes-editor-placeholder">
            Select a note or create a new one
        </div>

        <!-- Editor (hidden by default) -->
        <div id="fp-editor-wrapper" style="display:none;flex:1;display:none;flex-direction:column;">
            <!-- Top bar with title, save status, and actions -->
            <div class="notes-editor-topbar">
                <input type="text" id="fp-note-title" class="notes-title-input" placeholder="Note title...">
                <span id="fp-save-status" class="notes-save-status"></span>
                <div class="notes-editor-actions">
                    <!-- Move to folder -->
                    <button id="fp-btn-move" class="notes-action-btn" title="Move to folder">
                        <i class="icon-folder"></i> Move
                    </button>
                    <!-- Color picker -->
                    <div class="notes-color-picker">
                        <button id="fp-color-btn" class="notes-color-btn" title="Set color label">
                            <span id="fp-color-dot" class="notes-color-dot"></span>
                            Color
                        </button>
                        <div id="fp-color-dropdown" class="notes-color-dropdown"></div>
                    </div>
                    <button id="fp-btn-pin" class="notes-action-btn" title="Toggle pin">
                        <i class="icon-pin"></i> Pin
                    </button>
                    <button id="fp-btn-delete" class="notes-action-btn danger" title="Delete note">
                        <i class="icon-trash-2"></i> Delete
                    </button>
                </div>
            </div>

            <!-- Quill editor -->
            <div class="notes-quill-wrap">
                <div id="fp-quill-editor"></div>
            </div>
        </div>
    </div>
</div>

<!-- Move to folder dropdown (positioned by JS) -->
<div id="fp-move-dropdown" class="move-folder-dropdown"></div>

</div><!-- /ion-tw inner -->
</div><!-- /ion-tw -->
{% endblock %}

{% block scripts %}
<script src="/static/js/notes-page.js?v=0.9.28"></script>
<script>
// AI RAG toggle for notes page
(function() {
    const toggle = document.getElementById('notes-ai-rag-toggle');
    if (!toggle) return;

    // Load current preference
    fetch('/api/ai/preferences', { credentials: 'include' })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
            if (data) toggle.checked = !!data.rag_user_notes;
        })
        .catch(() => {});

    // Save on change
    toggle.addEventListener('change', function() {
        fetch('/api/ai/preferences', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ rag_user_notes: toggle.checked })
        })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
            if (data && typeof showToast === 'function') {
                showToast(toggle.checked ? 'AI can now reference analyst notes' : 'AI notes access disabled', 'success');
            }
        })
        .catch(() => {});
    });
})();
</script>
{% endblock %}
