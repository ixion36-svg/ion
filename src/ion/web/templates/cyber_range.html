{% extends "base.html" %}

{% block title %}Cyber Range - ION{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="icon-crosshair"></i> Cyber Range</h1>
    <div class="header-actions" id="cr-header-actions">
        <button class="btn btn-secondary" onclick="crBack()" id="cr-back-btn" style="display:none"><i class="icon-arrow-left"></i> Scenarios</button>
    </div>
</div>
<div id="cr-content"><div class="cr-loading"><span class="cr-spinner"></span> Loading scenarios...</div></div>
{% endblock %}

{% block scripts %}
<style>
.cr-loading{text-align:center;padding:60px;color:var(--text-secondary)}
.cr-spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:cr-spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes cr-spin{to{transform:rotate(360deg)}}

/* Scenario cards */
.cr-scenarios{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:16px}
.cr-sc-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:all .2s;border-top:3px solid var(--sev-critical)}
.cr-sc-card:hover{border-color:var(--sev-critical);transform:translateY(-2px)}
.cr-sc-title{font-size:1rem;font-weight:700;color:var(--text-primary);margin-bottom:6px}
.cr-sc-desc{font-size:.82rem;color:var(--text-secondary);line-height:1.5;margin-bottom:12px}
.cr-sc-meta{display:flex;gap:8px;font-size:.72rem;color:var(--text-muted)}

/* === CS-STYLE MAIN LAYOUT === */
.cr-cs{display:grid;grid-template-rows:auto auto 1fr auto;height:calc(100vh - 130px);min-height:600px;border:1px solid #1a1a2e;border-radius:4px;overflow:hidden;background:#0d0d1a;font-family:'JetBrains Mono','Fira Code',monospace}

/* Top bar — toolbar */
.cr-toolbar{display:flex;align-items:center;gap:6px;padding:4px 8px;background:#14142b;border-bottom:1px solid #2a2a4a;font-size:.68rem}
.cr-tool-btn{padding:3px 10px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:3px;color:#8b949e;cursor:pointer;font-size:.65rem;font-weight:600}
.cr-tool-btn:hover{background:#2a2a4a;color:#c9d1d9}
.cr-tool-btn.active{background:rgba(248,81,73,.15);border-color:#f85149;color:#f85149}
.cr-tool-sep{width:1px;height:16px;background:#2a2a4a}
.cr-tool-label{color:#4a4a6a;font-size:.6rem;text-transform:uppercase;letter-spacing:.5px}

/* Session table — beacon list */
.cr-sessions{max-height:120px;overflow-y:auto;border-bottom:1px solid #2a2a4a;background:#0a0a18}
.cr-sess-table{width:100%;border-collapse:collapse;font-size:.68rem}
.cr-sess-table th{text-align:left;padding:3px 8px;background:#14142b;color:#4a4a6a;font-weight:600;text-transform:uppercase;font-size:.6rem;letter-spacing:.5px;position:sticky;top:0;z-index:1}
.cr-sess-table td{padding:3px 8px;border-bottom:1px solid #1a1a2e;color:#8b949e}
.cr-sess-table tr:hover td{background:#14142b}
.cr-sess-table tr.active td{background:rgba(248,81,73,.08)}
.cr-sess-host{color:#f85149;font-weight:700}
.cr-sess-user{color:#58a6ff}
.cr-sess-pid{color:#8b949e}
.cr-sess-sleep{color:#3fb950}
.cr-sess-last{color:#4a4a6a}
.cr-sess-icon{width:14px;height:14px;display:inline-block;margin-right:4px;vertical-align:middle}
.cr-sess-icon.windows{color:#58a6ff}
.cr-sess-icon.elevated{color:#f85149}

/* Middle — split: topology left, terminal right */
.cr-mid{display:grid;grid-template-columns:280px 1fr;min-height:0;overflow:hidden}
@media(max-width:900px){.cr-mid{grid-template-columns:1fr}}

/* Network topology panel */
.cr-topo{background:#0a0a14;border-right:1px solid #2a2a4a;overflow-y:auto;padding:8px}
.cr-topo-title{font-size:.62rem;font-weight:700;color:#4a4a6a;text-transform:uppercase;letter-spacing:.5px;padding:4px 0;margin-top:8px}
.cr-topo-title:first-child{margin-top:0}

.cr-host{display:flex;align-items:center;gap:6px;padding:5px 8px;margin:2px 0;border-radius:3px;font-size:.68rem;cursor:default;transition:all .15s;border:1px solid transparent}
.cr-host:hover{background:#14142b}
.cr-host-icon{width:16px;text-align:center;font-size:.8rem}
.cr-host-name{color:#c9d1d9;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis}
.cr-host-ip{color:#4a4a6a;font-size:.6rem}
.cr-host-state{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cr-host-state.online{background:#3fb950}
.cr-host-state.scanned{background:#58a6ff}
.cr-host-state.beacon{background:#f0883e;animation:cr-blink 1.5s infinite}
.cr-host-state.elevated{background:#f85149;animation:cr-blink 1s infinite}
.cr-host-state.owned{background:#f85149;box-shadow:0 0 6px rgba(248,81,73,.6)}
@keyframes cr-blink{0%,100%{opacity:1}50%{opacity:.4}}

.cr-host.state-beacon{border-color:rgba(240,136,62,.3);background:rgba(240,136,62,.05)}
.cr-host.state-elevated{border-color:rgba(248,81,73,.3);background:rgba(248,81,73,.05)}
.cr-host.state-owned{border-color:rgba(248,81,73,.5);background:rgba(248,81,73,.08)}

/* Pivot lines */
.cr-pivot{font-size:.6rem;color:#f85149;padding:0 0 0 20px;margin:1px 0}

/* Terminal panel */
.cr-term-wrap{display:flex;flex-direction:column;overflow:hidden;min-height:0}
.cr-terminal{flex:1;overflow:auto;min-height:0;padding:8px 10px;font-size:.7rem;line-height:1.5;background:#0d0d1a}
.cr-term-line{color:#8b949e;white-space:pre-wrap;word-break:break-all;overflow-wrap:anywhere}
.cr-term-line.info{color:#f85149}
.cr-term-line.success{color:#3fb950}
.cr-term-line.highlight{color:#f0883e}
.cr-term-line.cmd{color:#f85149;font-weight:700;word-break:break-all}
.cr-term-line.system{color:#4a4a6a}
.cr-term-prompt{color:#f85149}

/* Command bar */
.cr-cmd-bar{display:flex;align-items:center;padding:6px 10px;background:#14142b;border-top:1px solid #2a2a4a;gap:6px;overflow:hidden}
.cr-cmd-prompt{color:#f85149;font-weight:700;font-size:.7rem;white-space:nowrap}
.cr-cmd-desc{flex:1;font-size:.65rem;color:#4a4a6a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.cr-cmd-btn{padding:4px 14px;background:rgba(248,81,73,.12);border:1px solid #f85149;border-radius:3px;color:#f85149;cursor:pointer;font-size:.7rem;font-weight:700;font-family:inherit;white-space:nowrap}
.cr-cmd-btn:hover{background:rgba(248,81,73,.25)}
.cr-cmd-btn:disabled{opacity:.4;cursor:default}

/* Bottom — blue/user toggle panels */
.cr-bottom{display:flex;flex-direction:column;max-height:220px;border-top:1px solid #2a2a4a;background:#0a0a14}
.cr-bottom-tabs{display:flex;gap:0;background:#14142b;border-bottom:1px solid #1a1a2e;flex-shrink:0}
.cr-btab{padding:4px 12px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;color:#4a4a6a;border-bottom:2px solid transparent;transition:all .15s}
.cr-btab:hover{color:#8b949e}
.cr-btab.active.blue{color:#58a6ff;border-bottom-color:#58a6ff}
.cr-btab.active.alert{color:#f85149;border-bottom-color:#f85149}
.cr-btab.active.user{color:#a855f7;border-bottom-color:#a855f7}
.cr-bottom-feed{flex:1;overflow-y:auto;padding:4px 8px;font-size:.68rem}

/* Log entries */
.cr-log{display:flex;gap:6px;padding:2px 0;border-bottom:1px solid #1a1a2e}
.cr-log-time{color:#4a4a6a;min-width:50px}
.cr-log-src{color:#58a6ff;min-width:100px;overflow:hidden;text-overflow:ellipsis}
.cr-log-lvl{min-width:30px;font-weight:700;font-size:.6rem;text-transform:uppercase}
.cr-log-lvl.INFO{color:#4a4a6a}.cr-log-lvl.WARN{color:#d29922}.cr-log-lvl.CRIT{color:#f85149}
.cr-log-msg{color:#8b949e;flex:1;word-break:break-word}

/* Alert entries */
.cr-alert{padding:4px 8px;margin:3px 0;border-radius:3px;border-left:2px solid}
.cr-alert.critical{border-color:#f85149;background:rgba(248,81,73,.06)}
.cr-alert.high{border-color:#f0883e;background:rgba(240,136,62,.06)}
.cr-alert.medium{border-color:#d29922;background:rgba(210,153,34,.06)}
.cr-alert-title{font-weight:700;color:#c9d1d9;font-size:.7rem}
.cr-alert-meta{font-size:.6rem;color:#4a4a6a;display:flex;gap:6px;margin-top:1px}
.cr-alert-mitre{color:#58a6ff}

/* User event entries */
.cr-ue{padding:4px 8px;margin:3px 0;border-radius:3px;border-left:2px solid #a855f7;background:rgba(168,85,247,.04)}
.cr-ue-app{font-weight:700;color:#a855f7;font-size:.68rem}
.cr-ue-detail{color:#8b949e;font-size:.65rem;margin-top:1px;white-space:pre-wrap}

/* Kill chain pips */
.cr-kc-bar{display:flex;gap:0;padding:2px 8px;background:#0a0a14;border-bottom:1px solid #1a1a2e;align-items:center;overflow-x:auto;flex-shrink:0}
.cr-kc-pip{padding:2px 8px;font-size:.58rem;font-weight:700;text-transform:uppercase;white-space:nowrap}
.cr-kc-pip.done{color:#f85149}.cr-kc-pip.active{color:#f0883e}.cr-kc-pip.pending{color:#2a2a4a}
.cr-kc-arr{color:#2a2a4a;font-size:.6rem;padding:0 2px}

/* Legend */
.cr-legend{display:flex;gap:10px;padding:2px 8px;font-size:.58rem;color:#4a4a6a;background:#0a0a14;border-top:1px solid #1a1a2e}
.cr-legend-item{display:flex;align-items:center;gap:3px}
.cr-legend-dot{width:6px;height:6px;border-radius:50%}
</style>
<script>
const API = '/api/cyber-range';
function $(id){return document.getElementById(id)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

let scenario=null,currentStage=0,currentCmd=0,blueLogs=[],blueAlerts=[],userEvents=[],hostStates={},beacons=[],bottomTab='logs',isExecuting=false;

async function crInit(){
    try{const r=await fetch(API+'/scenarios');const d=await r.json();renderList(d.scenarios)}catch(e){$('cr-content').innerHTML='<div class="cr-loading" style="color:var(--sev-critical)">Failed</div>'}
}

function renderList(scenarios){
    let h='<div style="margin-bottom:16px"><p style="color:var(--text-secondary);font-size:.88rem">Interactive red team vs blue team training. Execute attack commands in a Cobalt Strike-style interface.</p></div><div class="cr-scenarios">';
    for(const s of scenarios)h+=`<div class="cr-sc-card" onclick="crStart('${s.id}')"><div class="cr-sc-title">${esc(s.title)}</div><div class="cr-sc-desc">${esc(s.description)}</div><div class="cr-sc-meta"><span class="sev-badge sev-critical" style="font-size:.65rem">${esc(s.difficulty)}</span><span>${s.estimated_minutes}m</span><span>${s.stage_count} stages</span><span>${s.total_commands} cmds</span></div></div>`;
    h+='</div>';$('cr-content').innerHTML=h;$('cr-back-btn').style.display='none';
}

async function crStart(id){
    $('cr-content').innerHTML='<div class="cr-loading"><span class="cr-spinner"></span> Initializing range...</div>';
    try{const r=await fetch(API+'/scenarios/'+id);scenario=await r.json();currentStage=0;currentCmd=0;blueLogs=[];blueAlerts=[];userEvents=[];beacons=[];bottomTab='logs';isExecuting=false;
        hostStates={};for(const h of(scenario.environment.hosts||[]))hostStates[h.hostname]={...h};
        $('cr-back-btn').style.display='';renderCS()}catch(e){$('cr-content').innerHTML='<div class="cr-loading" style="color:var(--sev-critical)">Failed</div>'}
}
function crBack(){scenario=null;crInit()}

function renderCS(){
    const s=scenario,stage=s.stages[currentStage],cmd=stage?stage.commands[currentCmd]:null;
    let h='<div class="cr-cs">';

    // Toolbar
    h+='<div class="cr-toolbar">';
    h+=`<span class="cr-tool-btn active"><i class="icon-crosshair"></i> ${esc(s.title)}</span>`;
    h+='<span class="cr-tool-sep"></span>';
    h+=`<span class="cr-tool-label">Beacons: ${beacons.length}</span>`;
    h+='<span class="cr-tool-sep"></span>';
    h+=`<span class="cr-tool-label">Stage ${Math.min(currentStage+1,s.stages.length)}/${s.stages.length}</span>`;
    h+='<span class="cr-tool-sep"></span>';
    // Kill chain pips inline
    for(let i=0;i<s.stages.length;i++){
        if(i>0)h+='<span class="cr-kc-arr">&rarr;</span>';
        const cls=i<currentStage?'done':i===currentStage?'active':'pending';
        h+=`<span class="cr-kc-pip ${cls}">${esc(s.stages[i].tactic)}</span>`;
    }
    h+='</div>';

    // Session table
    h+='<div class="cr-sessions"><table class="cr-sess-table"><thead><tr><th></th><th>Host</th><th>User</th><th>Process</th><th>PID</th><th>Sleep</th><th>Last</th><th>Note</th></tr></thead><tbody>';
    if(!beacons.length)h+='<tr><td colspan="8" style="color:#2a2a4a;text-align:center;padding:8px">No active beacons. Execute commands to establish access.</td></tr>';
    for(const b of beacons){
        const elev=b.state==='elevated'||b.state==='owned';
        h+=`<tr class="${b===beacons[beacons.length-1]?'active':''}"><td><span class="cr-sess-icon ${elev?'elevated':'windows'}">${elev?'&#9733;':'&#9632;'}</span></td><td class="cr-sess-host">${esc(b.hostname)}</td><td class="cr-sess-user">${esc(b.user)}</td><td class="cr-sess-pid">${esc(b.process||'-')}</td><td class="cr-sess-pid">${esc(b.pid||'-')}</td><td class="cr-sess-sleep">${esc(b.sleep||'60s')}</td><td class="cr-sess-last">${esc(b.last||'just now')}</td><td style="color:#4a4a6a">${esc(b.note||'')}</td></tr>`;
    }
    h+='</tbody></table></div>';

    // Middle: topology + terminal
    h+='<div class="cr-mid">';

    // Topology
    h+='<div class="cr-topo">';
    h+='<div class="cr-legend"><span class="cr-legend-item"><span class="cr-legend-dot" style="background:#3fb950"></span>Clean</span><span class="cr-legend-item"><span class="cr-legend-dot" style="background:#58a6ff"></span>Scanned</span><span class="cr-legend-item"><span class="cr-legend-dot" style="background:#f0883e"></span>Beacon</span><span class="cr-legend-item"><span class="cr-legend-dot" style="background:#f85149"></span>Elevated</span><span class="cr-legend-item"><span class="cr-legend-dot" style="background:#f85149;box-shadow:0 0 4px #f85149"></span>Owned</span></div>';

    const hosts=Object.values(hostStates);
    const subnets={};for(const h2 of hosts){const sn=h2.subnet||'other';if(!subnets[sn])subnets[sn]=[];subnets[sn].push(h2)}
    for(const[sn,hlist]of Object.entries(subnets)){
        h+=`<div class="cr-topo-title">${esc(sn.toUpperCase())}</div>`;
        for(const host of hlist){
            const st=host.state||'online';
            const icon=host.role==='Domain Controller'?'&#9881;':host.role==='Workstation'?'&#9634;':'&#9638;';
            h+=`<div class="cr-host state-${st}"><span class="cr-host-icon">${icon}</span><div style="flex:1;overflow:hidden"><div class="cr-host-name">${esc(host.hostname)}</div><div class="cr-host-ip">${esc(host.ip)} | ${esc(host.os)}</div></div><div class="cr-host-state ${st}"></div></div>`;
        }
    }
    h+='</div>';

    // Terminal
    h+='<div class="cr-term-wrap">';
    h+='<div class="cr-terminal" id="cr-term">';
    h+='<div class="cr-term-line system">[*] Connected to team server</div>';
    h+=`<div class="cr-term-line system">[*] Target: ${esc(s.environment.domain)} (${esc(s.environment.target_network)})</div>`;
    h+='<div class="cr-term-line"></div>';

    for(let si=0;si<=currentStage&&si<s.stages.length;si++){
        const st=s.stages[si];
        h+=`<div class="cr-term-line system">[Stage ${si+1}/${s.stages.length}: ${esc(st.name)}]</div>`;
        const mx=si<currentStage?st.commands.length:currentCmd;
        for(let ci=0;ci<mx;ci++){
            const c=st.commands[ci];
            const lines=c.cmd.split('\\n');
            for(const ln of lines)h+=`<div class="cr-term-line cmd"><span class="cr-term-prompt">beacon&gt; </span>${esc(ln)}</div>`;
            for(const line of c.red_output){
                const cls=line.startsWith('[+]')?'success':line.startsWith('[*]')?'highlight':'';
                h+=`<div class="cr-term-line ${cls}">${esc(line)}</div>`;
            }
            h+='<div class="cr-term-line"></div>';
        }
    }
    h+='</div>';

    // Command bar
    if(stage&&cmd){
        const cmdShort=cmd.cmd.split('\\n')[0];
        h+=`<div class="cr-cmd-bar"><span class="cr-cmd-prompt">beacon&gt;</span><span class="cr-cmd-desc" title="${esc(cmd.description)}">${esc(cmdShort)}</span><button class="cr-cmd-btn" onclick="crExec()" id="cr-exec-btn">EXECUTE</button></div>`;
    }else{
        h+='<div class="cr-cmd-bar"><span class="cr-cmd-prompt">beacon&gt;</span><span class="cr-cmd-desc" style="color:#3fb950">Engagement complete. All objectives achieved.</span></div>';
    }
    h+='</div>'; // term-wrap
    h+='</div>'; // mid

    // Bottom panel
    h+='<div class="cr-bottom"><div class="cr-bottom-tabs">';
    h+=`<div class="cr-btab blue ${bottomTab==='logs'?'active':''}" onclick="crBTab('logs')">Event Log (${blueLogs.length})</div>`;
    h+=`<div class="cr-btab alert ${bottomTab==='alerts'?'active':''}" onclick="crBTab('alerts')">Alerts (${blueAlerts.length})</div>`;
    h+=`<div class="cr-btab user ${bottomTab==='user'?'active':''}" onclick="crBTab('user')">Victim View</div>`;
    h+='</div><div class="cr-bottom-feed" id="cr-feed">';

    if(bottomTab==='logs'){
        if(!blueLogs.length)h+='<div style="color:#2a2a4a;text-align:center;padding:12px">Waiting for activity...</div>';
        for(const l of blueLogs)h+=`<div class="cr-log"><span class="cr-log-time">${esc(l.time)}</span><span class="cr-log-src">${esc(l.source)}</span><span class="cr-log-lvl ${l.level}">${esc(l.level)}</span><span class="cr-log-msg">${esc(l.msg)}</span></div>`;
    }else if(bottomTab==='alerts'){
        if(!blueAlerts.length)h+='<div style="color:#2a2a4a;text-align:center;padding:12px">No alerts fired yet.</div>';
        for(const a of blueAlerts)h+=`<div class="cr-alert ${a.severity}"><div class="cr-alert-title"><span style="font-size:.6rem;font-weight:700;text-transform:uppercase;margin-right:4px;color:${a.severity==='critical'?'#f85149':'#f0883e'}">${esc(a.severity)}</span>${esc(a.title)}</div><div class="cr-alert-meta"><span>${esc(a.rule)}</span><span>${esc(a.host)}</span><span class="cr-alert-mitre">${esc(a.mitre)}</span></div></div>`;
    }else{
        if(!userEvents.length)h+='<div style="color:#2a2a4a;text-align:center;padding:12px">Execute commands to see victim perspective.</div>';
        for(const ue of userEvents)for(const ev of ue.events)h+=`<div class="cr-ue"><span class="cr-ue-app">${esc(ev.app)}</span> ${ev.title?'— '+esc(ev.title):''}<div class="cr-ue-detail">${esc(ev.detail)}</div></div>`;
    }
    h+='</div></div>'; // bottom

    h+='</div>'; // cr-cs
    $('cr-content').innerHTML=h;
    const term=document.getElementById('cr-term');if(term)term.scrollTop=term.scrollHeight;
    const feed=document.getElementById('cr-feed');if(feed)feed.scrollTop=feed.scrollHeight;
}

function crExec(){
    if(isExecuting)return;
    const stage=scenario.stages[currentStage],cmd=stage.commands[currentCmd];
    if(!cmd)return;
    isExecuting=true;
    const btn=document.getElementById('cr-exec-btn');
    if(btn){btn.disabled=true;btn.textContent='RUNNING...';}
    const term=document.getElementById('cr-term');

    // Type command
    const lines=cmd.cmd.split('\\n');
    for(const ln of lines){const el=document.createElement('div');el.className='cr-term-line cmd';el.innerHTML=`<span class="cr-term-prompt">beacon&gt; </span>${esc(ln)}`;term.appendChild(el)}
    term.scrollTop=term.scrollHeight;

    // Roll output
    let idx=0;const out=cmd.red_output;
    function tick(){
        if(idx<out.length){
            const line=out[idx],el=document.createElement('div');
            el.className='cr-term-line'+(line.startsWith('[+]')?' success':line.startsWith('[*]')?' highlight':'');
            el.textContent=line;term.appendChild(el);term.scrollTop=term.scrollHeight;idx++;
            setTimeout(tick,line===''?20:line.startsWith('[+]')?100:50);
        }else{
            term.appendChild(Object.assign(document.createElement('div'),{className:'cr-term-line'}));
            // Update host states
            for(const hu of(cmd.host_updates||[])){
                if(hostStates[hu.hostname])hostStates[hu.hostname].state=hu.state;
                if(hu.state==='beacon'||hu.state==='elevated'||hu.state==='owned'){
                    const existing=beacons.find(b=>b.hostname===hu.hostname);
                    if(existing){existing.state=hu.state;existing.user=hu.beacon_user||existing.user;existing.note=hu.state}
                    else{const parts=(hu.beacon_pid||'').split(/\s+/);beacons.push({hostname:hu.hostname,user:hu.beacon_user||'?',process:parts[0]||'?',pid:parts[1]||'?',sleep:'60s',last:'now',state:hu.state,note:hu.state})}
                }
            }
            // Add blue data
            if(cmd.user_view)userEvents.push(cmd.user_view);
            rollBlue(cmd.blue_logs,0,()=>{rollAlerts(cmd.blue_alerts,0,()=>{
                currentCmd++;if(currentCmd>=stage.commands.length){currentStage++;currentCmd=0}
                isExecuting=false;renderCS();
            })});
        }
    }
    setTimeout(tick,200);
}

function rollBlue(logs,i,done){
    if(i>=logs.length){done();return}blueLogs.push(logs[i]);
    const tab=document.querySelector('.cr-btab.blue');if(tab)tab.textContent=`Event Log (${blueLogs.length})`;
    if(bottomTab==='logs'){const feed=document.getElementById('cr-feed');if(feed){const el=document.createElement('div');el.className='cr-log';const l=logs[i];el.innerHTML=`<span class="cr-log-time">${esc(l.time)}</span><span class="cr-log-src">${esc(l.source)}</span><span class="cr-log-lvl ${l.level}">${esc(l.level)}</span><span class="cr-log-msg">${esc(l.msg)}</span>`;feed.appendChild(el);feed.scrollTop=feed.scrollHeight}}
    setTimeout(()=>rollBlue(logs,i+1,done),100);
}
function rollAlerts(alerts,i,done){
    if(i>=alerts.length){done();return}blueAlerts.push(alerts[i]);
    const tab=document.querySelector('.cr-btab.alert');if(tab)tab.textContent=`Alerts (${blueAlerts.length})`;
    if(bottomTab==='alerts'){const feed=document.getElementById('cr-feed');if(feed){const a=alerts[i];const el=document.createElement('div');el.className=`cr-alert ${a.severity}`;el.innerHTML=`<div class="cr-alert-title">${esc(a.severity).toUpperCase()} ${esc(a.title)}</div><div class="cr-alert-meta"><span>${esc(a.rule)}</span><span>${esc(a.host)}</span><span class="cr-alert-mitre">${esc(a.mitre)}</span></div>`;feed.appendChild(el);feed.scrollTop=feed.scrollHeight}}
    setTimeout(()=>rollAlerts(alerts,i+1,done),200);
}
function crBTab(t){bottomTab=t;renderCS()}

document.addEventListener('DOMContentLoaded',crInit);
</script>
{% endblock %}
