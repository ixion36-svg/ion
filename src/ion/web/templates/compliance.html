{% extends "base.html" %}

{% block title %}Compliance Posture - ION{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="icon-clipboard-check"></i> Compliance Posture</h1>
    <div class="header-actions">
        <button class="btn btn-secondary" onclick="cmpRefresh()">Refresh</button>
    </div>
</div>

<div id="cmp-content"><div class="cmp-loading"><span class="cmp-spinner"></span> Loading frameworks...</div></div>
{% endblock %}

{% block scripts %}
<style>
.cmp-loading{text-align:center;padding:60px;color:var(--text-secondary)}
.cmp-spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:cmp-spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes cmp-spin{to{transform:rotate(360deg)}}

.cmp-intro{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:16px;color:var(--text-secondary);font-size:.85rem;line-height:1.55}
.cmp-intro strong{color:var(--text-primary)}
.cmp-intro a{color:var(--primary);text-decoration:none}

.cmp-fw-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:18px}
.cmp-fw{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;border-left:4px solid var(--border);transition:transform .12s,border-color .12s}
.cmp-fw:hover{transform:translateY(-2px);border-color:var(--primary)}
.cmp-fw.selected{border-left-color:var(--primary);background:rgba(88,166,255,.06)}
.cmp-fw-name{font-size:.92rem;font-weight:700;color:var(--text-primary);line-height:1.2}
.cmp-fw-version{font-size:.66rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.cmp-fw-desc{font-size:.74rem;color:var(--text-secondary);margin-top:6px;line-height:1.4}
.cmp-fw-score-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.cmp-fw-score{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:700}
.cmp-fw-score.full{color:var(--mitre-covered,#3fb950)}
.cmp-fw-score.partial{color:var(--sev-medium,#d29922)}
.cmp-fw-score.blind{color:var(--sev-critical,#f85149)}
.cmp-fw-meta{font-size:.66rem;color:var(--text-secondary);text-align:right}
.cmp-fw-bar{height:4px;background:rgba(99,110,123,.2);border-radius:2px;overflow:hidden;margin-top:8px}
.cmp-fw-bar-fill{height:100%}

.cmp-detail{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.cmp-detail-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cmp-detail-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.cmp-detail-title{font-size:1rem;font-weight:700;color:var(--text-primary)}
.cmp-detail-sub{font-size:.74rem;color:var(--text-secondary);margin-top:2px}
.cmp-detail-summary{display:flex;gap:14px;flex-wrap:wrap;font-size:.78rem}
.cmp-detail-summary span{display:inline-flex;align-items:center;gap:5px;color:var(--text-secondary)}
.cmp-detail-summary strong{font-family:'JetBrains Mono',monospace}
.cmp-detail-summary .full{color:var(--mitre-covered,#3fb950)}
.cmp-detail-summary .partial{color:var(--sev-medium,#d29922)}
.cmp-detail-summary .blind{color:var(--sev-critical,#f85149)}

table.cmp-table{width:100%;border-collapse:collapse}
.cmp-table th{text-align:left;padding:9px 14px;font-size:.7rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;background:var(--bg-tertiary);border-bottom:1px solid var(--border)}
.cmp-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:.85rem;color:var(--text-primary);vertical-align:top}
.cmp-table tr:last-child td{border-bottom:none}
.cmp-control-id{font-family:'JetBrains Mono',monospace;color:var(--primary);font-weight:600}
.cmp-state-pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.62rem;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.cmp-state-pill.covered{background:rgba(63,185,80,.18);color:var(--mitre-covered,#3fb950)}
.cmp-state-pill.partial{background:rgba(210,153,34,.18);color:var(--sev-medium,#d29922)}
.cmp-state-pill.blind{background:rgba(248,81,73,.18);color:var(--sev-critical,#f85149)}
.cmp-state-pill.unknown{background:rgba(99,110,123,.18);color:var(--text-secondary)}
.cmp-tids{display:flex;flex-wrap:wrap;gap:3px;max-width:320px}
.cmp-tid{font-family:'JetBrains Mono',monospace;font-size:.65rem;background:var(--bg-tertiary);border:1px solid var(--border);padding:1px 5px;border-radius:var(--radius);color:var(--text-secondary);white-space:nowrap}
.cmp-tid.covered{color:var(--mitre-covered,#3fb950);border-color:rgba(63,185,80,.35)}
.cmp-tid.gap{color:var(--sev-critical,#f85149);border-color:rgba(248,81,73,.35);opacity:.85}

.cmp-banner{padding:10px 14px;border-radius:var(--radius);margin-bottom:14px;font-size:.78rem}
.cmp-banner.warn{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.4);color:var(--sev-medium,#d29922)}

@media (max-width: 768px) {
    .cmp-fw-list { grid-template-columns: 1fr; }
    .cmp-detail-head { flex-direction: column; align-items: flex-start; }
    .cmp-detail-summary { flex-wrap: wrap; gap: 8px 14px; font-size: .72rem; }
    .cmp-table th, .cmp-table td { padding: 8px 10px; font-size: .78rem; }
    .cmp-table th { font-size: .65rem; }
    .cmp-tids { max-width: none; }
}
@media (max-width: 480px) {
    .cmp-fw-name { font-size: .85rem; }
    .cmp-fw-score { font-size: 1.4rem; }
}
</style>
<script>
const CMP_API = '/api/compliance';
let _cmpAll = null;
let _cmpSelected = null;

function cmpEsc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

async function cmpRefresh() {
    const c = document.getElementById('cmp-content');
    c.innerHTML = '<div class="cmp-loading"><span class="cmp-spinner"></span> Computing per-framework coverage...</div>';
    try {
        const r = await fetch(`${CMP_API}/posture`);
        if (!r.ok) throw new Error('Compliance fetch failed');
        _cmpAll = await r.json();
        cmpRender();
    } catch (e) {
        c.innerHTML = `<div class="cmp-loading" style="color:var(--sev-critical,#f85149)">${cmpEsc(e.message)}</div>`;
    }
}

function cmpScoreClass(score) {
    if (score >= 80) return 'full';
    if (score >= 40) return 'partial';
    return 'blind';
}

function cmpScoreColor(score) {
    if (score >= 80) return 'var(--mitre-covered,#3fb950)';
    if (score >= 40) return 'var(--sev-medium,#d29922)';
    return 'var(--sev-critical,#f85149)';
}

function cmpRender() {
    const c = document.getElementById('cmp-content');
    const frameworks = (_cmpAll && _cmpAll.frameworks) || [];

    let banner = '';
    if (_cmpAll && _cmpAll.error) {
        banner = `<div class="cmp-banner warn"><strong>${cmpEsc(_cmpAll.error)}.</strong> Configure TIDE in <a href="/settings#tide" style="color:inherit;text-decoration:underline">Settings</a> to compute live coverage.</div>`;
    }

    let html = banner + `<div class="cmp-intro">
        ION computes detection coverage per framework by mapping each control to the MITRE ATT&CK techniques
        an attacker would use against it, then asking the live TIDE rule catalog whether any enabled rule
        detects those techniques. Click a framework card to drill into its controls.
    </div>`;

    if (!frameworks.length) {
        html += '<div class="cmp-loading">No framework data.</div>';
        c.innerHTML = html;
        return;
    }

    html += '<div class="cmp-fw-list">';
    for (const f of frameworks) {
        const cls = cmpScoreClass(f.overall_score || 0);
        const isSel = _cmpSelected === f.framework_id ? 'selected' : '';
        const s = f.summary || {};
        html += `<div class="cmp-fw ${isSel}" onclick="cmpSelect('${cmpEsc(f.framework_id)}')">
            <div class="cmp-fw-name">${cmpEsc(f.framework)}</div>
            <div class="cmp-fw-version">${cmpEsc(f.version || '')}</div>
            <div class="cmp-fw-score-row">
                <div class="cmp-fw-score ${cls}">${f.overall_score||0}%</div>
                <div class="cmp-fw-meta">${s.fully_covered||0} / ${s.total_controls||0} controls<br>${s.partial||0} partial &middot; ${s.no_coverage||0} blind</div>
            </div>
            <div class="cmp-fw-bar"><div class="cmp-fw-bar-fill" style="width:${f.overall_score||0}%;background:${cmpScoreColor(f.overall_score||0)}"></div></div>
        </div>`;
    }
    html += '</div>';

    if (_cmpSelected) {
        const f = frameworks.find(x => x.framework_id === _cmpSelected);
        if (f) html += cmpRenderDetail(f);
    } else {
        html += '<div class="cmp-loading">Select a framework above to see per-control coverage.</div>';
    }

    c.innerHTML = html;
}

function cmpRenderDetail(f) {
    const s = f.summary || {};
    let html = `<div class="cmp-detail">
        <div class="cmp-detail-head">
            <div>
                <div class="cmp-detail-title">${cmpEsc(f.framework)}</div>
                <div class="cmp-detail-sub">${cmpEsc(f.version)} &middot; <a href="${cmpEsc(f.url||'#')}" target="_blank" rel="noopener noreferrer" style="color:var(--primary);text-decoration:none">official spec &rarr;</a></div>
            </div>
            <div class="cmp-detail-summary">
                <span><strong>${f.overall_score||0}%</strong> overall</span>
                <span class="full">covered <strong>${s.fully_covered||0}</strong></span>
                <span class="partial">partial <strong>${s.partial||0}</strong></span>
                <span class="blind">blind <strong>${s.no_coverage||0}</strong></span>
            </div>
        </div>
        <div class="cmp-detail-table-wrap"><table class="cmp-table"><thead><tr><th style="width:130px">Control</th><th>Name</th><th style="width:70px">Score</th><th style="width:80px">State</th><th>Techniques</th></tr></thead><tbody>`;
    for (const ctl of (f.controls || [])) {
        const tids = [];
        for (const t of (ctl.covered_techniques||[])) tids.push(`<span class="cmp-tid covered">${cmpEsc(t)}</span>`);
        for (const t of (ctl.gap_techniques||[]))     tids.push(`<span class="cmp-tid gap">${cmpEsc(t)}</span>`);
        html += `<tr>
            <td><span class="cmp-control-id">${cmpEsc(ctl.control_id)}</span></td>
            <td>${cmpEsc(ctl.name)}</td>
            <td><span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:${cmpScoreColor(ctl.score||0)}">${ctl.score||0}%</span></td>
            <td><span class="cmp-state-pill ${cmpEsc(ctl.state)}">${cmpEsc(ctl.state)}</span></td>
            <td><div class="cmp-tids">${tids.join('')}</div></td>
        </tr>`;
    }
    html += '</tbody></table></div></div>';
    return html;
}

function cmpSelect(fid) {
    _cmpSelected = fid;
    cmpRender();
}

document.addEventListener('DOMContentLoaded', cmpRefresh);
</script>
{% endblock %}
