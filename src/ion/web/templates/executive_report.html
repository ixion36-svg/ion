{% extends "base.html" %}

{% block title %}Executive Report - ION{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="icon-file-text"></i> Executive Report</h1>
    <div class="header-actions">
        <select id="er-days" onchange="erLoad()">
            <option value="7" selected>Last 7 days</option>
            <option value="14">Last 14 days</option>
            <option value="30">Last 30 days</option>
        </select>
        <button class="btn btn-primary" onclick="erLoad()">Generate</button>
        <button class="btn btn-secondary" onclick="erDownloadPdf()"><i class="icon-download"></i> PDF</button>
        <button class="btn btn-secondary" onclick="window.print()"><i class="icon-printer"></i> Print</button>
    </div>
</div>

<div id="er-content"><div class="er-loading"><span class="er-spinner"></span> Generating executive report...</div></div>
{% endblock %}

{% block scripts %}
<style>
.er-loading{text-align:center;padding:60px;color:var(--text-secondary)}
.er-spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:er-spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes er-spin{to{transform:rotate(360deg)}}

.er-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.er-stat{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;text-align:center;position:relative;overflow:hidden}
.er-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary)}
.er-stat-val{font-size:1.4rem;font-weight:700;color:var(--primary);font-family:'JetBrains Mono',monospace}
.er-stat-label{font-size:.7rem;color:var(--text-secondary);text-transform:uppercase;margin-top:4px}
.er-stat.crit .er-stat-val{color:var(--sev-critical)}.er-stat.crit::before{background:var(--sev-critical)}
.er-stat.green .er-stat-val{color:var(--mitre-covered)}.er-stat.green::before{background:var(--mitre-covered)}
.er-stat.warn .er-stat-val{color:var(--sev-medium)}.er-stat.warn::before{background:var(--sev-medium)}

.er-section{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px}
.er-section-title{font-size:.8rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.er-section-title i{color:var(--primary)}
.er-table{width:100%;border-collapse:collapse;font-size:.82rem}
.er-table th{text-align:left;padding:8px 10px;color:var(--text-secondary);font-weight:600;font-size:.72rem;text-transform:uppercase;border-bottom:1px solid var(--border)}
.er-table td{padding:8px 10px;border-bottom:1px solid rgba(99,110,123,.15)}
.er-table tr:hover td{background:rgba(0,212,255,.03)}
.mono{font-family:'JetBrains Mono',monospace;font-size:.78rem}

.er-trend-chart{display:flex;align-items:flex-end;gap:6px;height:100px;padding:8px 0}
.er-trend-group{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.er-trend-bars{display:flex;gap:2px;align-items:flex-end;height:80px}
.er-trend-bar{width:12px;border-radius:2px 2px 0 0;min-height:2px}
.er-trend-label{font-size:.6rem;color:var(--text-muted);white-space:nowrap}

@media print{.navbar,.header-actions,.chat-widget,.chat-toggle{display:none!important}body{background:#fff;color:#000}.er-section,.er-stat{break-inside:avoid;border-color:#ddd}}
</style>
<script>
const API = '/api/executive-report';
function $(id){return document.getElementById(id)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtDate(iso){if(!iso)return'-';return new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}

async function erLoad(){
    const days = $('er-days').value;
    $('er-content').innerHTML = '<div class="er-loading"><span class="er-spinner"></span> Generating executive report...</div>';
    try{
        const r = await fetch(API+'/json?days='+days);
        if(!r.ok) throw new Error('Failed');
        renderReport(await r.json());
    } catch(e){
        $('er-content').innerHTML = `<div class="er-loading" style="color:var(--sev-critical)">${esc(e.message)}</div>`;
    }
}

function erDownloadPdf(){
    const days = $('er-days').value;
    window.open(API+'/pdf?days='+days, '_blank');
}

function renderReport(d){
    const c = d.cases||{};
    const a = d.alerts||{};
    let html = '';

    html += `<div style="font-size:.85rem;color:var(--text-secondary);margin-bottom:16px">${fmtDate(d.period_start)} \u2014 ${fmtDate(d.period_end)} (${d.period_days} days)</div>`;

    html += '<div class="er-stats">';
    html += erStat(c.opened||0, 'Cases Opened', '');
    html += erStat(c.closed||0, 'Cases Closed', 'green');
    html += erStat(c.fp_rate!=null?c.fp_rate+'%':'-', 'FP Rate', c.fp_rate>50?'crit':c.fp_rate>30?'warn':'');
    html += erStat(c.avg_mttr!=null?c.avg_mttr+'h':'-', 'Avg MTTR', '');
    html += erStat(c.open_backlog||0, 'Open Backlog', c.open_backlog>20?'warn':'');
    html += erStat(a.total_triaged||0, 'Alerts Triaged', '');
    html += erStat(a.analysts_active||0, 'Analysts Active', '');
    html += '</div>';

    // Trend chart
    const daily = (d.trends||{}).daily||[];
    if(daily.length){
        html += '<div class="er-section"><div class="er-section-title"><i class="icon-trending-up"></i> Daily Trend</div>';
        const maxVal = Math.max(...daily.map(d=>Math.max(d.opened,d.closed)),1);
        html += '<div class="er-trend-chart">';
        for(const day of daily){
            const oh = Math.max(day.opened/maxVal*80,2);
            const ch = Math.max(day.closed/maxVal*80,2);
            html += `<div class="er-trend-group">
                <div class="er-trend-bars">
                    <div class="er-trend-bar" style="height:${oh}px;background:var(--sev-high)" title="Opened: ${day.opened}"></div>
                    <div class="er-trend-bar" style="height:${ch}px;background:var(--mitre-covered)" title="Closed: ${day.closed}"></div>
                </div>
                <span class="er-trend-label">${day.date.substring(5)}</span>
            </div>`;
        }
        html += '</div><div style="display:flex;gap:12px;font-size:.72rem;color:var(--text-secondary);margin-top:8px"><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--sev-high);border-radius:2px"></span>Opened</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--mitre-covered);border-radius:2px"></span>Closed</span></div></div>';
    }

    // Closure reasons
    const reasons = c.closure_reasons||{};
    if(Object.keys(reasons).length){
        html += '<div class="er-section"><div class="er-section-title"><i class="icon-pie-chart"></i> Closure Reasons</div>';
        html += '<div style="display:flex;gap:20px;flex-wrap:wrap">';
        const total = Object.values(reasons).reduce((a,b)=>a+b,0);
        for(const [reason,count] of Object.entries(reasons).sort((a,b)=>b[1]-a[1])){
            const pct = Math.round(count/total*100);
            const color = reason==='true_positive'?'var(--mitre-covered)':reason==='false_positive'?'var(--sev-critical)':'var(--text-secondary)';
            html += `<div style="text-align:center"><div class="mono" style="font-size:1.1rem;font-weight:700;color:${color}">${count}</div><div style="font-size:.72rem;color:var(--text-secondary);text-transform:capitalize">${reason.replace(/_/g,' ')} (${pct}%)</div></div>`;
        }
        html += '</div></div>';
    }

    // Notable incidents
    const incidents = d.notable_incidents||[];
    if(incidents.length){
        html += '<div class="er-section"><div class="er-section-title"><i class="icon-alert-triangle"></i> Notable Incidents</div>';
        html += '<table class="er-table"><thead><tr><th>Case</th><th>Title</th><th>Severity</th><th>Status</th><th>Date</th></tr></thead><tbody>';
        for(const inc of incidents){
            html += `<tr><td class="mono">${esc(inc.case_number)}</td><td>${esc(inc.title)}</td><td><span class="sev-badge sev-${inc.severity}">${esc(inc.severity)}</span></td><td>${esc(inc.status)}</td><td style="font-size:.78rem">${fmtDate(inc.created_at)}</td></tr>`;
        }
        html += '</tbody></table></div>';
    }

    // Team
    const team = (d.team||{}).analysts||[];
    if(team.length){
        html += '<div class="er-section"><div class="er-section-title"><i class="icon-users"></i> Team Performance</div>';
        html += '<table class="er-table"><thead><tr><th>Analyst</th><th>Cases Closed</th><th>Total Actions</th></tr></thead><tbody>';
        for(const t of team) html += `<tr><td style="font-weight:600">${esc(t.username)}</td><td class="mono">${t.cases_closed}</td><td class="mono">${t.total_actions}</td></tr>`;
        html += '</tbody></table></div>';
    }

    $('er-content').innerHTML = html;
}

function erStat(val,label,cls){return `<div class="er-stat ${cls}"><div class="er-stat-val">${val}</div><div class="er-stat-label">${label}</div></div>`}

document.addEventListener('DOMContentLoaded', erLoad);
</script>
{% endblock %}
