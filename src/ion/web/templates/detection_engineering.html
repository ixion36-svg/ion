/* ── Kill Chain Progression tab ───────────────── */
let _progHours = 24;

window.deProgSetHours = function(h) {
    _progHours = h;
    _loaded.progression = false;
    loadProgression();
};

async function loadProgression() {
    const panel = $('de-panel-progression');
    panel.innerHTML = '<div class="de-loading"><div class="de-spinner"></div><div>Scanning for kill chain progressions...</div></div>';
    try {
        const data = await apiFetch(`/tide/de/kill-chain-alerts?hours=${_progHours}`);
        if (!data.enabled) {
            panel.innerHTML = `<div class="de-empty">${esc(data.error || 'Not configured')}</div>`;
            return;
        }
        if (data.error) {
            panel.innerHTML = `<div class="de-empty">${esc(data.error)}</div>`;
            return;
        }
        renderProgression(data);
        _loaded.progression = true;
    } catch(e) {
        panel.innerHTML = `<div class="de-empty">Failed: ${esc(e.message)}</div>`;
    }
}

function renderProgression(d) {
    const timeRanges = [
        {h:6,label:'6h'},{h:12,label:'12h'},{h:24,label:'24h'},{h:72,label:'3d'},{h:168,label:'7d'}
    ];

    let html = `<div class="de-exec-time">
        <span style="font-size:.78rem;color:var(--text-secondary)">Time window:</span>
        ${timeRanges.map(t=>`<button class="${_progHours===t.h?'active':''}" onclick="deProgSetHours(${t.h})">${t.label}</button>`).join('')}
        <span style="font-size:.72rem;color:var(--text-secondary);margin-left:auto">${d.total_hosts_checked||0} hosts scanned, ${d.playbook_count||0} playbooks</span>
    </div>`;

    const progs = d.progressions || [];
    if (!progs.length) {
        html += `<div class="de-section" style="text-align:center;padding:40px">
            <div style="font-size:1.5rem;margin-bottom:8px;color:var(--mitre-covered)"><i class="icon-shield-check"></i></div>
            <div style="font-size:.9rem;font-weight:600;color:var(--text-primary)">No Kill Chain Progressions Detected</div>
            <div style="font-size:.78rem;color:var(--text-secondary);margin-top:4px">No hosts show multi-step attack sequences matching TIDE playbooks in the last ${_progHours}h.</div>
        </div>`;
        $('de-panel-progression').innerHTML = html;
        return;
    }

    // Summary
    const critCount = progs.filter(p=>p.severity==='critical').length;
    const highCount = progs.filter(p=>p.severity==='high').length;
    const medCount = progs.filter(p=>p.severity==='medium').length;
    html += `<div class="de-stats" style="margin-bottom:16px">
        <div class="de-stat crit"><div class="de-stat-label">Critical</div><div class="de-stat-val">${critCount}</div><div class="de-stat-sub">&ge;75% steps fired</div></div>
        <div class="de-stat high"><div class="de-stat-label">High</div><div class="de-stat-val">${highCount}</div><div class="de-stat-sub">&ge;50% steps fired</div></div>
        <div class="de-stat med"><div class="de-stat-label">Medium</div><div class="de-stat-val">${medCount}</div><div class="de-stat-sub">2+ steps fired</div></div>
        <div class="de-stat"><div class="de-stat-label">Total Progressions</div><div class="de-stat-val">${progs.length}</div><div class="de-stat-sub">across ${d.total_hosts_checked} hosts</div></div>
    </div>`;

    // Progression cards
    for (const p of progs) {
        html += `<div class="de-prog">
            <div class="de-prog-header ${p.severity}">
                <span class="de-sev ${p.severity}">${esc(p.severity)}</span>
                <span class="de-prog-host">${esc(p.host)}</span>
                <span class="de-prog-playbook">${esc(p.playbook_name)}</span>
                <span style="margin-left:auto"></span>
                <span class="de-prog-pct" style="color:${p.severity==='critical'?'var(--sev-critical)':p.severity==='high'?'var(--sev-high)':'var(--sev-medium)'}">${p.fired_steps}/${p.total_steps} steps (${p.pct_complete}%)</span>
            </div>
            <div class="de-prog-steps">`;

        for (let i = 0; i < p.steps.length; i++) {
            const step = p.steps[i];
            if (i > 0) html += '<div class="de-prog-arrow">\u2192</div>';

            const cls = step.fired ? 'fired' : 'safe';
            const techChips = (step.techniques||[]).map(t=>`<span class="de-mitre-chip">${esc(t)}</span>`).join(' ');
            let detail = '';
            if (step.fired && step.alert_data) {
                const ad = step.alert_data;
                const rules = (ad.rules||[]).slice(0,2).join(', ');
                detail = `<div class="de-prog-step-detail"><span style="color:var(--sev-critical)">${ad.count} alert${ad.count>1?'s':''}</span>${rules ? '<br>'+esc(rules) : ''}</div>`;
            } else if (!step.fired) {
                detail = '<div class="de-prog-step-detail" style="color:var(--mitre-covered)">Not fired</div>';
            }

            html += `<div class="de-prog-step ${cls}">
                <div class="de-prog-step-num">${step.tactic || 'Step '+step.order}</div>
                <div class="de-prog-step-name">${esc(step.name)}</div>
                <div style="margin-top:3px">${techChips}</div>
                ${detail}
            </div>`;
        }

        html += '</div></div>';
    }

    $('de-panel-progression').innerHTML = html;
}

/* ── Gaps tab ─────────────────────────────────── */
async function loadGaps() {
    try {
        const data = await apiFetch('/tide/de/gaps');
        if (!data.enabled) { $('de-panel-gaps').innerHTML='<div class="de-empty">TIDE not configured</div>'; return; }
        _gapsData = data;
        renderGaps(data);
        _loaded.gaps = true;
    } catch(e) {
        $('de-panel-gaps').innerHTML=`<div class="de-empty">Failed to load: ${esc(e.message)}</div>`;
    }
}

function renderGaps(d) {
    let html = `
    <div class="de-stats" style="margin-bottom:20px">
        <div class="de-stat crit"><div class="de-stat-label">Blind Spots</div><div class="de-stat-val">${d.total_blind_spots}</div><div class="de-stat-sub">MITRE techniques with 0 rules</div></div>
        <div class="de-stat warn"><div class="de-stat-label">Unmapped Rules</div><div class="de-stat-val">${d.unmapped_rules.length}</div><div class="de-stat-sub">rules with no MITRE mapping</div></div>
        <div class="de-stat green"><div class="de-stat-label">Quick Wins</div><div class="de-stat-val">${d.quick_wins.length}</div><div class="de-stat-sub">disabled high-quality crit/high rules</div></div>
    </div>`;

    // Blind spots by tactic
    const tactics = d.blind_spots_by_tactic || {};
    const tacticEntries = Object.entries(tactics).sort((a,b) => b[1].length - a[1].length);
    if (tacticEntries.length) {
        html += `<div class="de-section">
            <div class="de-section-title"><i class="icon-eye-off"></i> Blind Spots by Tactic</div>
            <div class="de-gap-grid">`;
        for (const [tactic, techs] of tacticEntries) {
            html += `<div class="de-gap-card">
                <div class="de-gap-card-header">
                    <div class="de-gap-tactic">${esc(tactic.replace(/-/g,' '))}</div>
                    <div class="de-gap-count">${techs.length}</div>
                </div>
                <div class="de-gap-list">`;
            for (const t of techs.slice(0, 10)) {
                html += `<div class="de-gap-item"><code>${esc(t.id)}</code> ${esc(t.name)}</div>`;
            }
            if (techs.length > 10) html += `<div class="de-gap-item" style="color:var(--neon-cyan)">+${techs.length-10} more</div>`;
            html += '</div></div>';
        }
        html += '</div></div>';
    }

    // Quick wins
    if (d.quick_wins.length) {
        html += `<div class="de-section">
            <div class="de-section-title"><i class="icon-zap"></i> Quick Wins &mdash; High-Quality Disabled Rules</div>
            <table class="de-table"><thead><tr><th>Rule</th><th>Severity</th><th>Quality</th><th>MITRE</th></tr></thead><tbody>`;
        for (const r of d.quick_wins) {
            const mitre = (r.mitre_ids||[]).map(m=>`<span class="de-mitre-chip">${esc(m)}</span>`).join(' ');
            html += `<tr>
                <td>${esc(r.name)}</td>
                <td><span class="de-sev ${sevClass(r.severity)}">${esc(r.severity)}</span></td>
                <td class="mono">${r.quality_score??'-'}</td>
                <td>${mitre||'-'}</td>
            </tr>`;
        }
        html += '</tbody></table></div>';
    }

    // System coverage
    if (d.systems_coverage && d.systems_coverage.length) {
        html += `<div class="de-section">
            <div class="de-section-title"><i class="icon-server"></i> System Coverage (Lowest First)</div>
            <table class="de-table"><thead><tr><th>System</th><th>Applied Rules</th></tr></thead><tbody>`;
        for (const s of d.systems_coverage) {
            html += `<tr><td>${esc(s.name)}</td><td class="mono">${s.applied_rules}</td></tr>`;
        }
        html += '</tbody></table></div>';
    }

    // Unmapped rules
    if (d.unmapped_rules.length) {
        html += `<div class="de-section">
            <div class="de-section-title"><i class="icon-unlink"></i> Unmapped Rules (no MITRE mapping) &mdash; Top ${Math.min(d.unmapped_rules.length,50)}</div>
            <table class="de-table"><thead><tr><th>Rule</th><th>Severity</th><th>Status</th><th>Quality</th></tr></thead><tbody>`;
        for (const r of d.unmapped_rules.slice(0, 50)) {
            const status = r.enabled ? '<span class="de-enabled">Enabled</span>' : '<span class="de-disabled">Disabled</span>';
            html += `<tr>
                <td>${esc(r.name)}</td>
                <td><span class="de-sev ${sevClass(r.severity)}">${esc(r.severity)}</span></td>
                <td>${status}</td>
                <td class="mono">${r.quality_score??'-'}</td>
            </tr>`;
        }
        html += '</tbody></table></div>';
    }

    $('de-panel-gaps').innerHTML = html;
}

/* ────────────────────────────────────────────────────────────────────── */
/*  D3FEND defensive coverage                                              */
/* ────────────────────────────────────────────────────────────────────── */
async function loadD3fend() {
    const panel = $('de-panel-d3fend');
    try {
        if (!_d3fendCache) {
            const r = await fetch('/api/d3fend/coverage', {credentials:'include'});
            if (!r.ok) throw new Error('D3FEND fetch failed');
            _d3fendCache = await r.json();
        }
        const d = _d3fendCache;
        const s = d.summary || {};
        let html = `<div class="de-stats">
            <div class="de-stat green"><div class="de-stat-label">Defensive Coverage</div><div class="de-stat-val">${s.overall_pct||0}%</div></div>
            <div class="de-stat green"><div class="de-stat-label">Fully Covered</div><div class="de-stat-val">${s.fully_covered||0}</div></div>
            <div class="de-stat warn"><div class="de-stat-label">Partial</div><div class="de-stat-val">${s.partial||0}</div></div>
            <div class="de-stat crit"><div class="de-stat-label">Blind</div><div class="de-stat-val">${s.blind||0}</div></div>
            <div class="de-stat"><div class="de-stat-label">D3FEND Techniques</div><div class="de-stat-val">${s.total_techniques||0}</div></div>
        </div>`;

        if (!s.tide_enabled) {
            html += '<div class="de-section" style="border-color:rgba(210,153,34,.4);background:rgba(210,153,34,.06)"><div style="font-size:.78rem;color:var(--text-secondary)"><strong>TIDE not connected.</strong> All D3FEND techniques shown as blind. Configure TIDE in <a href="/settings#tide" style="color:var(--neon-cyan)">Settings</a> to compute live coverage.</div></div>';
        }

        // Group techniques by tactic
        const byTac = {};
        for (const t of d.techniques || []) {
            (byTac[t.tactic] = byTac[t.tactic] || []).push(t);
        }
        html += '<div class="de-section"><div class="de-section-title">D3FEND Tactics</div>';
        for (const tac of d.tactics || []) {
            const techs = byTac[tac.id] || [];
            const pct = tac.coverage_pct || 0;
            const barColor = pct >= 80 ? 'var(--mitre-covered,#3fb950)' : pct >= 50 ? 'var(--quality-good,#58a6ff)' : pct >= 25 ? 'var(--sev-medium,#d29922)' : 'var(--sev-critical,#f85149)';
            html += `<div style="margin-bottom:14px">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                    <div style="font-weight:700;color:var(--text-primary);text-transform:uppercase;letter-spacing:.5px;font-size:.78rem">${esc(tac.name)}</div>
                    <div style="font-size:.7rem;color:var(--text-secondary)">${tac.covered_count||0}/${tac.technique_count||0} &middot; ${pct}%</div>
                </div>
                <div style="height:4px;background:rgba(99,110,123,.2);border-radius:2px;overflow:hidden;margin-bottom:8px"><div style="height:100%;width:${pct}%;background:${barColor}"></div></div>
                <div style="display:flex;flex-wrap:wrap;gap:5px">`;
            for (const t of techs) {
                const cls = t.state === 'full' ? 'green' : t.state === 'partial' ? 'warn' : 'crit';
                const color = t.state === 'full' ? 'var(--mitre-covered,#3fb950)' : t.state === 'partial' ? 'var(--sev-medium,#d29922)' : 'var(--sev-critical,#f85149)';
                html += `<span title="${esc(t.description)} — ${t.covered_attacks||0}/${t.total_attacks||0} ATT&CK techniques covered" style="display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border:1px solid ${color};border-radius:4px;font-size:.7rem;color:${color}"><span class="mono">${esc(t.id)}</span> ${esc(t.name)} <span style="opacity:.7">${t.coverage_pct||0}%</span></span>`;
            }
            html += '</div></div>';
        }
        html += '</div>';
        panel.innerHTML = html;
    } catch (e) {
        panel.innerHTML = `<div class="de-section" style="color:var(--sev-critical)">Error: ${esc(e.message)}</div>`;
    }
}

/* ────────────────────────────────────────────────────────────────────── */
/*  Adversary emulation plans                                              */
/* ────────────────────────────────────────────────────────────────────── */
async function loadEmulation() {
    const panel = $('de-panel-emulation');
    try {
        const r = await fetch('/api/emulation/plans', {credentials:'include'});
        if (!r.ok) throw new Error('Emulation fetch failed');
        _emCache = (await r.json()).plans || [];

        const totalPlans = _emCache.length;
        const running = _emCache.filter(p => p.status === 'running').length;
        const completed = _emCache.filter(p => p.status === 'completed').length;
        const avgCov = totalPlans
            ? Math.round(_emCache.reduce((a, p) => a + (p.coverage_pct || 0), 0) / totalPlans)
            : 0;

        let html = `<div class="de-stats">
            <div class="de-stat"><div class="de-stat-label">Plans</div><div class="de-stat-val">${totalPlans}</div></div>
            <div class="de-stat warn"><div class="de-stat-label">Running</div><div class="de-stat-val">${running}</div></div>
            <div class="de-stat green"><div class="de-stat-label">Completed</div><div class="de-stat-val">${completed}</div></div>
            <div class="de-stat"><div class="de-stat-label">Avg Coverage</div><div class="de-stat-val">${avgCov}%</div></div>
        </div>`;

        html += `<div class="de-section"><div class="de-section-title">
            Adversary Emulation Plans
            <button class="btn btn-primary btn-sm" onclick="emCreatePrompt()" style="margin-left:auto;padding:4px 12px;font-size:.75rem">+ New Plan</button>
        </div>`;

        if (!totalPlans) {
            html += '<div style="text-align:center;padding:30px;color:var(--text-secondary);font-style:italic">No plans yet. Create a per-actor purple-team plan, add TTP steps, mark them executed, then click Verify to check Elasticsearch for matching detections.</div>';
        } else {
            html += '<table class="de-table"><thead><tr><th>Name</th><th>Actor</th><th>Status</th><th>Steps</th><th>Coverage</th><th>Updated</th><th></th></tr></thead><tbody>';
            for (const p of _emCache) {
                const color = (p.coverage_pct||0) >= 80 ? 'var(--mitre-covered,#3fb950)' : (p.coverage_pct||0) >= 50 ? 'var(--sev-medium,#d29922)' : 'var(--sev-critical,#f85149)';
                html += `<tr style="cursor:pointer" onclick="emOpenPlan(${p.id})">
                    <td><strong>${esc(p.name)}</strong></td>
                    <td>${esc(p.actor_name||'-')}</td>
                    <td>${esc(p.status)}</td>
                    <td>${p.passed_count||0}/${p.step_count||0}</td>
                    <td><span style="font-family:'JetBrains Mono',monospace;color:${color};font-weight:700">${p.coverage_pct||0}%</span></td>
                    <td>${p.updated_at ? new Date(p.updated_at).toLocaleDateString() : '-'}</td>
                    <td><button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();emDeletePlan(${p.id})" style="padding:2px 8px;font-size:.7rem">Delete</button></td>
                </tr>`;
            }
            html += '</tbody></table>';
        }
        html += '</div><div id="de-emulation-detail"></div>';
        panel.innerHTML = html;
    } catch (e) {
        panel.innerHTML = `<div class="de-section" style="color:var(--sev-critical)">Error: ${esc(e.message)}</div>`;
    }
}

window.emCreatePrompt = async function() {
    const name = prompt('Plan name:');
    if (!name) return;
    const actor = prompt('Threat actor (optional):') || null;
    const r = await fetch('/api/emulation/plans', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'include',
        body: JSON.stringify({name, actor_name: actor}),
    });
    if (r.ok) { _loaded.emulation = false; loadTab('emulation'); }
};

window.emDeletePlan = async function(id) {
    if (!confirm('Delete this plan and all its steps?')) return;
    await fetch(`/api/emulation/plans/${id}`, {method: 'DELETE', credentials: 'include'});
    _loaded.emulation = false; loadTab('emulation');
};

window.emOpenPlan = async function(id) {
    const r = await fetch(`/api/emulation/plans/${id}`, {credentials: 'include'});
    if (!r.ok) return;
    const p = await r.json();
    const det = $('de-emulation-detail');
    let html = `<div class="de-section"><div class="de-section-title">${esc(p.name)} (${esc(p.actor_name||'-')})</div>`;
    if (p.description) html += `<div style="color:var(--text-secondary);font-size:.82rem;margin-bottom:10px">${esc(p.description)}</div>`;
    html += `<div class="de-stats" style="margin-bottom:14px">
        <div class="de-stat"><div class="de-stat-label">Coverage</div><div class="de-stat-val">${p.coverage_pct||0}%</div></div>
        <div class="de-stat green"><div class="de-stat-label">Passed</div><div class="de-stat-val">${p.passed_count||0}</div></div>
        <div class="de-stat crit"><div class="de-stat-label">Failed</div><div class="de-stat-val">${p.failed_count||0}</div></div>
        <div class="de-stat warn"><div class="de-stat-label">Partial</div><div class="de-stat-val">${p.partial_count||0}</div></div>
        <div class="de-stat"><div class="de-stat-label">Total</div><div class="de-stat-val">${p.step_count||0}</div></div>
    </div>`;

    for (const s of p.steps || []) {
        const color = s.result === 'passed' ? 'var(--mitre-covered,#3fb950)' : s.result === 'failed' ? 'var(--sev-critical,#f85149)' : s.result === 'partial' ? 'var(--sev-medium,#d29922)' : 'var(--text-secondary)';
        const tids = (s.mitre_techniques||[]).map(t => `<span class="mono" style="background:rgba(0,212,255,.06);border:1px solid var(--border);padding:1px 6px;border-radius:3px;font-size:.7rem">${esc(t)}</span>`).join(' ');
        html += `<div style="background:var(--bg-tertiary);border:1px solid var(--border);border-left:3px solid ${color};border-radius:6px;padding:10px 14px;margin-bottom:6px">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
                <div><strong>${(s.order_index||0)+1}. ${esc(s.title)}</strong></div>
                <div style="display:flex;align-items:center;gap:8px">
                    <span class="mono" style="font-size:.7rem;color:${color}">${esc(s.result)}</span>
                    ${s.matched_alert_count != null ? `<span style="font-size:.7rem;color:var(--text-secondary)">${s.matched_alert_count} alerts</span>` : ''}
                </div>
            </div>
            ${tids ? `<div style="margin-top:5px">${tids}</div>` : ''}
            <div style="margin-top:6px;display:flex;gap:5px">
                <button class="btn btn-secondary btn-sm" onclick="emExecuteStep(${s.id})" style="padding:3px 9px;font-size:.7rem">Mark Executed</button>
                <button class="btn btn-secondary btn-sm" onclick="emVerifyStep(${s.id})" style="padding:3px 9px;font-size:.7rem">Verify in ES</button>
                <button class="btn btn-secondary btn-sm" onclick="emDeleteStep(${s.id})" style="padding:3px 9px;font-size:.7rem">Delete</button>
            </div>
        </div>`;
    }

    html += `<div style="background:var(--bg-tertiary);border:1px dashed var(--border);border-radius:6px;padding:10px 14px;margin-top:10px">
        <input id="em-newstep-title" placeholder="Step title" style="width:100%;background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-primary);padding:6px 10px;border-radius:4px;font-size:.78rem;margin-bottom:6px">
        <input id="em-newstep-tids" placeholder="Techniques: T1003, T1059.001" style="width:100%;background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-primary);padding:6px 10px;border-radius:4px;font-size:.78rem;margin-bottom:6px">
        <button class="btn btn-primary btn-sm" onclick="emAddStep(${p.id})" style="padding:5px 14px;font-size:.78rem">+ Add Step</button>
    </div></div>`;
    det.innerHTML = html;
};

window.emAddStep = async function(planId) {
    const title = $('em-newstep-title').value.trim();
    if (!title) return;
    const tids = ($('em-newstep-tids').value || '').split(',').map(s => s.trim().toUpperCase()).filter(Boolean);
    await fetch(`/api/emulation/plans/${planId}/steps`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'include',
        body: JSON.stringify({title, mitre_techniques: tids}),
    });
    emOpenPlan(planId);
};

window.emExecuteStep = async function(id) {
    await fetch(`/api/emulation/steps/${id}/execute`, {method: 'POST', credentials: 'include'});
    const planId = _emCurrentPlan; if (planId) emOpenPlan(planId);
};

window.emVerifyStep = async function(id) {
    const r = await fetch(`/api/emulation/steps/${id}/verify?lookback_hours=4`, {method: 'POST', credentials: 'include'});
    const j = await r.json();
    if (j.error) alert('Verify warning: ' + j.error);
    const planId = _emCurrentPlan; if (planId) emOpenPlan(planId);
};

window.emDeleteStep = async function(id) {
    if (!confirm('Delete step?')) return;
    await fetch(`/api/emulation/steps/${id}`, {method: 'DELETE', credentials: 'include'});
    const planId = _emCurrentPlan; if (planId) emOpenPlan(planId);
};

let _emCurrentPlan = null;
const _origEmOpenPlan = window.emOpenPlan;
window.emOpenPlan = async function(id) {
    _emCurrentPlan = id;
    return _origEmOpenPlan(id);
};

/* ────────────────────────────────────────────────────────────────────── */
/*  Vulnerability ↔ detection coverage                                     */
/* ────────────────────────────────────────────────────────────────────── */
async function loadVulns() {
    const panel = $('de-panel-vulns');
    try {
        const r = await fetch('/api/vulnerabilities/coverage', {credentials:'include'});
        if (!r.ok) throw new Error('Vulns fetch failed');
        _vulnsCache = await r.json();
        const s = _vulnsCache.summary || {};

        let html = `<div class="de-stats">
            <div class="de-stat"><div class="de-stat-label">Tracked</div><div class="de-stat-val">${s.total||0}</div></div>
            <div class="de-stat green"><div class="de-stat-label">Detectable</div><div class="de-stat-val">${s.covered||0}</div></div>
            <div class="de-stat warn"><div class="de-stat-label">Partial</div><div class="de-stat-val">${s.partial||0}</div></div>
            <div class="de-stat crit"><div class="de-stat-label">Blind</div><div class="de-stat-val">${s.blind||0}</div></div>
        </div>`;

        if (!s.tide_enabled) {
            html += '<div class="de-section" style="border-color:rgba(210,153,34,.4);background:rgba(210,153,34,.06)"><div style="font-size:.78rem;color:var(--text-secondary)"><strong>TIDE not connected.</strong> All verdicts shown as unknown. Configure TIDE in <a href="/settings#tide" style="color:var(--neon-cyan)">Settings</a> for live coverage.</div></div>';
        }

        html += `<div class="de-section"><div class="de-section-title">
            Vulnerabilities
            <button class="btn btn-primary btn-sm" onclick="vlnCreatePrompt()" style="margin-left:auto;padding:4px 12px;font-size:.75rem">+ New CVE</button>
        </div>`;

        const items = _vulnsCache.vulnerabilities || [];
        if (!items.length) {
            html += '<div style="text-align:center;padding:30px;color:var(--text-secondary);font-style:italic">Add CVEs and tag them with the ATT&CK techniques attackers would use to exploit them. ION will tell you whether your TIDE rules can detect exploitation.</div>';
        } else {
            html += '<table class="de-table"><thead><tr><th>CVE / Title</th><th>Severity</th><th>CVSS</th><th>Status</th><th>Techniques</th><th>Detection</th><th></th></tr></thead><tbody>';
            for (const v of items) {
                const cov = v.coverage || {};
                const verdict = cov.verdict || 'unknown';
                const verdictColor = verdict === 'covered' ? 'var(--mitre-covered,#3fb950)' : verdict === 'partial' ? 'var(--sev-medium,#d29922)' : verdict === 'blind' ? 'var(--sev-critical,#f85149)' : 'var(--text-secondary)';
                const tids = (cov.by_tid||[]).map(t => `<span class="mono" style="font-size:.66rem;background:rgba(0,212,255,.06);border:1px solid ${t.covered ? 'var(--mitre-covered,#3fb950)' : 'var(--border)'};color:${t.covered ? 'var(--mitre-covered,#3fb950)' : 'var(--text-secondary)'};padding:1px 5px;border-radius:3px">${esc(t.tid)}</span>`).join(' ');
                html += `<tr>
                    <td>${v.cve_id ? `<div class="mono" style="color:var(--neon-cyan,#00d4ff);font-size:.78rem">${esc(v.cve_id)}</div>` : ''}<div>${esc(v.title)}</div></td>
                    <td><span class="de-sev ${esc(v.severity)}">${esc(v.severity)}</span></td>
                    <td>${v.cvss_score ?? '-'}</td>
                    <td>${esc(v.status)}</td>
                    <td>${tids || '<span style="color:var(--text-secondary);font-size:.7rem">none</span>'}</td>
                    <td><div style="color:${verdictColor};font-weight:700;text-transform:uppercase;font-size:.7rem;letter-spacing:.5px">${esc(verdict)}</div><div style="font-size:.66rem;color:var(--text-secondary)">${cov.total > 0 ? `${cov.covered}/${cov.total} TTPs &middot; ${cov.rules} rules` : 'no TTPs set'}</div></td>
                    <td><button class="btn btn-secondary btn-sm" onclick="vlnDelete(${v.id})" style="padding:2px 8px;font-size:.7rem">Delete</button></td>
                </tr>`;
            }
            html += '</tbody></table>';
        }
        html += '</div>';
        panel.innerHTML = html;
    } catch (e) {
        panel.innerHTML = `<div class="de-section" style="color:var(--sev-critical)">Error: ${esc(e.message)}</div>`;
    }
}

window.vlnCreatePrompt = async function() {
    const title = prompt('Vulnerability title:');
    if (!title) return;
    const cve = prompt('CVE ID (optional, e.g. CVE-2025-12345):') || null;
    const sev = prompt('Severity (critical / high / medium / low / info):', 'medium') || 'medium';
    const tids = prompt('ATT&CK techniques used to exploit (comma-separated, e.g. T1190, T1059):') || '';
    const body = {
        title,
        cve_id: cve,
        severity: sev,
        mitre_techniques: tids.split(',').map(s => s.trim().toUpperCase()).filter(Boolean),
    };
    const r = await fetch('/api/vulnerabilities', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'include',
        body: JSON.stringify(body),
    });
    if (r.ok) { _loaded.vulns = false; loadTab('vulns'); }
};

window.vlnDelete = async function(id) {
    if (!confirm('Delete this vulnerability?')) return;
    await fetch(`/api/vulnerabilities/${id}`, {method: 'DELETE', credentials: 'include'});
    _loaded.vulns = false; loadTab('vulns');
};

/* ── TIDE Sync ────────────────────────────────── */
window.deSyncTide = async function() {
    const badge = $('de-tide-badge');
    badge.innerHTML = '<span class="de-tide-dot"></span> Syncing...';
    try {
        const r = await fetch(API + '/tide/de/sync-now', {method:'POST', credentials:'include'});
        const j = await r.json();
        if (j.error) {
            badge.innerHTML = `<span class="de-tide-dot"></span> TIDE (${esc(j.error)})`;
            return;
        }
        badge.innerHTML = `<span class="de-tide-dot ok"></span> TIDE synced (${j.synced}/${j.total})`;
        // Auto-refresh current tab with fresh snapshot data
        deRefresh();
    } catch (e) {
        badge.innerHTML = '<span class="de-tide-dot"></span> TIDE (sync failed)';
    }
};

// Check sync status on load to show the badge correctly
async function deCheckSyncStatus() {
    try {
        const r = await fetch(API + '/tide/de/sync-status', {credentials:'include'});
        if (!r.ok) return;
        const j = await r.json();
        const badge = $('de-tide-badge');
        if (j.healthy > 0) {
            badge.innerHTML = `<span class="de-tide-dot ok"></span> TIDE (${j.healthy}/${j.total_datasets} cached)`;
        }
    } catch (e) {}
}

/* ── Init ─────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => { loadTab('posture'); deCheckSyncStatus(); });

})();
</script>
