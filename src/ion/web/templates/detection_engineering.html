{% extends "base.html" %}

{% block title %}Detection Engineering - ION{% endblock %}

{% block content %}
<div class="ion-tw ion-tw-page text-slate-200 overflow-x-hidden">
<div class="relative z-10 mx-auto max-w-[1920px] w-full px-4 sm:px-6 lg:px-10 xl:px-14 py-10 md:py-14">
<section class="flex flex-wrap items-end justify-between gap-6 mb-8 rise d-1">
  <div class="flex-1 min-w-0">
    <div class="flex items-center gap-3 mb-4">
      <svg class="w-4 h-4 text-ion-cyan"><use href="#i-target"/></svg>
      <span class="label-tiny text-ion-cyan">Detection posture · TIDE</span>
    </div>
    <h1 class="font-sans font-semibold text-[36px] md:text-[44px] xl:text-[52px] leading-[1.05] text-white tracking-[-0.02em]">Detection Engineering</h1>
    <p class="mt-3 max-w-2xl text-[15px] text-slate-400">Rule coverage, quality, MITRE mapping and live execution across your stack.</p>
  </div>
  <div class="flex items-center gap-2">
    <span id="de-tide-badge" title="Click for sync status" class="inline-flex items-center gap-2 h-9 px-3 rounded-md bg-white/5 border border-white/10 text-[11px] text-slate-300 cursor-pointer hover:bg-white/10 transition">
      <span class="de-tide-dot h-1.5 w-1.5 rounded-full bg-ion-lime"></span> TIDE
    </span>
    <button onclick="deSyncTide()" title="Pull fresh data from TIDE now" class="inline-flex items-center gap-2 h-9 px-4 rounded-md bg-white/5 text-slate-200 hover:bg-white/10 border border-white/10 text-[12px] font-semibold transition"><svg class="w-3.5 h-3.5"><use href="#i-refresh"/></svg>Sync TIDE</button>
    <button onclick="deRefresh()" class="inline-flex items-center gap-2 h-9 px-4 rounded-md bg-white/5 text-slate-200 hover:bg-white/10 border border-white/10 text-[12px] font-semibold transition">Refresh</button>
  </div>
</section>

<!-- Tabs -->
<div class="de-tabs" id="de-tabs">
    <button class="de-tab active" data-tab="posture" onclick="deSwitch('posture')">Posture</button>
    <button class="de-tab" data-tab="killchains" onclick="deSwitch('killchains')">Use Cases</button>
    <button class="de-tab" data-tab="rules" onclick="deSwitch('rules')">Rules</button>
    <button class="de-tab" data-tab="execution" onclick="deSwitch('execution')">Execution</button>
    <button class="de-tab" data-tab="readiness" onclick="deSwitch('readiness')">Actor Readiness</button>
    <button class="de-tab" data-tab="progression" onclick="deSwitch('progression')">Kill Chain</button>
    <button class="de-tab" data-tab="gaps" onclick="deSwitch('gaps')">Gaps</button>
    <button class="de-tab" data-tab="d3fend" onclick="deSwitch('d3fend')">D3FEND</button>
    <button class="de-tab" data-tab="emulation" onclick="deSwitch('emulation')">Emulation</button>
    <button class="de-tab" data-tab="vulns" onclick="deSwitch('vulns')">Vulnerabilities</button>
</div>

<!-- Tab panels -->
<div class="de-panel active" id="de-panel-posture"></div>
<div class="de-panel" id="de-panel-killchains"></div>
<div class="de-panel" id="de-panel-rules"></div>
<div class="de-panel" id="de-panel-execution"></div>
<div class="de-panel" id="de-panel-readiness"></div>
<div class="de-panel" id="de-panel-progression"></div>
<div class="de-panel" id="de-panel-gaps"></div>
<div class="de-panel" id="de-panel-d3fend"></div>
<div class="de-panel" id="de-panel-emulation"></div>
<div class="de-panel" id="de-panel-vulns"></div>

</div><!-- /ion-tw inner -->
</div><!-- /ion-tw -->
{% endblock %}

{% block scripts %}
<style>
/* ── Detection Engineering ─────────────────────────── */
.de-tide-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:20px;font-size:.75rem;font-weight:700;color:var(--neon-cyan,#00d4ff);letter-spacing:.5px;font-family:'JetBrains Mono',monospace}
.de-tide-dot{width:8px;height:8px;border-radius:50%;background:var(--sev-critical);animation:de-pulse 2s infinite}
.de-tide-dot.ok{background:var(--mitre-covered)}
@keyframes de-pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Tabs — horizontal scroll on narrow screens, never wrap (10 tabs) */
.de-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border,rgba(99,110,123,.4));margin-bottom:20px;overflow-x:auto;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
.de-tabs::-webkit-scrollbar{height:4px}
.de-tabs::-webkit-scrollbar-thumb{background:var(--border,rgba(99,110,123,.5));border-radius:2px}
.de-tab{padding:10px 20px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-secondary,#8b949e);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s;white-space:nowrap;flex-shrink:0}
.de-tab:hover{color:var(--text-primary,#f0f6fc)}
.de-tab.active{color:var(--neon-cyan,#00d4ff);border-bottom-color:var(--neon-cyan,#00d4ff)}
.de-panel{display:none}
.de-panel.active{display:block}

/* Stat cards row */
.de-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.de-stat{background:var(--bg-secondary,#161b22);border:1px solid var(--border,rgba(99,110,123,.4));border-radius:10px;padding:16px;position:relative;overflow:hidden}
.de-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,#00d4ff)}
.de-stat.crit::before{background:var(--sev-critical)}
.de-stat.high::before{background:var(--sev-high)}
.de-stat.med::before{background:var(--sev-medium)}
.de-stat.low::before{background:var(--sev-low)}
.de-stat.green::before{background:var(--mitre-covered)}
.de-stat.warn::before{background:var(--sev-high)}
.de-stat-label{font-size:.72rem;color:var(--text-secondary,#8b949e);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.de-stat-val{font-size:1.5rem;font-weight:700;color:var(--text-primary,#f0f6fc);font-family:'JetBrains Mono',monospace;line-height:1}
.de-stat-sub{font-size:.72rem;color:var(--text-secondary,#8b949e);margin-top:4px}

/* Section cards */
.de-section{background:var(--bg-secondary,#161b22);border:1px solid var(--border,rgba(99,110,123,.4));border-radius:10px;padding:16px;margin-bottom:16px}
.de-section-title{font-size:.8rem;font-weight:700;color:var(--text-secondary,#8b949e);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.de-section-title i{color:var(--neon-cyan,#00d4ff)}

/* Two-column layout */
.de-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.de-cols{grid-template-columns:1fr}}

/* Tables */
.de-section{overflow-x:auto}  /* allow tables inside sections to scroll on narrow screens */
.de-table{width:100%;border-collapse:collapse;font-size:.82rem}
.de-table th{text-align:left;padding:8px 10px;color:var(--text-secondary,#8b949e);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border,rgba(99,110,123,.4));white-space:nowrap}
.de-table td{padding:8px 10px;border-bottom:1px solid rgba(99,110,123,.15);color:var(--text-primary,#f0f6fc)}
.de-table tr:hover td{background:rgba(0,212,255,.03)}
.de-table .mono{font-family:'JetBrains Mono',monospace;font-size:.78rem;word-break:break-all}

/* Mobile reflow */
@media (max-width: 768px) {
    .de-stats { grid-template-columns: repeat(2, 1fr); }
    .de-stat { padding: 12px; }
    .de-stat-val { font-size: 1.2rem; }
    .de-tab { padding: 9px 14px; font-size: .8rem; }
}
@media (max-width: 480px) {
    .de-stats { grid-template-columns: 1fr 1fr; gap: 8px; }
    .de-stat-val { font-size: 1.1rem; }
}

/* Severity badges */
.de-sev{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.de-sev.critical{background:var(--sev-critical-dim);color:var(--sev-critical)}
.de-sev.high{background:var(--sev-high-dim);color:var(--sev-high)}
.de-sev.medium{background:var(--sev-medium-dim);color:var(--sev-medium)}
.de-sev.low{background:var(--sev-low-dim);color:var(--sev-low)}

/* Enabled/disabled badge */
.de-enabled{color:var(--mitre-covered);font-weight:600}
.de-disabled{color:var(--sev-critical);font-weight:600}

/* Quality bar */
.de-qbar{display:flex;height:20px;border-radius:4px;overflow:hidden;background:rgba(99,110,123,.2)}
.de-qbar-seg{display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;min-width:0;transition:width .3s}
.de-qbar-seg.excellent{background:var(--quality-excellent)}
.de-qbar-seg.good{background:var(--quality-good)}
.de-qbar-seg.fair{background:var(--quality-fair)}
.de-qbar-seg.poor{background:var(--quality-poor)}

/* Donut charts (canvas-free) */
.de-donut-row{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:16px}
.de-donut-wrap{display:flex;align-items:center;gap:16px}
.de-donut{width:120px;height:120px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center}
.de-donut-center{position:absolute;width:64px;height:64px;border-radius:50%;background:var(--bg-secondary,#161b22);display:flex;align-items:center;justify-content:center;flex-direction:column}
.de-donut-center .de-donut-pct{font-size:1rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text-primary,#f0f6fc)}
.de-donut-center .de-donut-label{font-size:.6rem;color:var(--text-secondary,#8b949e);text-transform:uppercase}
.de-donut-legend{display:flex;flex-direction:column;gap:4px}
.de-donut-legend-item{display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--text-secondary,#8b949e)}
.de-donut-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* Kill chain */
.de-kc{margin-bottom:24px}
.de-kc-title{font-size:.95rem;font-weight:700;color:var(--text-primary,#f0f6fc);margin-bottom:4px}
.de-kc-desc{font-size:.78rem;color:var(--text-secondary,#8b949e);margin-bottom:12px}
.de-kc-chain{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding-bottom:8px}
.de-kc-node{flex:0 0 auto;width:160px;background:var(--bg-primary,#0d1117);border:2px solid var(--border,rgba(99,110,123,.4));border-radius:8px;padding:12px;position:relative;display:flex;flex-direction:column;gap:6px;transition:border-color .2s}
.de-kc-node.covered{border-color:var(--mitre-covered)}
.de-kc-node.partial{border-color:var(--mitre-partial)}
.de-kc-node.blind{border-color:var(--mitre-gap);border-style:dashed}
.de-kc-arrow{display:flex;align-items:center;justify-content:center;width:32px;flex-shrink:0;color:var(--text-secondary,#8b949e);font-size:1.2rem}
.de-kc-node-header{font-size:.72rem;font-weight:700;color:var(--neon-cyan,#00d4ff);font-family:'JetBrains Mono',monospace}
.de-kc-node-name{font-size:.78rem;color:var(--text-primary,#f0f6fc);font-weight:600;line-height:1.3}
.de-kc-node-rules{font-size:.68rem;color:var(--text-secondary,#8b949e);margin-top:auto}
.de-kc-node-rules .ok{color:var(--mitre-covered)}
.de-kc-node-rules .warn{color:var(--mitre-partial)}
.de-kc-node-rules .bad{color:var(--mitre-gap)}

/* Rules toolbar */
.de-rules-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.de-rules-toolbar input,.de-rules-toolbar select{padding:7px 10px;background:var(--bg-primary,#0d1117);border:1px solid var(--border,rgba(99,110,123,.4));border-radius:6px;color:var(--text-primary,#f0f6fc);font-size:.82rem}
.de-rules-toolbar input{flex:1;min-width:200px}
.de-rules-toolbar select{min-width:120px}
.de-rules-toolbar input::placeholder{color:var(--text-secondary,#8b949e)}

/* Pagination */
.de-pager{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--border,rgba(99,110,123,.4))}
.de-pager-info{font-size:.78rem;color:var(--text-secondary,#8b949e)}
.de-pager-btns{display:flex;gap:4px}
.de-pager-btns button{padding:5px 12px;background:var(--bg-primary,#0d1117);border:1px solid var(--border,rgba(99,110,123,.4));border-radius:4px;color:var(--text-secondary,#8b949e);cursor:pointer;font-size:.78rem}
.de-pager-btns button:hover:not(:disabled){color:var(--text-primary,#f0f6fc);border-color:var(--neon-cyan,#00d4ff)}
.de-pager-btns button:disabled{opacity:.4;cursor:default}

/* Gaps tactic grid */
.de-gap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.de-gap-card{background:var(--bg-primary,#0d1117);border:1px solid var(--border,rgba(99,110,123,.4));border-radius:8px;padding:12px}
.de-gap-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.de-gap-tactic{font-size:.78rem;font-weight:700;color:var(--text-primary,#f0f6fc);text-transform:capitalize}
.de-gap-count{font-size:.72rem;font-weight:700;color:var(--sev-critical);font-family:'JetBrains Mono',monospace}
.de-gap-list{display:flex;flex-direction:column;gap:3px}
.de-gap-item{font-size:.75rem;color:var(--text-secondary,#8b949e);padding:3px 0;border-bottom:1px solid rgba(99,110,123,.1)}
.de-gap-item code{color:var(--neon-cyan,#00d4ff);font-size:.72rem;margin-right:4px}

/* Loading / empty */
.de-loading{text-align:center;padding:40px;color:var(--text-secondary,#8b949e)}
.de-loading .de-spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border,rgba(99,110,123,.4));border-top-color:var(--neon-cyan,#00d4ff);border-radius:50%;animation:de-spin .8s linear infinite;margin-bottom:8px}
@keyframes de-spin{to{transform:rotate(360deg)}}
.de-empty{text-align:center;padding:40px;color:var(--text-secondary,#8b949e);font-size:.85rem}

/* MITRE ID chip */
.de-mitre-chip{display:inline-block;padding:1px 6px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.25);border-radius:3px;font-size:.68rem;font-family:'JetBrains Mono',monospace;color:var(--neon-cyan,#00d4ff);margin:1px}

/* Execution tab */
.de-exec-time{display:flex;gap:8px;align-items:center;margin-bottom:16px}
.de-exec-time button{padding:5px 12px;background:var(--bg-primary,#0d1117);border:1px solid var(--border,rgba(99,110,123,.4));border-radius:4px;color:var(--text-secondary,#8b949e);cursor:pointer;font-size:.78rem;transition:all .15s}
.de-exec-time button:hover{border-color:var(--neon-cyan,#00d4ff);color:var(--text-primary)}
.de-exec-time button.active{background:rgba(0,212,255,.1);border-color:var(--neon-cyan,#00d4ff);color:var(--neon-cyan,#00d4ff)}

/* Volume chart */
.de-vol-chart{position:relative;height:140px;background:var(--bg-primary,#0d1117);border:1px solid var(--border,rgba(99,110,123,.4));border-radius:8px;padding:8px 12px;overflow:hidden}
.de-vol-bars{display:flex;align-items:flex-end;gap:1px;height:100%;position:relative}
.de-vol-bar{flex:1;min-width:2px;border-radius:2px 2px 0 0;transition:height .3s;position:relative}
.de-vol-bar:hover{opacity:.8}
.de-vol-bar .de-vol-tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);padding:4px 8px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;font-size:.68rem;white-space:nowrap;z-index:10;color:var(--text-primary)}
.de-vol-bar:hover .de-vol-tip{display:block}

/* Efficacy indicator */
.de-eff{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;font-weight:700}
.de-eff.good{color:var(--mitre-covered)}
.de-eff.warn{color:var(--mitre-partial)}
.de-eff.bad{color:var(--sev-critical)}

/* Inline bar for close rate */
.de-rate-bar{display:inline-flex;align-items:center;gap:6px;width:100px}
.de-rate-track{flex:1;height:6px;background:rgba(99,110,123,.2);border-radius:3px;overflow:hidden}
.de-rate-fill{height:100%;border-radius:3px;transition:width .3s}
.de-rate-val{font-size:.72rem;font-family:'JetBrains Mono',monospace;min-width:36px;text-align:right}

/* Actor Readiness — Report modal */
.de-report-bar{display:flex;gap:8px;align-items:center;padding:10px 14px;background:var(--bg-primary,#0d1117);border:1px solid var(--border,rgba(99,110,123,.4));border-radius:8px;margin-bottom:12px;flex-wrap:wrap}
.de-report-bar select{padding:6px 10px;background:var(--bg-secondary,#161b22);border:1px solid var(--border,rgba(99,110,123,.4));border-radius:6px;color:var(--text-primary);font-size:.82rem;max-width:250px}
.de-report-bar label{font-size:.75rem;color:var(--text-secondary);font-weight:600}
.de-btn-report{padding:7px 16px;background:rgba(0,212,255,.15);border:1px solid var(--neon-cyan,#00d4ff);border-radius:6px;color:var(--neon-cyan);cursor:pointer;font-size:.78rem;font-weight:700;transition:all .15s;white-space:nowrap}
.de-btn-report:hover{background:rgba(0,212,255,.25)}
.de-btn-report:disabled{opacity:.4;cursor:default}
.de-btn-pdf{padding:7px 16px;background:var(--sev-critical-bg);border:1px solid var(--sev-critical);border-radius:6px;color:var(--sev-critical);cursor:pointer;font-size:.78rem;font-weight:700;transition:all .15s;white-space:nowrap}
.de-btn-pdf:hover{background:var(--sev-critical-dim)}
.de-btn-pdf:disabled{opacity:.4;cursor:default}

/* System readiness detail */
.de-sys-readiness{background:var(--bg-secondary,#161b22);border:1px solid var(--border,rgba(99,110,123,.4));border-radius:10px;padding:16px;margin-bottom:16px}
.de-readiness-gauge{display:flex;align-items:center;gap:16px;margin:12px 0}
.de-readiness-bar{flex:1;height:16px;background:rgba(99,110,123,.2);border-radius:8px;overflow:hidden}
.de-readiness-fill{height:100%;border-radius:8px;transition:width .5s}

/* Actor Readiness */
.de-actor{background:var(--bg-secondary,#161b22);border:1px solid var(--border,rgba(99,110,123,.4));border-radius:10px;margin-bottom:12px;overflow:hidden}
.de-actor-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background .15s}
.de-actor-header:hover{background:rgba(0,212,255,.03)}
.de-actor-name{font-size:.9rem;font-weight:700;color:var(--text-primary,#f0f6fc);flex:1}
.de-actor-aliases{font-size:.7rem;color:var(--text-secondary,#8b949e);margin-top:2px}
.de-actor-gauge{width:80px;text-align:center}
.de-actor-gauge-ring{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 2px}
.de-actor-gauge-val{font-size:.85rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.de-actor-gauge-label{font-size:.6rem;color:var(--text-secondary);text-transform:uppercase}
.de-actor-meta{display:flex;gap:12px;align-items:center}
.de-actor-meta-item{font-size:.72rem;color:var(--text-secondary);font-family:'JetBrains Mono',monospace}
.de-actor-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border,rgba(99,110,123,.4))}
.de-actor.open .de-actor-body{display:block}
.de-actor-chevron{color:var(--text-secondary);transition:transform .2s;font-size:.8rem}
.de-actor.open .de-actor-chevron{transform:rotate(90deg)}
.de-actor-ttp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
@media(max-width:800px){.de-actor-ttp-grid{grid-template-columns:1fr}}
.de-ttp-covered,.de-ttp-gap{padding:8px;border-radius:6px}
.de-ttp-covered{background:var(--mitre-covered-bg);border:1px solid var(--mitre-covered-dim)}
.de-ttp-gap{background:var(--mitre-gap-bg);border:1px solid var(--mitre-gap-dim)}

/* Kill Chain Progression */
.de-prog{background:var(--bg-secondary,#161b22);border-radius:10px;margin-bottom:12px;overflow:hidden}
.de-prog-header{padding:14px 16px;display:flex;align-items:center;gap:12px;border-left:4px solid var(--border)}
.de-prog-header.critical{border-left-color:var(--sev-critical)}
.de-prog-header.high{border-left-color:var(--sev-high)}
.de-prog-header.medium{border-left-color:var(--sev-medium)}
.de-prog-host{font-size:.9rem;font-weight:700;color:var(--text-primary);font-family:'JetBrains Mono',monospace}
.de-prog-playbook{font-size:.78rem;color:var(--neon-cyan,#00d4ff)}
.de-prog-pct{font-size:.85rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.de-prog-steps{padding:0 16px 16px;display:flex;align-items:stretch;gap:0;overflow-x:auto}
.de-prog-step{flex:0 0 auto;width:140px;padding:10px;border-radius:6px;border:2px solid var(--border,rgba(99,110,123,.4));display:flex;flex-direction:column;gap:4px}
.de-prog-step.fired{border-color:var(--sev-critical);background:var(--sev-critical-bg)}
.de-prog-step.safe{border-color:var(--mitre-covered);border-style:dashed;opacity:.6}
.de-prog-step-num{font-size:.65rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase}
.de-prog-step-name{font-size:.75rem;font-weight:600;color:var(--text-primary);line-height:1.3}
.de-prog-step-detail{font-size:.65rem;color:var(--text-secondary);margin-top:auto}
.de-prog-arrow{display:flex;align-items:center;justify-content:center;width:24px;flex-shrink:0;color:var(--text-secondary);font-size:1rem}
</style>

<script>
(function(){
'use strict';

const API = '/api/cyab';
let _activeTab = 'posture';
let _postureData = null;
let _killChainsData = null;
let _gapsData = null;
let _rulesPage = {search:'', severity:'', enabled:'', offset:0, limit:50, total:0, rows:[]};
let _execHours = 168;
let _loaded = {posture:false, killchains:false, rules:false, execution:false, readiness:false, progression:false, gaps:false, d3fend:false, emulation:false, vulns:false};
let _vulnsCache = null;
let _d3fendCache = null;
let _emCache = null;

/* ── Helpers ──────────────────────────────────── */
async function apiFetch(path) {
    const r = await fetch(API + path, {credentials:'include'});
    if (!r.ok) throw new Error(`${r.status}`);
    return r.json();
}
function $(id){ return document.getElementById(id); }
function esc(s){ return DOMPurify.sanitize(String(s||'')); }
function pct(a,b){ return b ? Math.round(a/b*100) : 0; }
function sevClass(s){ return (s||'').toLowerCase(); }

/* ── Tab switching ────────────────────────────── */
window.deSwitch = function(tab) {
    _activeTab = tab;
    document.querySelectorAll('.de-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.querySelectorAll('.de-panel').forEach(p => p.classList.toggle('active', p.id === 'de-panel-'+tab));
    if (!_loaded[tab]) loadTab(tab);
};

window.deRefresh = function() {
    _loaded = {posture:false, killchains:false, rules:false, execution:false, readiness:false, progression:false, gaps:false, d3fend:false, emulation:false, vulns:false};
    _postureData = null; _killChainsData = null; _gapsData = null;
    _d3fendCache = null; _emCache = null; _vulnsCache = null;
    loadTab(_activeTab);
};

function loadTab(tab) {
    const panel = $('de-panel-'+tab);
    panel.innerHTML = '<div class="de-loading"><div class="de-spinner"></div><div>Loading...</div></div>';
    switch(tab) {
        case 'posture': loadPosture(); break;
        case 'killchains': loadKillChains(); break;
        case 'rules': loadRules(); break;
        case 'execution': loadExecution(); break;
        case 'd3fend': loadD3fend(); break;
        case 'emulation': loadEmulation(); break;
        case 'vulns': loadVulns(); break;
        case 'readiness': loadReadiness(); break;
        case 'progression': loadProgression(); break;
        case 'gaps': loadGaps(); break;
    }
}

/* ── Posture tab ──────────────────────────────── */
async function loadPosture() {
    try {
        const data = await apiFetch('/tide/de/posture');
        if (!data.enabled) { $('de-panel-posture').innerHTML='<div class="de-empty">TIDE not configured</div>'; return; }
        _postureData = data;
        $('de-tide-badge').querySelector('.de-tide-dot').classList.add('ok');

        const disabled_crit = await apiFetch('/tide/de/disabled-critical');
        renderPosture(data, disabled_crit);
        _loaded.posture = true;
    } catch(e) {
        $('de-panel-posture').innerHTML=`<div class="de-empty">Failed to load posture: ${esc(e.message)}</div>`;
    }
}

function renderPosture(d, disabledCrit) {
    const covPct = pct(d.covered_techniques, d.total_techniques);
    const enabledPct = pct(d.enabled_rules, d.total_rules);
    const q = d.quality || {};

    let html = `
    <div class="de-stats">
        <div class="de-stat"><div class="de-stat-label">Total Rules</div><div class="de-stat-val">${d.total_rules.toLocaleString()}</div><div class="de-stat-sub">in default space</div></div>
        <div class="de-stat green"><div class="de-stat-label">Enabled</div><div class="de-stat-val">${d.enabled_rules.toLocaleString()}</div><div class="de-stat-sub">${enabledPct}% of total</div></div>
        <div class="de-stat warn"><div class="de-stat-label">Disabled</div><div class="de-stat-val">${d.disabled_rules.toLocaleString()}</div><div class="de-stat-sub">${100-enabledPct}% of total</div></div>
        <div class="de-stat"><div class="de-stat-label">MITRE Coverage</div><div class="de-stat-val">${d.covered_techniques}/${d.total_techniques}</div><div class="de-stat-sub">${covPct}% techniques</div></div>
        <div class="de-stat"><div class="de-stat-label">Unmapped Rules</div><div class="de-stat-val">${d.unmapped_rules}</div><div class="de-stat-sub">no MITRE mapping</div></div>
        <div class="de-stat"><div class="de-stat-label">Systems</div><div class="de-stat-val">${d.total_systems}</div><div class="de-stat-sub">monitored</div></div>
    </div>

    <div class="de-cols">
        <div class="de-section">
            <div class="de-section-title"><i class="icon-bar-chart-2"></i> Severity Breakdown</div>
            <div class="de-donut-row">${renderSeverityDonut(d)}</div>
            ${renderSeverityTable(d)}
        </div>
        <div class="de-section">
            <div class="de-section-title"><i class="icon-star"></i> Quality Distribution</div>
            ${renderQualityBar(q, d.total_rules)}
            <div style="margin-top:12px;font-size:.78rem;color:var(--text-secondary)">
                Average quality: <span style="color:var(--text-primary);font-weight:700;font-family:'JetBrains Mono',monospace">${q.avg_quality || 0}</span>/100
            </div>
        </div>
    </div>`;

    if (disabledCrit.length) {
        html += `<div class="de-section">
            <div class="de-section-title"><i class="icon-alert-triangle"></i> Disabled Critical/High Rules (${disabledCrit.length})</div>
            <table class="de-table"><thead><tr><th>Rule</th><th>Severity</th><th>Quality</th><th>MITRE</th></tr></thead><tbody>`;
        for (const r of disabledCrit.slice(0, 25)) {
            const mitre = (r.mitre_ids||[]).map(m=>`<span class="de-mitre-chip">${esc(m)}</span>`).join(' ');
            html += `<tr>
                <td>${esc(r.name)}</td>
                <td><span class="de-sev ${sevClass(r.severity)}">${esc(r.severity)}</span></td>
                <td class="mono">${r.quality_score??'-'}</td>
                <td>${mitre||'-'}</td>
            </tr>`;
        }
        html += `</tbody></table></div>`;
    }

    $('de-panel-posture').innerHTML = html;
}

function renderSeverityDonut(d) {
    const sev = d.severity || {};
    const colors = {critical:'var(--sev-critical)',high:'var(--sev-high)',medium:'var(--sev-medium)',low:'var(--sev-low)'};
    const order = ['critical','high','medium','low'];
    let total = 0;
    const slices = [];
    for (const s of order) {
        const v = (sev[s]||{}).total||0;
        total += v;
        slices.push({label:s, value:v, color:colors[s]});
    }
    if (!total) return '<div class="de-empty">No severity data</div>';

    let cumPct = 0;
    const gradParts = [];
    for (const sl of slices) {
        const p = sl.value/total*100;
        gradParts.push(`${sl.color} ${cumPct}% ${cumPct+p}%`);
        cumPct += p;
    }
    const legend = slices.map(sl =>
        `<div class="de-donut-legend-item"><div class="de-donut-legend-dot" style="background:${sl.color}"></div>${sl.label}: ${sl.value}</div>`
    ).join('');

    return `<div class="de-donut-wrap">
        <div class="de-donut" style="background:conic-gradient(${gradParts.join(',')})">
            <div class="de-donut-center"><span class="de-donut-pct">${total}</span><span class="de-donut-label">rules</span></div>
        </div>
        <div class="de-donut-legend">${legend}</div>
    </div>`;
}

function renderSeverityTable(d) {
    const sev = d.severity || {};
    const order = ['critical','high','medium','low'];
    let html = '<table class="de-table" style="margin-top:12px"><thead><tr><th>Severity</th><th>Total</th><th>Enabled</th><th>Disabled</th></tr></thead><tbody>';
    for (const s of order) {
        const v = sev[s] || {total:0,enabled:0,disabled:0};
        html += `<tr><td><span class="de-sev ${s}">${s}</span></td><td class="mono">${v.total}</td><td class="mono de-enabled">${v.enabled}</td><td class="mono de-disabled">${v.disabled}</td></tr>`;
    }
    html += '</tbody></table>';
    return html;
}

function renderQualityBar(q, total) {
    if (!total) return '<div class="de-empty">No data</div>';
    const segs = [
        {cls:'excellent',label:'Excellent (30+)',val:q.excellent||0},
        {cls:'good',label:'Good (20-29)',val:q.good||0},
        {cls:'fair',label:'Fair (10-19)',val:q.fair||0},
        {cls:'poor',label:'Poor (<10)',val:q.poor||0},
    ];
    let bar = '<div class="de-qbar">';
    for (const s of segs) {
        const w = s.val/total*100;
        if (w > 0) bar += `<div class="de-qbar-seg ${s.cls}" style="width:${w}%" title="${s.label}: ${s.val}">${w>5?s.val:''}</div>`;
    }
    bar += '</div>';
    bar += '<div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">';
    for (const s of segs) {
        bar += `<div class="de-donut-legend-item"><div class="de-donut-legend-dot ${s.cls}" style="background:${s.cls==='excellent'?'var(--quality-excellent)':s.cls==='good'?'var(--quality-good)':s.cls==='fair'?'var(--quality-fair)':'var(--quality-poor)'}"></div>${s.label}: <strong>${s.val}</strong></div>`;
    }
    bar += '</div>';
    return bar;
}

/* ── Use Cases tab (TIDE baselines / playbooks) ─── */
async function loadKillChains() {
    try {
        const data = await apiFetch('/tide/de/use-cases');
        _killChainsData = data;
        renderKillChains(data);
        _loaded.killchains = true;
    } catch(e) {
        $('de-panel-killchains').innerHTML=`<div class="de-empty">Failed to load: ${esc(e.message)}</div>`;
    }
}

function renderKillChains(playbooks) {
    if (!playbooks.length) {
        $('de-panel-killchains').innerHTML='<div class="de-empty">No use cases found in TIDE</div>';
        return;
    }
    let html = '';
    for (const pb of playbooks) {
        html += `<div class="de-kc">
            <div class="de-kc-title">${esc(pb.name)}</div>
            <div class="de-kc-desc">${esc(pb.description||'')}</div>
            <div class="de-kc-chain">`;
        const covMap = pb.technique_coverage || {};
        for (let i = 0; i < pb.steps.length; i++) {
            const step = pb.steps[i];
            if (i > 0) html += '<div class="de-kc-arrow">\u2192</div>';

            // Determine coverage state for this step
            let stepState = 'blind'; // default
            let ruleInfo = '';
            if (step.techniques.length) {
                let totalR = 0, enabledR = 0;
                for (const tid of step.techniques) {
                    const c = covMap[tid];
                    if (c) { totalR += c.rule_count; enabledR += c.enabled_rules; }
                }
                if (totalR > 0 && enabledR > 0) {
                    stepState = 'covered';
                    ruleInfo = `<span class="ok">${enabledR} enabled</span> / ${totalR} rules`;
                } else if (totalR > 0) {
                    stepState = 'partial';
                    ruleInfo = `<span class="warn">${totalR} rules (0 enabled)</span>`;
                } else {
                    ruleInfo = '<span class="bad">No rules</span>';
                }
            } else {
                ruleInfo = '<span style="color:var(--text-secondary)">No techniques linked</span>';
            }

            const techChips = step.techniques.map(t=>`<span class="de-mitre-chip">${esc(t)}</span>`).join(' ');
            const tacticLabel = step.tactic ? `<div style="font-size:.65rem;color:var(--text-secondary);margin-top:2px;text-transform:uppercase;letter-spacing:.3px">${esc(step.tactic)}</div>` : '';
            const reqRule = step.required_rule ? `<div style="font-size:.68rem;color:var(--text-secondary);margin-top:3px;font-style:italic">Req: ${esc(step.required_rule)}</div>` : '';
            html += `<div class="de-kc-node ${stepState}">
                <div class="de-kc-node-header">Step ${step.order}</div>
                <div class="de-kc-node-name">${esc(step.name)}</div>
                ${tacticLabel}
                <div style="margin-top:4px">${techChips||''}</div>
                ${reqRule}
                <div class="de-kc-node-rules">${ruleInfo}</div>
            </div>`;
        }
        html += '</div></div>';
    }
    $('de-panel-killchains').innerHTML = html;
}

/* ── Rules tab ────────────────────────────────── */
async function loadRules() {
    try {
        renderRulesToolbar();
        await fetchRules();
        _loaded.rules = true;
    } catch(e) {
        $('de-panel-rules').innerHTML=`<div class="de-empty">Failed to load: ${esc(e.message)}</div>`;
    }
}

function renderRulesToolbar() {
    $('de-panel-rules').innerHTML = `
        <div class="de-rules-toolbar">
            <input type="text" id="de-rules-search" placeholder="Search rules or MITRE IDs..." value="${esc(_rulesPage.search)}" onkeydown="if(event.key==='Enter')deRulesSearch()">
            <select id="de-rules-sev" onchange="deRulesSearch()">
                <option value="">All Severities</option>
                <option value="critical"${_rulesPage.severity==='critical'?' selected':''}>Critical</option>
                <option value="high"${_rulesPage.severity==='high'?' selected':''}>High</option>
                <option value="medium"${_rulesPage.severity==='medium'?' selected':''}>Medium</option>
                <option value="low"${_rulesPage.severity==='low'?' selected':''}>Low</option>
            </select>
            <select id="de-rules-enabled" onchange="deRulesSearch()">
                <option value="">Enabled & Disabled</option>
                <option value="1"${_rulesPage.enabled==='1'?' selected':''}>Enabled</option>
                <option value="0"${_rulesPage.enabled==='0'?' selected':''}>Disabled</option>
            </select>
            <button class="btn btn-secondary" onclick="deRulesSearch()" style="padding:7px 14px;font-size:.82rem">Search</button>
        </div>
        <div id="de-rules-body"><div class="de-loading"><div class="de-spinner"></div><div>Loading...</div></div></div>`;
}

window.deRulesSearch = function() {
    _rulesPage.search = ($('de-rules-search')||{}).value || '';
    _rulesPage.severity = ($('de-rules-sev')||{}).value || '';
    _rulesPage.enabled = ($('de-rules-enabled')||{}).value || '';
    _rulesPage.offset = 0;
    fetchRules();
};

window.deRulesPage = function(dir) {
    if (dir === 'next') _rulesPage.offset += _rulesPage.limit;
    else _rulesPage.offset = Math.max(0, _rulesPage.offset - _rulesPage.limit);
    fetchRules();
};

async function fetchRules() {
    const p = _rulesPage;
    const params = new URLSearchParams();
    if (p.search) params.set('search', p.search);
    if (p.severity) params.set('severity', p.severity);
    if (p.enabled) params.set('enabled', p.enabled);
    params.set('offset', p.offset);
    params.set('limit', p.limit);

    const body = $('de-rules-body');
    if (body) body.innerHTML = '<div class="de-loading"><div class="de-spinner"></div></div>';

    const data = await apiFetch('/tide/de/rules?' + params.toString());
    _rulesPage.total = data.total;
    _rulesPage.rows = data.rows;
    renderRulesTable();
}

function renderRulesTable() {
    const p = _rulesPage;
    const body = $('de-rules-body');
    if (!body) return;
    if (!p.rows.length) {
        body.innerHTML = '<div class="de-empty">No rules match filters</div>';
        return;
    }

    let html = '<table class="de-table"><thead><tr><th>Rule Name</th><th>Severity</th><th>Status</th><th>Quality</th><th>MITRE</th></tr></thead><tbody>';
    for (const r of p.rows) {
        const mitre = (r.mitre_ids||[]).map(m=>`<span class="de-mitre-chip">${esc(m)}</span>`).join(' ');
        const status = r.enabled ? '<span class="de-enabled">Enabled</span>' : '<span class="de-disabled">Disabled</span>';
        html += `<tr>
            <td>${esc(r.name)}</td>
            <td><span class="de-sev ${sevClass(r.severity)}">${esc(r.severity)}</span></td>
            <td>${status}</td>
            <td class="mono">${r.quality_score??'-'}</td>
            <td>${mitre||'-'}</td>
        </tr>`;
    }
    html += '</tbody></table>';

    // Pagination
    const from = p.offset + 1;
    const to = Math.min(p.offset + p.limit, p.total);
    html += `<div class="de-pager">
        <div class="de-pager-info">Showing ${from}-${to} of ${p.total.toLocaleString()}</div>
        <div class="de-pager-btns">
            <button onclick="deRulesPage('prev')" ${p.offset===0?'disabled':''}>Prev</button>
            <button onclick="deRulesPage('next')" ${p.offset+p.limit>=p.total?'disabled':''}>Next</button>
        </div>
    </div>`;

    body.innerHTML = html;
}

/* ── Execution tab ────────────────────────────── */
window.deExecSetHours = function(h) {
    _execHours = h;
    _loaded.execution = false;
    loadExecution();
};

async function loadExecution() {
    const panel = $('de-panel-execution');
    panel.innerHTML = '<div class="de-loading"><div class="de-spinner"></div><div>Loading execution metrics...</div></div>';
    try {
        const data = await apiFetch(`/tide/de/execution?hours=${_execHours}`);
        if (!data.enabled) {
            panel.innerHTML = `<div class="de-empty">${esc(data.error || 'Not configured')}</div>`;
            return;
        }
        if (data.error) {
            panel.innerHTML = `<div class="de-empty">${esc(data.error)}</div>`;
            return;
        }
        renderExecution(data);
        _loaded.execution = true;
    } catch(e) {
        panel.innerHTML = `<div class="de-empty">Failed to load: ${esc(e.message)}</div>`;
    }
}

function renderExecution(d) {
    const s = d.summary || {};
    const timeRanges = [
        {h:24, label:'24h'}, {h:72, label:'3d'}, {h:168, label:'7d'},
        {h:336, label:'14d'}, {h:720, label:'30d'}
    ];

    let html = `<div class="de-exec-time">
        <span style="font-size:.78rem;color:var(--text-secondary)">Time range:</span>
        ${timeRanges.map(t => `<button class="${_execHours===t.h?'active':''}" onclick="deExecSetHours(${t.h})">${t.label}</button>`).join('')}
    </div>`;

    // Summary stats
    const openPct = s.total_alerts ? pct((s.status||{}).open||0, s.total_alerts) : 0;
    html += `<div class="de-stats">
        <div class="de-stat"><div class="de-stat-label">Total Alerts</div><div class="de-stat-val">${(s.total_alerts||0).toLocaleString()}</div><div class="de-stat-sub">in last ${_execHours}h</div></div>
        <div class="de-stat"><div class="de-stat-label">Unique Rules Firing</div><div class="de-stat-val">${s.unique_rules_firing||0}</div><div class="de-stat-sub">${s.tide_matched||0} matched to TIDE</div></div>
        <div class="de-stat"><div class="de-stat-label">Avg / Rule</div><div class="de-stat-val">${s.avg_alerts_per_rule||0}</div><div class="de-stat-sub">alerts per firing rule</div></div>
        <div class="de-stat warn"><div class="de-stat-label">Noisy Rules</div><div class="de-stat-val">${s.noisy_rules||0}</div><div class="de-stat-sub">&gt;70% closed, &gt;10 alerts</div></div>
        <div class="de-stat crit"><div class="de-stat-label">Silent Rules</div><div class="de-stat-val">${s.silent_enabled_rules||0}</div><div class="de-stat-sub">enabled in TIDE, 0 alerts</div></div>
        <div class="de-stat"><div class="de-stat-label">Open</div><div class="de-stat-val">${((s.status||{}).open||0).toLocaleString()}</div><div class="de-stat-sub">${openPct}% of total</div></div>
    </div>`;

    // Volume chart
    html += `<div class="de-section">
        <div class="de-section-title"><i class="icon-activity"></i> Alert Volume</div>
        ${renderVolumeChart(d.timeline || [])}
    </div>`;

    // Severity timeline
    if (d.severity_timeline && d.severity_timeline.length) {
        html += `<div class="de-section">
            <div class="de-section-title"><i class="icon-bar-chart-2"></i> Volume by Severity</div>
            ${renderSevTimeline(d.severity_timeline)}
        </div>`;
    }

    // Two columns: Top firing + Noisy
    html += '<div class="de-cols">';

    // Top firing rules
    html += `<div class="de-section">
        <div class="de-section-title"><i class="icon-zap"></i> Top Firing Rules</div>`;
    if ((d.top_firing||[]).length) {
        html += '<table class="de-table"><thead><tr><th>Rule</th><th>Alerts</th><th>Close Rate</th><th>TIDE</th></tr></thead><tbody>';
        for (const r of (d.top_firing||[]).slice(0, 20)) {
            const tideTag = r.in_tide
                ? `<span class="de-sev ${sevClass(r.tide_severity)}" style="font-size:.65rem">${esc(r.tide_severity)}</span>`
                : '<span style="font-size:.68rem;color:var(--text-secondary)">-</span>';
            html += `<tr>
                <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.rule_name)}">${esc(r.rule_name)}</td>
                <td class="mono">${r.alert_count}</td>
                <td>${renderRateBar(r.close_rate)}</td>
                <td>${tideTag}</td>
            </tr>`;
        }
        html += '</tbody></table>';
    } else {
        html += '<div class="de-empty">No firing rules</div>';
    }
    html += '</div>';

    // Noisy rules
    html += `<div class="de-section">
        <div class="de-section-title"><i class="icon-volume-2"></i> Noisy Rules <span style="font-size:.68rem;color:var(--text-secondary);font-weight:400">(high volume, mostly closed)</span></div>`;
    if ((d.noisy_rules||[]).length) {
        html += '<table class="de-table"><thead><tr><th>Rule</th><th>Alerts</th><th>Close Rate</th><th>Open</th></tr></thead><tbody>';
        for (const r of (d.noisy_rules||[]).slice(0, 15)) {
            html += `<tr>
                <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.rule_name)}">${esc(r.rule_name)}</td>
                <td class="mono">${r.alert_count}</td>
                <td>${renderRateBar(r.close_rate)}</td>
                <td class="mono">${r.open}</td>
            </tr>`;
        }
        html += '</tbody></table>';
    } else {
        html += '<div class="de-empty" style="padding:20px">No noisy rules detected</div>';
    }
    html += '</div></div>'; // close cols

    // Silent rules
    if ((d.silent_rules||[]).length) {
        html += `<div class="de-section">
            <div class="de-section-title"><i class="icon-volume-x"></i> Silent Rules <span style="font-size:.68rem;color:var(--text-secondary);font-weight:400">(enabled in TIDE, 0 alerts in ES)</span></div>
            <table class="de-table"><thead><tr><th>Rule</th><th>TIDE Severity</th><th>Quality</th><th>MITRE</th></tr></thead><tbody>`;
        for (const r of (d.silent_rules||[]).slice(0, 30)) {
            const mitre = (r.mitre_ids||[]).slice(0,5).map(m=>`<span class="de-mitre-chip">${esc(m)}</span>`).join(' ');
            html += `<tr>
                <td>${esc(r.rule_name)}</td>
                <td><span class="de-sev ${sevClass(r.tide_severity)}">${esc(r.tide_severity||'-')}</span></td>
                <td class="mono">${r.tide_quality??'-'}</td>
                <td>${mitre||'-'}</td>
            </tr>`;
        }
        html += '</tbody></table></div>';
    }

    $('de-panel-execution').innerHTML = html;
}

function renderVolumeChart(timeline) {
    if (!timeline.length) return '<div class="de-empty">No data</div>';
    const max = Math.max(...timeline.map(t=>t.count), 1);
    let bars = '';
    for (const t of timeline) {
        const h = Math.max(t.count/max*100, 1);
        const ts = t.timestamp ? new Date(t.timestamp).toLocaleString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        const color = t.count > max*0.8 ? 'var(--sev-critical)' : t.count > max*0.5 ? 'var(--sev-medium)' : 'var(--mitre-covered)';
        bars += `<div class="de-vol-bar" style="height:${h}%;background:${color}"><div class="de-vol-tip">${ts}: ${t.count}</div></div>`;
    }
    return `<div class="de-vol-chart"><div class="de-vol-bars">${bars}</div></div>`;
}

function renderSevTimeline(timeline) {
    if (!timeline.length) return '';
    const sevColors = {critical:'var(--sev-critical)',high:'var(--sev-high)',medium:'var(--sev-medium)',low:'var(--sev-low)'};
    const sevOrder = ['critical','high','medium','low'];

    // Find max total per bucket
    let maxTotal = 1;
    for (const t of timeline) {
        let total = 0;
        for (const s of sevOrder) total += (t[s]||0);
        if (total > maxTotal) maxTotal = total;
    }

    let bars = '';
    for (const t of timeline) {
        const ts = t.timestamp ? new Date(t.timestamp).toLocaleString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        let total = 0;
        for (const s of sevOrder) total += (t[s]||0);
        let segs = '';
        for (const s of sevOrder) {
            const v = t[s]||0;
            if (v > 0) {
                const h = v/maxTotal*100;
                segs += `<div style="height:${h}%;background:${sevColors[s]};width:100%;border-radius:1px" title="${s}: ${v}"></div>`;
            }
        }
        const h = Math.max(total/maxTotal*100, 1);
        bars += `<div class="de-vol-bar" style="height:${h}%;display:flex;flex-direction:column-reverse;background:transparent"><div class="de-vol-tip">${ts}: ${total}</div>${segs}</div>`;
    }
    return `<div class="de-vol-chart"><div class="de-vol-bars">${bars}</div></div>
        <div style="display:flex;gap:12px;margin-top:8px">
            ${sevOrder.map(s=>`<div class="de-donut-legend-item"><div class="de-donut-legend-dot" style="background:${sevColors[s]}"></div>${s}</div>`).join('')}
        </div>`;
}

function renderRateBar(rate) {
    const color = rate >= 70 ? 'var(--sev-critical)' : rate >= 40 ? 'var(--sev-medium)' : 'var(--mitre-covered)';
    return `<div class="de-rate-bar">
        <div class="de-rate-track"><div class="de-rate-fill" style="width:${rate}%;background:${color}"></div></div>
        <div class="de-rate-val" style="color:${color}">${rate}%</div>
    </div>`;
}

/* ── Actor Readiness tab ──────────────────────── */
let _readinessSearch = '';
let _tideSystems = null;
let _selectedSystemId = '';

async function loadReadiness() {
    const panel = $('de-panel-readiness');

    // Load TIDE systems for the selector (once)
    if (!_tideSystems) {
        try { _tideSystems = await apiFetch('/tide/de/systems'); } catch(e) { _tideSystems = []; }
    }
    const sysOpts = (_tideSystems||[]).map(s =>
        `<option value="${s.id}" ${_selectedSystemId==s.id?'selected':''}>${esc(s.name)}${s.classification ? ' ('+esc(s.classification)+')' : ''}</option>`
    ).join('');

    panel.innerHTML = `
        <div class="de-report-bar">
            <label>System:</label>
            <select id="de-readiness-system" onchange="_selectedSystemId=this.value">
                <option value="">All Systems (Global)</option>
                ${sysOpts}
            </select>
            <input type="text" id="de-readiness-search" placeholder="Search threat actors (e.g. APT29, Lazarus)..." value="${esc(_readinessSearch)}" onkeydown="if(event.key==='Enter')deReadinessSearch()" style="flex:1;min-width:200px;padding:6px 10px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-size:.82rem">
            <button class="de-btn-report" onclick="deReadinessSearch()">Search</button>
        </div>
        <div id="de-readiness-body"><div class="de-loading"><div class="de-spinner"></div><div>Querying OpenCTI + TIDE...</div></div></div>`;
    await fetchReadiness();
}

window.deReadinessSearch = function() {
    _readinessSearch = ($('de-readiness-search')||{}).value || '';
    _selectedSystemId = ($('de-readiness-system')||{}).value || '';
    fetchReadiness();
};

async function fetchReadiness() {
    const body = $('de-readiness-body');
    if (!body) return;
    body.innerHTML = '<div class="de-loading"><div class="de-spinner"></div><div>Querying OpenCTI + TIDE...</div></div>';
    try {
        const params = new URLSearchParams();
        if (_readinessSearch) params.set('search', _readinessSearch);
        const data = await apiFetch('/tide/de/actor-readiness?' + params.toString());
        if (!data.enabled) {
            body.innerHTML = `<div class="de-empty">${esc(data.error || 'Not configured')}</div>`;
            return;
        }
        if (data.error) {
            body.innerHTML = `<div class="de-empty">${esc(data.error)}</div>`;
            return;
        }
        renderReadiness(data, body);
        _loaded.readiness = true;
    } catch(e) {
        body.innerHTML = `<div class="de-empty">Failed: ${esc(e.message)}</div>`;
    }
}

window.toggleActorDetail = function(el) {
    el.closest('.de-actor').classList.toggle('open');
};

window.deGenerateReport = async function(actorId, actorType) {
    const systemId = _selectedSystemId || '';
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = 'Assessing...';

    try {
        const payload = {actor_id: actorId, actor_type: actorType, generate_ai: false};
        if (systemId) payload.system_id = systemId;

        const resp = await fetch(API + '/tide/de/system-readiness', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            credentials: 'include',
            body: JSON.stringify(payload),
        });
        const data = await resp.json();
        if (!data.enabled) { alert(data.error || 'Failed'); return; }
        renderSystemReadiness(data, actorId, actorType);
    } catch(e) {
        alert('Failed: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Assess';
    }
};

window.deDownloadPdf = async function(actorId, actorType) {
    const systemId = _selectedSystemId || '';
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = 'Generating report...';

    try {
        const payload = {actor_id: actorId, actor_type: actorType, generate_ai: true};
        if (systemId) payload.system_id = systemId;

        const resp = await fetch(API + '/tide/de/readiness-pdf', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            credentials: 'include',
            body: JSON.stringify(payload),
        });
        if (!resp.ok) {
            const err = await resp.json().catch(()=>({detail:'Report generation failed'}));
            alert(err.detail || 'Failed');
            return;
        }
        const contentType = resp.headers.get('Content-Type') || '';
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);

        if (contentType.includes('application/pdf')) {
            // Direct PDF download
            const a = document.createElement('a');
            a.href = url;
            a.download = resp.headers.get('Content-Disposition')?.split('filename=')[1]?.replace(/"/g,'') || 'readiness_report.pdf';
            document.body.appendChild(a);
            a.click();
            a.remove();
        } else {
            // HTML fallback — open in new tab for printing
            window.open(url, '_blank');
        }
    } catch(e) {
        alert('Report failed: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Download PDF';
    }
};

function renderSystemReadiness(data, actorId, actorType) {
    const target = document.getElementById('de-sysreadiness-' + actorId.substring(0,8));
    if (!target) return;

    const r = data;
    const barColor = r.readiness_pct >= 75 ? 'var(--mitre-covered)' : r.readiness_pct >= 50 ? 'var(--mitre-partial)' : 'var(--sev-critical)';
    const sysLabel = r.system ? esc(r.system.name) : 'Global (All TIDE Rules)';

    let html = `<div class="de-sys-readiness">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div>
                <div style="font-size:.85rem;font-weight:700;color:var(--text-primary)">${esc(r.actor.name)} vs ${sysLabel}</div>
                <div style="font-size:.72rem;color:var(--text-secondary);margin-top:2px">${r.covered_count} covered, ${r.gap_count} gaps, ${r.total_ttps} total TTPs</div>
            </div>
            <button class="de-btn-pdf" onclick="deDownloadPdf('${actorId}','${actorType}')">Download PDF</button>
        </div>
        <div class="de-readiness-gauge">
            <span style="font-size:1.2rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:${barColor};min-width:50px">${r.readiness_pct}%</span>
            <div class="de-readiness-bar"><div class="de-readiness-fill" style="width:${r.readiness_pct}%;background:${barColor}"></div></div>
        </div>`;

    if (r.ai_summary) {
        html += `<div style="padding:10px;background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.15);border-radius:6px;margin:8px 0;font-size:.78rem;color:var(--text-primary);line-height:1.5">${esc(r.ai_summary)}</div>`;
    }

    // Compact coverage matrix
    html += '<table class="de-table" style="margin-top:8px"><thead><tr><th>Technique</th><th>Status</th><th>Rules</th><th>Enabled</th></tr></thead><tbody>';
    for (const e of r.coverage_matrix) {
        const st = e.covered
            ? '<span style="color:var(--mitre-covered);font-weight:700">COVERED</span>'
            : '<span style="color:var(--mitre-gap);font-weight:700">GAP</span>';
        html += `<tr><td><span class="de-mitre-chip">${esc(e.mitre_id)}</span> ${esc(e.name)}</td><td>${st}</td><td class="mono">${e.rule_count}</td><td class="mono">${e.enabled_rules}</td></tr>`;
    }
    html += '</tbody></table></div>';

    target.innerHTML = html;
