{% extends "base.html" %}

{% block title %}Audit Logs - IXION{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Audit Logs</h1>
</div>

<div class="card">
    <div class="card-header">
        <h2>Activity Log</h2>
        <div class="header-actions">
            <select id="filter-action" onchange="loadLogs()">
                <option value="">All Actions</option>
                <option value="login">Login</option>
                <option value="logout">Logout</option>
                <option value="login_failed">Failed Login</option>
                <option value="password_changed">Password Changed</option>
                <option value="user_created">User Created</option>
                <option value="user_updated">User Updated</option>
                <option value="user_deleted">User Deleted</option>
                <option value="user_roles_updated">Roles Updated</option>
                <option value="password_reset">Password Reset</option>
            </select>
            <select id="filter-resource" onchange="loadLogs()">
                <option value="">All Resources</option>
                <option value="user">User</option>
                <option value="template">Template</option>
                <option value="document">Document</option>
            </select>
            <button class="btn btn-secondary" onclick="loadLogs()">Refresh</button>
        </div>
    </div>
    <div class="card-body">
        <table class="data-table" id="logs-table">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>User</th>
                    <th>Action</th>
                    <th>Resource</th>
                    <th>Details</th>
                    <th>IP Address</th>
                </tr>
            </thead>
            <tbody id="logs-tbody">
                <tr><td colspan="6" class="loading">Loading audit logs...</td></tr>
            </tbody>
        </table>
        <div class="pagination" id="pagination">
            <button class="btn btn-sm" id="prev-page" onclick="prevPage()" disabled>Previous</button>
            <span id="page-info">Page 1</span>
            <button class="btn btn-sm" id="next-page" onclick="nextPage()">Next</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 0;
const pageSize = 50;
let hasMoreLogs = true;

async function loadLogs() {
    const action = document.getElementById('filter-action').value;
    const resourceType = document.getElementById('filter-resource').value;
    const tbody = document.getElementById('logs-tbody');

    tbody.innerHTML = '<tr><td colspan="6" class="loading">Loading audit logs...</td></tr>';

    const params = new URLSearchParams({
        limit: pageSize,
        offset: currentPage * pageSize
    });
    if (action) params.append('action', action);
    if (resourceType) params.append('resource_type', resourceType);

    try {
        const response = await fetch(`/api/audit-logs?${params}`);

        if (response.status === 401) {
            window.location.href = '/login?redirect=/audit-logs';
            return;
        }
        if (response.status === 403) {
            tbody.innerHTML = '<tr><td colspan="6" class="error">Access denied. Admin privileges required.</td></tr>';
            return;
        }

        const logs = await response.json();
        hasMoreLogs = logs.length === pageSize;

        if (logs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty">No audit logs found</td></tr>';
            return;
        }

        tbody.innerHTML = logs.map(log => `
            <tr>
                <td>${new Date(log.timestamp).toLocaleString()}</td>
                <td>${log.username ? escapeHtml(log.username) : '<em>System</em>'}</td>
                <td><span class="action-badge action-${log.action.replace(/_/g, '-')}">${formatAction(log.action)}</span></td>
                <td>${log.resource_type ? `${log.resource_type}${log.resource_id ? ' #' + log.resource_id : ''}` : '-'}</td>
                <td class="details-cell">${formatDetails(log.details)}</td>
                <td>${log.ip_address || '-'}</td>
            </tr>
        `).join('');

        updatePagination();
    } catch (error) {
        tbody.innerHTML = '<tr><td colspan="6" class="error">Error loading audit logs</td></tr>';
    }
}

function formatAction(action) {
    return action.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function formatDetails(details) {
    if (!details) return '-';

    if (typeof details === 'object') {
        const items = Object.entries(details)
            .filter(([key]) => !['password', 'token', 'hash'].some(s => key.toLowerCase().includes(s)))
            .map(([key, value]) => {
                const formattedKey = key.replace(/_/g, ' ');
                const formattedValue = typeof value === 'object' ? JSON.stringify(value) : value;
                return `<span class="detail-item"><strong>${formattedKey}:</strong> ${escapeHtml(String(formattedValue))}</span>`;
            });
        return items.join(' ');
    }

    return escapeHtml(String(details));
}

function updatePagination() {
    document.getElementById('page-info').textContent = `Page ${currentPage + 1}`;
    document.getElementById('prev-page').disabled = currentPage === 0;
    document.getElementById('next-page').disabled = !hasMoreLogs;
}

function prevPage() {
    if (currentPage > 0) {
        currentPage--;
        loadLogs();
    }
}

function nextPage() {
    if (hasMoreLogs) {
        currentPage++;
        loadLogs();
    }
}

// Initialize
loadLogs();
</script>
{% endblock %}
