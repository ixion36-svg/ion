# =============================================================================
# ION Nginx Configuration - HTTPS Reverse Proxy
# =============================================================================
# This configuration provides:
# - TLS/HTTPS termination
# - HTTP to HTTPS redirect
# - Security headers
# - Rate limiting
# - Request size limits sized for PCAP uploads (120 MB)
# - SSE / streaming passthrough for AI chat endpoints
# - Server-side static file cache on tmpfs
# =============================================================================

user nginx;
# 2 workers sized for ION's 50-user max ceiling. One worker handles steady
# load comfortably; the second absorbs TLS handshake bursts during morning
# login rush. `auto` is wrong here because it reads host CPU count, ignoring
# the cgroup CPU quota set by docker compose.
worker_processes 2;
# Each connection burns 2 file descriptors (client + upstream). Default
# OS nofile is often 1024 which silently caps worker_connections.
worker_rlimit_nofile 4096;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # 2 × 1024 = 2048 total connections, ~6× the realistic peak of
    # 50 users × ~6 concurrent connections each.
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format — includes request_time + upstream_response_time for perf monitoring
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    # Free socket memory faster from clients that vanish without closing.
    reset_timedout_connection on;

    # Security: Hide nginx version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/manifest+json
        image/svg+xml
        font/woff2;

    # Rate limiting zones — login is tighter than general API
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Static file cache on tmpfs (compose mounts /var/cache/nginx as tmpfs)
    proxy_cache_path /var/cache/nginx/static
                     levels=1:2
                     keys_zone=static_cache:10m
                     max_size=200m
                     inactive=1d
                     use_temp_path=off;

    # Upstream ION application — service name from docker-compose.https.yml
    upstream ion {
        server ion:8000;
        keepalive 32;
    }

    # ==========================================================================
    # HTTP Server - Redirect to HTTPS
    # ==========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Allow health checks over HTTP for load balancer probes
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================================================
    # HTTPS Server - Main Application
    # ==========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # ---------------------------------------------------------------------
        # TLS Configuration
        # ---------------------------------------------------------------------
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # TLS protocols and ciphers (modern configuration)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # SSL session settings
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # OCSP Stapling — uncomment when using a CA-signed certificate
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # ssl_trusted_certificate /etc/nginx/ssl/ca-chain.crt;

        # ---------------------------------------------------------------------
        # Security Headers
        # ---------------------------------------------------------------------
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # NOTE: 'unsafe-inline' is required by current Jinja2 templates (inline
        # <script> blocks throughout). Tighten via nonces in a future hardening pass.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ---------------------------------------------------------------------
        # Request Limits
        # ---------------------------------------------------------------------
        # 120 MB leaves slack above the 100 MB PCAP analyzer limit (pcap_api.py)
        client_max_body_size 120M;
        client_body_timeout 60s;
        client_header_timeout 30s;

        # Connection limits
        limit_conn conn 20;

        # ---------------------------------------------------------------------
        # Locations
        # ---------------------------------------------------------------------

        # Health check endpoint — proxies to ION's real /api/health (api.py)
        location = /health {
            proxy_pass http://ion/api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            access_log off;
        }

        # Login endpoint - strict rate limiting
        location = /api/auth/login {
            limit_req zone=login burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://ion;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # AI streaming endpoints — must NOT buffer or the SSE stream is held
        # back until the upstream completes (defeats streaming entirely).
        # Long timeout because LLM responses can run many minutes.
        location /api/ai/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://ion;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # SSE / streaming — disable buffering and caching, hold the conn open
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;
            chunked_transfer_encoding on;

            proxy_connect_timeout 30s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # API endpoints - moderate rate limiting
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://ion;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts for API
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Static files - server-side cache + browser cache
        location /static/ {
            proxy_pass http://ion;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";

            # Server-side cache on tmpfs
            proxy_cache static_cache;
            proxy_cache_valid 200 1d;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;

            # Browser cache
            add_header Cache-Control "public, max-age=86400";
        }

        # All other requests
        location / {
            proxy_pass http://ion;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
