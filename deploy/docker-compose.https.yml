# =============================================================================
# ION Docker Compose - HTTPS Production Deployment
# =============================================================================
# This configuration includes:
# - Nginx reverse proxy with TLS termination
# - ION application
# - Persistent data volumes
# - Security hardening
#
# Prerequisites:
# - Place your TLS certificate at: ./ssl/server.crt
# - Place your TLS private key at: ./ssl/server.key
#
# Usage:
#   docker compose -f docker-compose.https.yml up -d
# =============================================================================

services:
  # ===========================================================================
  # Nginx Reverse Proxy
  # ===========================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: ion-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      # Nginx configuration
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

      # TLS certificates
      - ./ssl:/etc/nginx/ssl:ro

    depends_on:
      - ion

    networks:
      - ion-network

    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run

    # Health check
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

  # ===========================================================================
  # ION Application
  # ===========================================================================
  ion:
    image: ixion36/ion:${ION_VERSION:-latest}
    container_name: ion-app
    restart: unless-stopped

    # No port exposure - accessed only through nginx
    expose:
      - "8000"

    volumes:
      # Persistent data
      - ion-data:/data

    env_file:
      - .env

    environment:
      # Server configuration
      - ION_HOST=0.0.0.0
      - ION_PORT=8000

      # IMPORTANT: Set to true when using HTTPS
      - ION_COOKIE_SECURE=true

    networks:
      - ion-network

    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

# =============================================================================
# Networks
# =============================================================================
networks:
  ion-network:
    driver: bridge
    internal: false

# =============================================================================
# Volumes
# =============================================================================
volumes:
  ion-data:
    driver: local
